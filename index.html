<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Eksklusiv Seniorkalender</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #0066cc;
            --clock-accent: #ef4444;
            --shadow: rgba(0, 0, 0, 0.05);
            --box-bg: #ffffff;
            --box-border: #cbd5e1;
            --highlight-text: #0066cc; 
            --time-of-day-color: #0f172a;
        }

        body.night-mode {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --clock-accent: #ef4444;
            --shadow: rgba(0, 0, 0, 0.3);
            --box-bg: #1e293b;
            --box-border: #334155;
            --highlight-text: #38bdf8; 
            --time-of-day-color: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            user-select: none;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none; 
            padding: 79px 60px 74px 60px; 
            transition: background 1s ease, color 1s ease;
        }

        body::-webkit-scrollbar { display: none; }

        /* HEADER, STATUS OG MAIN FLUKTER NÅ MED 60px VENSTREMARGIN */
        header, .status-box-container, main { padding-left: 0; padding-right: 0; }

        header {
            height: 110px; 
            display: flex;
            justify-content: space-between; 
            margin-bottom: 40px; 
            position: relative; 
            flex-shrink: 0;
        }

        .header-clocks-left { display: flex; align-items: flex-end; }
        .digital-clock-big { font-size: 142px; font-weight: 500; letter-spacing: -5px; line-height: 0.72; }

        .time-of-day-wrapper { display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-start; }
        .time-of-day-label { font-size: 3.5rem; font-weight: 700; color: var(--time-of-day-color); text-transform: capitalize; }
        .header-date-right { font-size: 2.0rem; font-weight: 500; color: var(--text-muted); margin-top: 15px; }

        .status-box-container { width: 100%; margin-bottom: 40px; padding: 30px; background-color: var(--box-bg); border: 1px solid var(--box-border); border-radius: 16px; font-size: 2.2rem; box-shadow: var(--shadow); }
        .status-box-highlight { color: var(--highlight-text); font-weight: 700; }

        main { flex: 1; display: flex; }
        .column { padding-top: 10px; }
        .left-column { width: 350px; padding-right: 60px; margin-right: 60px; border-right: 1px dashed var(--text-muted); }
        .right-column { flex: 1; }
        
        .info-title, .calendar-title { font-size: 2.4rem; font-weight: 500; margin-bottom: 20px; color: var(--text-main); }
        .info-content { display: flex; flex-direction: column; gap: 6px; font-family: 'Lato', sans-serif; font-size: 1.55rem; padding-left: 0; }
        .info-item { display: flex; align-items: flex-start; margin-bottom: 6px; }
        .info-time { color: var(--clock-accent); font-weight: 700; margin-right: 5px; }
        
        /* LINJER MELLOM DAGER */
        .day-section { width: 100%; margin-bottom: 35px; padding-bottom: 30px; border-bottom: 1px dashed var(--box-border); }
        
        .day-title { font-family: 'Poppins', sans-serif; font-size: 2.0rem; font-weight: 600; margin-bottom: 14px; padding-left: 0; }
        .holiday-text { font-size: 1.25rem; color: var(--clock-accent); margin-bottom: 14px; padding-left: 0; text-transform: uppercase; }
        .event-list { display: flex; flex-direction: column; gap: 28px; padding-left: 0; }
        .event-item { font-family: 'Lato', sans-serif; font-size: 1.55rem; display: flex; align-items: flex-start; }
        .event-time { color: var(--clock-accent); font-weight: 700; margin-right: 6px; }
        
        .badge-navn { padding: 2px 10px; border-radius: 6px; color: white; font-weight: 700; font-size: 18px; margin-right: 6px; }
        .badge-mamma { background-color: #16a34a; } .badge-pappa { background-color: #d97706; } .badge-begge { background-color: #0891b2; }
    </style>
</head>
<body>

    <header>
        <div class="digital-clock-big" id="digital-clock">00:00</div>
        <div class="time-of-day-wrapper">
            <div class="time-of-day-label" id="time-of-day-label">...</div>
            <div class="header-date-right" id="complete-date-string">...</div>
        </div>
    </header>

    <div class="status-box-container" id="live-status-bar">Laster neste avtale...</div>

    <main>
        <div class="column left-column">

            <div class="info-content" id="info-text">Laster rutiner...</div>
        </div>
        <div class="column right-column">
            <div class="calendar-title">Avtaler:</div>
            <div id="calendar-list">Laster inn...</div>
        </div>
    </main>

        // [Logikk-funksjonene beholdes identisk for å sikre at alt fungerer]
        function resetInactivityTimer() { clearTimeout(window.inactivityTimeout); window.inactivityTimeout = setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 180000); }
        function setupInactivityListeners() { ['scroll', 'touchstart', 'touchmove', 'mousedown'].forEach(evt => window.addEventListener(evt, resetInactivityTimer, true)); }

</body>
</html>
