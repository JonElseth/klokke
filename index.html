<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Eksklusiv Seniorkalender</title>
    <style>
        /* [Dine stiler er beholdt her slik du har dem] */
        :root { --bg-color: #f1f5f9; --text-main: #1e293b; --text-muted: #64748b; --clock-accent: #ef4444; --shadow: rgba(0, 0, 0, 0.05); --box-bg: #ffffff; --box-border: #cbd5e1; --highlight-text: #0066cc; --time-of-day-color: #0f172a; }
        body.night-mode { --bg-color: #0f172a; --text-main: #f8fafc; --text-muted: #94a3b8; --shadow: rgba(0, 0, 0, 0.3); --box-bg: #1e293b; --box-border: #334155; --highlight-text: #38bdf8; --time-of-day-color: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; width: 100vw; background-color: var(--bg-color); color: var(--text-main); font-family: 'Poppins', sans-serif; padding: 79px 60px 74px 60px; }
        header { height: 110px; display: flex; justify-content: space-between; margin-bottom: 40px; }
        .digital-clock-big { font-size: 142px; font-weight: 500; letter-spacing: -5px; line-height: 0.72; }
        .time-of-day-wrapper { display: flex; flex-direction: column; align-items: flex-end; }
        .time-of-day-label { font-size: 3.5rem; font-weight: 700; color: var(--time-of-day-color); }
        .header-date-right { font-size: 2.0rem; font-weight: 500; color: var(--text-muted); margin-top: 15px; }
        .status-box-container { width: 100%; margin-bottom: 40px; padding: 30px; background-color: var(--box-bg); border: 1px solid var(--box-border); border-radius: 16px; font-size: 2.2rem; }
        .status-box-highlight { color: var(--highlight-text); font-weight: 700; }
        main { display: flex; }
        .left-column { width: max-content; padding-right: 60px; margin-right: 60px; border-right: 1px dashed var(--text-muted); }
        .right-column { flex: 1; }
        .info-title, .calendar-title { font-size: 2.4rem; font-weight: 500; margin-bottom: 14px; }
        .info-content { font-family: 'Lato', sans-serif; font-size: 1.55rem; padding-left: 80px; }
        .day-title { font-family: 'Poppins', sans-serif; font-size: 2.0rem; font-weight: 600; margin-bottom: 14px; padding-left: 40px; }
        .event-list { display: flex; flex-direction: column; gap: 28px; padding-left: 80px; }
        .event-item { font-size: 1.55rem; display: flex; align-items: flex-start; }
        .event-time { color: var(--clock-accent); font-weight: 700; margin-right: 6px; }
        .badge-navn { padding: 2px 10px; border-radius: 6px; color: white; font-weight: 700; font-size: 18px; margin-right: 6px; }
        .badge-mamma { background-color: #16a34a; } .badge-pappa { background-color: #d97706; } .badge-begge { background-color: #0891b2; }
    </style>
</head>
