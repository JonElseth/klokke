<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Digital Klokke med Rullende Månedskalender</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            height: 100vh;
            
            /* SIKKERHETSSONE FOR DEKSELET */
            padding: 79px 45px 74px 45px; 
            
            overflow: hidden;
            transition: background 1.5s ease, color 1.5s ease;
            user-select: none;
            position: relative;
        }

        /* --- SENIOR-OPTIMALISERTE TEMAER --- */
        .day-mode { 
            background: linear-gradient(135deg, #e4e9ed 0%, #b9c6d2 100%); 
            color: #111111; 
        }
        .day-mode .glass-panel {
            background: rgba(255, 255, 255, 0.95); 
            border: 3px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }
        .day-mode .day-card {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #ffffff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            opacity: 1;
        }
        .day-mode .day-card.empty-day {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: none;
            opacity: 0.4; 
        }
        .day-mode .yesterday-card {
            background: rgba(215, 220, 225, 0.5);
            border: 2px solid rgba(170, 180, 190, 0.4);
            opacity: 0.6;
        }
        .day-mode .today-card {
            background: #004499 !important; 
            color: #ffffff !important;
            border: 5px solid #002266; 
            box-shadow: 0 12px 30px rgba(0, 68, 153, 0.35);
            opacity: 1 !important;
        }
        .day-mode .today-card .day-name {
            color: #ffffff !important;
            border-bottom: 3px solid rgba(255, 255, 255, 0.3);
        }
        .day-mode .today-card .no-events {
            color: #ffffff !important;
        }
        .day-mode .event-item { background: #f2f2f7; border: 1px solid #d1d1d6; color: #111111; }
        .day-mode .today-card .event-item { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #ffffff; }
        .day-mode .no-events { color: #555555; }
        .day-mode .scroll-indicator { color: #cc4400; background: rgba(255,255,255,0.95); border: 2px solid #cc4400; }
        .day-mode #side-scroll-hint { background: #004499; color: white; }
        .day-mode #home-btn { background: #333333; color: white; }

        /* FASTMONTERT FADE FOR DAGMODUS (Låst til høyre glasskant innenfor rammen din) */
        .day-mode::after {
            content: "";
            position: absolute;
            top: 198px; /* Starter akkurat der kalenderseksjonen begynner */
            right: 45px; /* Låst akkurat der dekselet ditt slutter */
            width: 140px; 
            height: calc(100vh - 198px - 74px - 35px); /* Dekker kun kalenderhøyden */
            background: linear-gradient(to right, rgba(230,235,240,0) 0%, #bac7d3 100%);
            pointer-events: none;
            z-index: 9998; /* Ligger som et fast glasslokk over kortene som skroller */
        }

        .night-mode { 
            background: linear-gradient(135deg, #0b0f19 0%, #17273a 100%); 
            color: #ffffff; 
        }
        .night-mode .glass-panel {
            background: rgba(20, 20, 22, 0.98);
            border: 3px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }
        .night-mode .day-card {
            background: rgba(44, 44, 46, 0.85);
            border: 2px solid rgba(255, 255, 255, 0.1);
            opacity: 1;
        }
        .night-mode .day-card.empty-day {
            background: rgba(20, 20, 22, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.03);
            box-shadow: none;
            opacity: 0.25;
        }
        .night-mode .yesterday-card {
            background: rgba(28, 28, 30, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.03);
            opacity: 0.5;
        }
        .night-mode .today-card {
            background: #103060 !important;
            color: #ffffff !important;
            border: 5px solid #0a84ff;
            box-shadow: 0 12px 30px rgba(10, 132, 255, 0.4);
            opacity: 1 !important;
        }
        .night-mode .today-card .day-name {
            color: #3399ff !important;
            border-bottom: 3px solid rgba(10, 132, 255, 0.4);
        }
        .night-mode .today-card .no-events {
            color: #e2e2e7 !important;
        }
        .night-mode .event-item { background: #2c2c2e; border: 1px solid #3a3a3c; color: #ffffff; }
        .night-mode .today-card .event-item { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #ffffff; }
        .night-mode .no-events { color: #8e8e93; }
        .night-mode .scroll-indicator { color: #ff9f0a; background: rgba(44,44,46,0.95); border: 2px solid #ff9f0a; }
        .night-mode #side-scroll-hint { background: #0a84ff; color: white; }
        .night-mode #home-btn { background: #2c2c2e; color: white; border: 2px solid rgba(255,255,255,0.2); }

        /* FASTMONTERT FADE FOR NATTMODUS */
        .night-mode::after {
            content: "";
            position: absolute;
            top: 198px;
            right: 45px;
            width: 140px;
            height: calc(100vh - 198px - 74px - 35px);
            background: linear-gradient(to right, rgba(23,39,58,0) 0%, #152436 100%);
            pointer-events: none;
            z-index: 9998;
        }

        /* --- STYLING FOR HELLIGDAGER --- */
        .holiday-title {
            color: #dc3545 !important; 
            font-weight: 800;
        }
        .night-mode .holiday-title {
            color: #ff453a !important; 
        }
        
        .holiday-text {
            font-size: 1.1vw;
            color: #dc3545;
            font-weight: 700;
            text-align: center;
            margin-top: -10px;
            margin-bottom: 15px;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .night-mode .holiday-text {
            color: #ff453a;
        }
        .today-card .holiday-text {
            color: #ffcc00 !important; 
        }

        /* --- STARTKNAPPEN FOR OPPSTART --- */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1c1c1e;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            pointer-events: auto !important;
        }

        .start-btn {
            padding: 25px 60px;
            font-size: 3vw;
            font-weight: 700;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 8px; 
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.3);
        }

        /* --- ØVERSTE DEL: TITELPANEL --- */
        .top-section {
            width: 100%;
            max-width: 1400px; 
            border-radius: 8px; 
            padding: 20px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px; 
        }

        .time {
            font-size: 11vw; 
            font-weight: 800;
            line-height: 0.85;
            letter-spacing: -2px;
        }

        .right-info {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
        }

        .date-container {
            font-size: 4.2vw; 
            font-weight: 800;  
            text-transform: capitalize;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 12px;
        }

        .period-container {
            font-size: 3.5vw; 
            font-weight: 800;
            padding: 10px 24px;
            border-radius: 8px;
            line-height: 1;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* --- NEDERSTE DEL: KALENDER --- */
        .calendar-section {
            width: 100%;
            max-width: 1400px; 
            flex-grow: 1; 
            display: flex;
            margin-bottom: 35px; 
            overflow-x: auto; 
            scroll-behavior: smooth; 
            position: relative;
            scrollbar-width: none; 
            pointer-events: auto !important; 
        }
        .calendar-section::-webkit-scrollbar {
            display: none;
        }

        .calendar-grid {
            display: flex; 
            gap: 15px;
            height: 100%; 
            padding-bottom: 10px;
        }

        .day-card {
            width: calc((1400px - (4 * 15px)) / 4.5); 
            flex-shrink: 0; 
            border-radius: 8px; 
            padding: 18px 15px; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            position: relative; 
            transition: all 0.5s ease;
        }

        @media (max-width: 1400px) {
            .day-card {
                width: calc((100vw - 90px - (4 * 15px)) / 4.5); 
            }
        }

        .day-name {
            font-size: 1.6vw; 
            font-weight: 800;
            text-align: center;
            padding-bottom: 12px;
            margin-bottom: 15px;
            border-bottom: 3px solid rgba(128, 128, 128, 0.2);
            letter-spacing: -0.2px;
            line-height: 1.2;
            flex-shrink: 0;
        }

        .yesterday-card .day-name { color: #555555; }
        .night-mode .yesterday-card .day-name { color: #999999; }

        .event-list-wrapper {
            position: relative;
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .event-list {
            font-size: 1.3vw; 
            list-style: none;
            overflow-y: auto; 
            scroll-behavior: smooth;
            flex-grow: 1;
            padding-bottom: 25px; 
            scrollbar-width: none; 
        }
        .event-list::-webkit-scrollbar {
            display: none;
        }

        .event-item {
            margin-bottom: 12px;
            padding: 12px 14px;
            border-radius: 6px; 
            line-height: 1.3;
            font-weight: 700; 
            border-left: 8px solid #e65100; 
        }

        .yesterday-card .event-item {
            opacity: 0.5;
            border-left: 8px solid #777777;
        }

        .event-time {
            font-weight: 800;
            display: block;
            font-size: 1.2vw;
            margin-bottom: 4px;
            color: #cc4400; 
        }
        .night-mode .event-time { color: #ff9f0a; }
        .today-card .event-time { color: #ffcc00 !important; } 
        .yesterday-card .event-time { color: #555555 !important; }
        .night-mode .yesterday-card .event-time { color: #aaaaaa !important; }
        
        .no-events {
            text-align: center;
            font-size: 1.4vw;
            margin-top: 50px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        /* --- VERTIKAL BOKS-PIL --- */
        .scroll-indicator {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 1.5vw;
            font-weight: 900;
            width: 32px;
            height: 32px;
            display: none; 
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            z-index: 99;
            cursor: pointer;
            animation: bounceVert 1.5s infinite;
        }

        @keyframes bounceVert {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }

        /* --- SIDERULL-KNAPP --- */
        #side-scroll-hint {
            position: fixed;
            bottom: 84px; 
            right: 65px;  
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 1.3vw;
            font-weight: 800;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            z-index: 9999; /* Lagt helt på topp */
            transition: opacity 0.4s ease, transform 0.4s ease;
            cursor: pointer;
            pointer-events: auto !important;
            animation: bounceHoriz 2s infinite;
        }

        .side-arrow-icon {
            font-size: 1.8vw;
            font-weight: 900;
            line-height: 1;
        }

        @keyframes bounceHoriz {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        /* --- HJEM-KNAPP --- */
        #home-btn {
            position: fixed;
            bottom: 84px; 
            left: 65px;  
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 26px;
            border-radius: 50px;
            font-size: 1.3vw;
            font-weight: 800;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            z-index: 9999; /* Lagt helt på topp */
            cursor: pointer;
            opacity: 0; 
            transform: scale(0.9) translateX(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* --- RESPONSIVE REGLER FOR MOBIL --- */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px; 
                overflow-y: auto;   
                height: auto;
            }

            /* Kobler ut den faste faden fullstendig på mobil */
            body::after {
                display: none !important;
            }

            .top-section {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 15px;
                margin-bottom: 20px;
                gap: 10px;
            }

            .time { font-size: 18vw; }
            .right-info { align-items: center; text-align: center; }
            .date-container { font-size: 6vw; }
            .period-container { font-size: 5vw; padding: 6px 16px; }

            .calendar-section {
                overflow-x: visible;
                overflow-y: visible;
                height: auto;
                margin-bottom: 20px;
            }

            .calendar-grid {
                flex-direction: column; 
                width: 100%;
                gap: 20px;
            }

            .day-card {
                width: 100% !important; 
                height: auto;
                min-height: 150px;
                padding: 15px;
            }

            .day-name { font-size: 5vw; margin-bottom: 10px; padding-bottom: 8px; }
            .holiday-text { font-size: 3.5vw; margin-bottom: 10px; }

            .event-list {
                overflow-y: visible; 
                height: auto;
                padding-bottom: 0;
            }

            .event-item { padding: 10px 12px; font-size: 4.2vw; }
            .event-time { font-size: 3.8vw; }
            .no-events { font-size: 4.5vw; margin-top: 20px; margin-bottom: 10px; }

            #side-scroll-hint, #home-btn, .scroll-indicator {
                display: none !important;
            }

            .start-btn { font-size: 6vw; padding: 15px 40px; }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="startApp()">Start systemet</button>
    </div>

    <div class="top-section glass-panel">
        <div class="time" id="clock">00:00</div>
        <div class="right-info">
            <div class="date-container" id="date">Ukedag, 1. januar</div>
            <div class="period-container" id="period">Det er...</div>
        </div>
    </div>

    <div class="calendar-section" id="scroll-container">
        <div class="calendar-grid" id="calendar-grid">
            </div>
    </div>

    <div id="side-scroll-hint" onclick="scrollCalendarForward()">
        <span>Skyv på skjermen for å se 30 dager fremover</span>
        <span class="side-arrow-icon">→</span>
    </div>

    <div id="home-btn" onclick="returnToHomePosition()">
        <span>🏠 Gå til i dag</span>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        // --- KONFIGURASJON ---
        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com'; 
        const HOLIDAY_CALENDAR_ID = 'no.norwegian#holiday@group.v.calendar.google.com'; 

        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["januar", "februar", "mars", "april", "mai", "juni", "juli", "august", "september", "oktober", "november", "desember"];
        
        let wakeLock = null;
        let returnTimeout = null;
        
        let globalEventsCache = {}; 
        let globalHolidaysCache = {}; 
        
        const scrollContainer = document.getElementById('scroll-container');
        const sideHint = document.getElementById('side-scroll-hint');
        const homeBtn = document.getElementById('home-btn');

        function scrollCalendarForward() {
            resetReturnTimer();
            const cardWidth = document.querySelector('.day-card').clientWidth;
            scrollContainer.scrollBy({ left: cardWidth * 3, behavior: 'smooth' });
        }

        function scrollBoxDownward(listId) {
            resetReturnTimer();
            const listEl = document.getElementById(listId);
            if (listEl) {
                listEl.scrollBy({ top: 120, behavior: 'smooth' });
            }
        }

        function returnToHomePosition() {
            if (window.innerWidth > 768) {
                scrollContainer.scrollTo({ left: 0, behavior: 'smooth' });
                const activeLists = document.querySelectorAll('.event-list');
                activeLists.forEach(list => {
                    list.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
            resetReturnTimer();
        }

        function handleButtonVisibilities() {
            if (window.innerWidth <= 768) return; 
            
            if (scrollContainer.scrollLeft > 50) {
                sideHint.style.opacity = '0'; 
                sideHint.style.transform = 'scale(0.9) translateX(10px)';
                sideHint.style.pointerEvents = 'none'; 
                
                homeBtn.style.opacity = '1';
                homeBtn.style.transform = 'scale(1) translateX(0)';
                homeBtn.style.pointerEvents = 'auto';
            } else {
                sideHint.style.opacity = '1'; 
                sideHint.style.transform = 'scale(1) translateX(0)';
                sideHint.style.pointerEvents = 'auto'; 
                
                homeBtn.style.opacity = '0';
                homeBtn.style.transform = 'scale(0.9) translateX(-10px)';
                homeBtn.style.pointerEvents = 'none';
            }
        }

        function resetReturnTimer() {
            if (window.innerWidth <= 768) return; 
            clearTimeout(returnTimeout);
            returnTimeout = setTimeout(returnToHomePosition, 180000); 
        }

        scrollContainer.addEventListener('scroll', () => {
            resetReturnTimer();
            handleButtonVisibilities();
        });

        window.addEventListener('scroll', resetReturnTimer);
        window.addEventListener('touchstart', resetReturnTimer);

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.addEventListener('visibilitychange', async () => {
                        if (wakeLock !== null && document.visibilityState === 'visible') {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                }
            } catch (err) { console.log("Skjermlås ikke tilgjengelig."); }
        }

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';

            if (window.innerWidth > 768) {
                try {
                    const docElm = document.documentElement;
                    if (docElm.requestFullscreen) { docElm.requestFullscreen(); } 
                    else if (docElm.webkitRequestFullscreen) { docElm.webkitRequestFullscreen(); }
                } catch (fErr) { console.log("Fullskjerm blokkert."); }
                requestWakeLock();
            }

            updateClockAndLayout();
            combineAndRenderGrid(); 
            resetReturnTimer();
            handleButtonVisibilities();
            
            try {
                gapi.load('client', () => {
                    fetchBothCalendars();
                    setInterval(fetchBothCalendars, 300000); 
                });
            } catch (gErr) { console.log("Google API lastefeil: ", gErr); }
        }

        function updateClockAndLayout() {
            const now = new Date();
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            
            try {
                hours = now.toLocaleTimeString('no-NO', { hour: '2-digit', hour12: false, timeZone: 'Europe/Oslo' });
                minutes = now.toLocaleTimeString('no-NO', { minute: '2-digit', timeZone: 'Europe/Oslo' }).padStart(2, '0');
            } catch(e) {}
            
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            let dateString = "Ukedag";
            try {
                const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Europe/Oslo' };
                dateString = now.toLocaleDateString('no-NO', options).replace('.', '');
            } catch(e) {}
            document.getElementById('date').textContent = dateString;

            const intHours = parseInt(hours, 10);
            const isNight = (intHours >= 22 || intHours < 7);
            document.body.className = isNight ? "night-mode" : "day-mode";

            let periodText = "";
            let periodBg = "";
            let periodFg = "";
            
            if (intHours >= 7 && intHours < 9) { 
                periodText = "Det er morgen"; 
                periodBg = isNight ? "#ffcc00" : "#ffebd6"; 
                periodFg = isNight ? "#000000" : "#7a583a";
            } else if (intHours >= 9 && intHours < 12) { 
                periodText = "Det er formiddag"; 
                periodBg = isNight ? "#ff9f0a" : "#ffe0cc"; 
                periodFg = isNight ? "#000000" : "#a63a00";
            } else if (intHours >= 12 && intHours < 18) { 
                periodText = "Det er ettermiddag"; 
                periodBg = isNight ? "#ffffff" : "#e2e2e7"; 
                periodFg = "#111111";
            } else if (intHours >= 18 && intHours < 22) { 
                periodText = "Det er kveld"; 
                periodBg = isNight ? "#ff9f0a" : "#ffe0cc"; 
                periodFg = isNight ? "#000000" : "#ba4300";
            } else { 
                periodText = "Det er natt"; 
                periodBg = isNight ? "#1f3a60" : "#003bb3"; 
                periodFg = "#ffffff";
            }

            const periodElement = document.getElementById('period');
            periodElement.textContent = periodText;
            periodElement.style.backgroundColor = periodBg;
            periodElement.style.color = periodFg;
        }

        function updateScrollIndicators(listEl, indicatorEl) {
            if (window.innerWidth <= 768) return; 
            
            const hasMoreToScroll = listEl.scrollHeight > listEl.clientHeight;
            const isAtBottom = listEl.scrollHeight - listEl.scrollTop <= listEl.clientHeight + 5;

            if (hasMoreToScroll && !isAtBottom) {
                indicatorEl.style.display = 'flex'; 
            } else {
                indicatorEl.style.display = 'none'; 
            }
        }

        function combineAndRenderGrid() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const today = new Date();

            for (let i = -1; i < 30; i++) {
                const currentDay = new Date();
                currentDay.setDate(today.getDate() + i);
                
                const dayString = currentDay.toISOString().split('T')[0];
                const isYesterday = i === -1;
                const isToday = i === 0;
                
                const holidayName = globalHolidaysCache[dayString] || null;
                const isHoliday = holidayName !== null;

                const card = document.createElement('div');
                if (isYesterday) card.className = 'day-card yesterday-card';
                else if (isToday) card.className = 'day-card today-card'; 
                else if (!globalEventsCache[dayString] || globalEventsCache[dayString].length === 0) card.className = 'day-card empty-day'; 
                else card.className = 'day-card'; 

                let dayName = ukeDager[currentDay.getDay()];
                const dateNum = currentDay.getDate();
                const monthName = maaneder[currentDay.getMonth()];
                
                if (isYesterday) dayName = `I GÅR<br>${dateNum}. ${monthName}`;
                else if (isToday) dayName = `I DAG<br>${dateNum}. ${monthName}`;
                else dayName = `${dayName.toUpperCase()}<br>${dateNum}. ${monthName}`;

                const useRedTitle = (currentDay.getDay() === 0 || isHoliday) && !isToday && !isYesterday;

                card.innerHTML = `
                    <div class="day-name ${useRedTitle ? 'holiday-title' : ''}">${dayName}</div>
                    ${isHoliday ? `<div class="holiday-text">${holidayName}</div>` : ''}
                    <div class="event-list-wrapper">
                        <ul class="event-list" id="list-${dayString}"></ul>
                        <div class="scroll-indicator" id="arrow-${dayString}" onclick="scrollBoxDownward('list-${dayString}')">↓</div>
                    </div>
                `;
                
                grid.appendChild(card);
                const listEl = card.querySelector('.event-list');
                const indicatorEl = card.querySelector('.scroll-indicator');

                let hasValidEvents = false;

                if (globalEventsCache[dayString] && globalEventsCache[dayString].length > 0) {
                    globalEventsCache[dayString].forEach(ev => {
                        hasValidEvents = true;
                        let timeStr = 'Hele dagen';
                        try {
                            timeStr = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit', timeZone: 'Europe/Oslo'}) : 'Hele dagen';
                        } catch(e) {}
                        
                        const li = document.createElement('li');
                        li.className = 'event-item';
                        
                        const timeSpan = document.createElement('span');
                        timeSpan.className = 'event-time';
                        timeSpan.textContent = timeStr;
                        li.appendChild(timeSpan);

                        const summarySpan = document.createElement('span');
                        summarySpan.className = 'event-summary-text';
                        summarySpan.textContent = ev.summary || '';
                        
                        li.appendChild(summarySpan);
                        listEl.appendChild(li);
                    });
                }

                if (!hasValidEvents) {
                    const noEvLi = document.createElement('li');
                    noEvLi.className = 'no-events';
                    noEvLi.textContent = 'Ingen planer';
                    listEl.appendChild(noEvLi);
                }

                if (window.innerWidth > 768) {
                    listEl.addEventListener('scroll', () => {
                        updateScrollIndicators(listEl, indicatorEl);
                        resetReturnTimer();
                    });
                    setTimeout(() => updateScrollIndicators(listEl, indicatorEl), 100);
                } else {
                    indicatorEl.style.display = 'none'; 
                }
            }
        }

        function fetchBothCalendars() {
            if (API_KEY === 'DIN_GOOGLE_API_KEY') { return; }

            gapi.client.init({
                'apiKey': API_KEY,
                'discoveryDocs': ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
            }).then(function() {
                const startPeriod = new Date();
                startPeriod.setDate(startPeriod.getDate() - 1);
                startPeriod.setHours(0,0,0,0);
                
                const endPeriod = new Date();
                endPeriod.setDate(endPeriod.getDate() + 31); 

                const personalRequest = gapi.client.calendar.events.list({
                    'calendarId': CALENDAR_ID,
                    'timeMin': startPeriod.toISOString(),
                    'timeMax': endPeriod.toISOString(),
                    'showDeleted': false,
                    'singleEvents': true,
                    'orderBy': 'startTime'
                });

                const holidayRequest = gapi.client.calendar.events.list({
                    'calendarId': HOLIDAY_CALENDAR_ID,
                    'timeMin': startPeriod.toISOString(),
                    'timeMax': endPeriod.toISOString(),
                    'showDeleted': false,
                    'singleEvents': true
                });

                return Promise.all([personalRequest, holidayRequest]);
            }).then(function(responses) {
                const personalEvents = responses[0].result.items;
                const holidayEvents = responses[1].result.items;

                const tempEvents = {};
                personalEvents.forEach(event => {
                    const start = event.start.dateTime || event.start.date;
                    const dateKey = start.split('T')[0];
                    if (!tempEvents[dateKey]) { tempEvents[dateKey] = []; }
                    tempEvents[dateKey].push(event);
                });
                globalEventsCache = tempEvents;

                const tempHolidays = {};
                holidayEvents.forEach(holiday => {
                    const start = holiday.start.date || holiday.start.dateTime;
                    const dateKey = start.split('T')[0];
                    tempHolidays[dateKey] = holiday.summary; 
                });
                globalHolidaysCache = tempHolidays;

                combineAndRenderGrid();
            }).catch(err => {
                console.log("Feil under henting av kalenderdata: ", err);
                combineAndRenderGrid();
            });
        }

        setInterval(updateClockAndLayout, 5000);
    </script>
