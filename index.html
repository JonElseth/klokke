<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seniorkalender</title>
    <style>
        :root { --bg: #f1f5f9; --text: #1e293b; --accent: #ef4444; }
        body.night-mode { --bg: #0f172a; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
        .digital-clock { font-size: 80px; font-weight: bold; }
        #calendar-list { margin-top: 20px; font-size: 1.5rem; }
        .event-item { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="digital-clock" class="digital-clock">00:00</div>
    <div id="live-status-bar">Laster status...</div>
    <h2>Dette skjer:</h2>
    <div id="calendar-list">Laster avtaler fra Google...</div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com';

        function start() {
            gapi.load('client', () => {
                gapi.client.init({
                    apiKey: API_KEY,
                    discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"]
                }).then(() => {
                    console.log("API initialisert");
                    fetchEvents();
                    setInterval(fetchEvents, 60000); // Oppdater hvert minutt
                }).catch(e => document.getElementById('calendar-list').innerText = "Init feil: " + e.message);
            });
        }

        function fetchEvents() {
            gapi.client.calendar.events.list({
                'calendarId': CALENDAR_ID,
                'timeMin': new Date().toISOString(),
                'singleEvents': true,
                'orderBy': 'startTime'
            }).then(res => {
                const list = document.getElementById('calendar-list');
                list.innerHTML = '';
                const items = res.result.items || [];
                if (items.length === 0) { list.innerText = "Ingen avtaler funnet."; return; }
                
                items.forEach(ev => {
                    let time = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'}) : "Hele dagen";
                    list.innerHTML += `<div class='event-item'><b>${time}</b>: ${ev.summary}</div>`;
                });
            }).catch(e => {
                document.getElementById('calendar-list').innerText = "Kunne ikke hente avtaler. Sjekk at kalenderen er offentlig.";
            });
        }

        setInterval(() => {
            const n = new Date();
            document.getElementById('digital-clock').textContent = n.toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'});
            document.body.classList.toggle('night-mode', n.getHours() < 7 || n.getHours() >= 22);
        }, 1000);

        start();
    </script>
</body>
</html>
