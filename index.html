<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Digital Klokke med Rullende Månedskalender</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            height: 100vh;
            padding: 25px 20px 20px 20px; 
            overflow: hidden;
            transition: background 1.5s ease, color 1.5s ease;
            
            /* SPERRE FOR BERØRING PÅ BAKGRUNN */
            pointer-events: none; 
            user-select: none;
        }

        /* --- SENIOR-OPTIMALISERTE TEMAER --- */
        .day-mode { 
            background: linear-gradient(135deg, #e4e9ed 0%, #b9c6d2 100%); 
            color: #111111; 
        }
        .day-mode .glass-panel {
            background: rgba(255, 255, 255, 0.95); 
            border: 3px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }
        .day-mode .day-card {
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        /* Tomme faste kort (I går/I dag) får en litt mer dempet stil enn de aktive */
        .day-mode .day-card.empty-fixed {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: none;
            opacity: 0.7;
        }
        .day-mode .yesterday-card {
            background: rgba(220, 225, 230, 0.6);
            border: 2px solid rgba(180, 190, 200, 0.5);
        }
        .day-mode .today-card {
            background: #ffffff;
            border: 5px solid #0066cc; 
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.2);
            opacity: 1 !important;
        }
        .day-mode .event-item { background: #f2f2f7; border: 1px solid #d1d1d6; }
        .day-mode .no-events { color: #666666; }
        .day-mode .scroll-indicator { color: #0066cc; background: rgba(255,255,255,0.9); }

        .night-mode { 
            background: linear-gradient(135deg, #0b0f19 0%, #17273a 100%); 
            color: #ffffff; 
        }
        .night-mode .glass-panel {
            background: rgba(20, 20, 22, 0.98);
            border: 3px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }
        .night-mode .day-card {
            background: rgba(44, 44, 46, 0.85);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .night-mode .day-card.empty-fixed {
            background: rgba(28, 28, 30, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.02);
            box-shadow: none;
            opacity: 0.6;
        }
        .night-mode .yesterday-card {
            background: rgba(28, 28, 30, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.04);
        }
        .night-mode .today-card {
            background: rgba(44, 44, 46, 1);
            border: 5px solid #0a84ff;
            box-shadow: 0 10px 25px rgba(10, 132, 255, 0.3);
            opacity: 1 !important;
        }
        .night-mode .event-item { background: #2c2c2e; border: 1px solid #3a3a3c; }
        .night-mode .no-events { color: #8e8e93; }
        .night-mode .scroll-indicator { color: #0a84ff; background: rgba(44,44,46,0.9); }

        /* --- STARTKNAPPEN FOR OPPSTART --- */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1c1c1e;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            pointer-events: auto !important;
        }

        .start-btn {
            padding: 25px 60px;
            font-size: 3vw;
            font-weight: 700;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 8px; 
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.3);
        }

        /* --- ØVERSTE DEL: TITELPANEL --- */
        .top-section {
            width: 100%;
            max-width: 1400px; 
            border-radius: 8px; 
            padding: 20px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px; 
        }

        .time {
            font-size: 11vw; 
            font-weight: 800;
            line-height: 0.85;
            letter-spacing: -2px;
        }

        .right-info {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
        }

        .date-container {
            font-size: 4.2vw; 
            font-weight: 800;  
            text-transform: capitalize;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 12px;
        }

        .period-container {
            font-size: 3.5vw; 
            font-weight: 800;
            padding: 10px 24px;
            border-radius: 8px;
            line-height: 1;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* --- NEDERSTE DEL: HORISONTALSKROLLENDE KALENDER --- */
        .calendar-section {
            width: 100%;
            max-width: 1400px; 
            flex-grow: 1; 
            display: flex;
            margin-bottom: 5px;
            overflow-x: auto; 
            scroll-behavior: smooth; 
            
            /* ÅPNER KUN BERØRING FOR KALENDERSEKSJONEN */
            pointer-events: auto !important; 
            scrollbar-width: none; 
        }
        .calendar-section::-webkit-scrollbar {
            display: none;
        }

        .calendar-grid {
            display: flex; 
            gap: 15px;
            height: 100%; 
        }

        .day-card {
            width: calc((1400px - (6 * 15px)) / 7); 
            flex-shrink: 0; 
            border-radius: 8px; 
            padding: 18px 10px;
            height: 100%; 
            display: flex;
            flex-direction: column;
            position: relative; 
            transition: all 0.5s ease;
        }

        @media (max-width: 1400px) {
            .day-card {
                width: calc((100vw - 40px - (6 * 15px)) / 7); 
            }
        }

        .day-name {
            font-size: 1.4vw; 
            font-weight: 800;
            text-align: center;
            padding-bottom: 12px;
            margin-bottom: 15px;
            border-bottom: 3px solid rgba(128, 128, 128, 0.2);
            letter-spacing: -0.2px;
            line-height: 1.2;
            flex-shrink: 0;
        }

        .yesterday-card .day-name { color: #666666; }
        .night-mode .yesterday-card .day-name { color: #aaaaaa; }

        .today-card .day-name { 
            color: #0052cc; 
            font-size: 1.6vw;  
        }
        .night-mode .today-card .day-name { color: #3399ff; }

        .event-list-wrapper {
            position: relative;
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .event-list {
            font-size: 1.15vw; 
            list-style: none;
            overflow-y: auto; 
            scroll-behavior: smooth;
            flex-grow: 1;
            padding-bottom: 25px; 
            scrollbar-width: none; 
        }
        .event-list::-webkit-scrollbar {
            display: none;
        }

        .event-item {
            margin-bottom: 10px;
            padding: 10px 10px;
            border-radius: 4px; 
            line-height: 1.3;
            font-weight: 600; 
            border-left: 6px solid #e65100; 
        }

        .yesterday-card .event-item {
            opacity: 0.6;
            border-left: 6px solid #888888;
        }

        .event-time {
            font-weight: 800;
            display: block;
            font-size: 1.1vw;
            margin-bottom: 4px;
            color: #cc4400; 
        }
        .night-mode .event-time { color: #ff9f0a; }
        .yesterday-card .event-time { color: #555555 !important; }
        .night-mode .yesterday-card .event-time { color: #aaaaaa !important; }
        
        .no-events {
            text-align: center;
            font-size: 1.2vw;
            margin-top: 40px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 1.4vw;
            font-weight: 900;
            width: 28px;
            height: 28px;
            display: none; 
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            z-index: 10;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="startApp()">Start systemet</button>
    </div>

    <div class="top-section glass-panel">
        <div class="time" id="clock">00:00</div>
        <div class="right-info">
            <div class="date-container" id="date">Ukedag, 1. januar</div>
            <div class="period-container" id="period">Det er...</div>
        </div>
    </div>

    <div class="calendar-section" id="scroll-container">
        <div class="calendar-grid" id="calendar-grid">
            </div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        // --- KONFIGURASJON ---
        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com'; 

        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["januar", "februar", "mars", "april", "mai", "juni", "juli", "august", "september", "oktober", "november", "desember"];
        
        let wakeLock = null;
        let returnTimeout = null;
        const scrollContainer = document.getElementById('scroll-container');

        function resetReturnTimer() {
            clearTimeout(returnTimeout);
            returnTimeout = setTimeout(() => {
                scrollContainer.scrollTo({ left: 0, behavior: 'smooth' });
                const activeLists = document.querySelectorAll('.event-list');
                activeLists.forEach(list => {
                    list.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }, 180000);
        }

        scrollContainer.addEventListener('touchstart', resetReturnTimer);
        scrollContainer.addEventListener('touchmove', resetReturnTimer);
        scrollContainer.addEventListener('mousemove', resetReturnTimer);
        scrollContainer.addEventListener('scroll', resetReturnTimer);

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.addEventListener('visibilitychange', async () => {
                        if (wakeLock !== null && document.visibilityState === 'visible') {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                }
            } catch (err) { console.log("Skjermlås ikke tilgjengelig."); }
        }

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';

            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) { docElm.requestFullscreen(); } 
                else if (docElm.webkitRequestFullscreen) { docElm.webkitRequestFullscreen(); }
            } catch (fErr) { console.log("Fullskjerm hoppet over."); }

            requestWakeLock();

            updateClockAndLayout();
            generateCalendarGrid(); 
            resetReturnTimer();
            
            try {
                gapi.load('client', () => {
                    fetchCalendarEvents();
                    setInterval(fetchCalendarEvents, 300000); 
                });
            } catch (gErr) { console.log("Google API lastefeil: ", gErr); }
        }

        function updateClockAndLayout() {
            const now = new Date();
            
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            
            try {
                hours = now.toLocaleTimeString('no-NO', { hour: '2-digit', hour12: false, timeZone: 'Europe/Oslo' });
                minutes = now.toLocaleTimeString('no-NO', { minute: '2-digit', timeZone: 'Europe/Oslo' }).padStart(2, '0');
            } catch(e) {}
            
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            let dateString = "Ukedag";
            try {
                const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Europe/Oslo' };
                dateString = now.toLocaleDateString('no-NO', options).replace('.', '');
            } catch(e) {}
            document.getElementById('date').textContent = dateString;

            const intHours = parseInt(hours, 10);
            const isNight = (intHours >= 22 || intHours < 7);
            document.body.className = isNight ? "night-mode" : "day-mode";

            let periodText = "";
            let periodBg = "";
            let periodFg = "";
            
            if (intHours >= 7 && intHours < 9) { 
                periodText = "Det er morgen"; 
                periodBg = isNight ? "#ffcc00" : "#ffebd6"; 
                periodFg = isNight ? "#000000" : "#7a583a";
            } else if (intHours >= 9 && intHours < 12) { 
                periodText = "Det er formiddag"; 
                periodBg = isNight ? "#ff9f0a" : "#ffe0cc"; 
                periodFg = isNight ? "#000000" : "#a63a00";
            } else if (intHours >= 12 && intHours < 18) { 
                periodText = "Det er ettermiddag"; 
                periodBg = isNight ? "#ffffff" : "#e2e2e7"; 
                periodFg = "#111111";
            } else if (intHours >= 18 && intHours < 22) { 
                periodText = "Det er kveld"; 
                periodBg = isNight ? "#ff9f0a" : "#ffe0cc"; 
                periodFg = isNight ? "#000000" : "#ba4300";
            } else { 
                periodText = "Det er natt"; 
                periodBg = isNight ? "#1f3a60" : "#003bb3"; 
                periodFg = "#ffffff";
            }

            const periodElement = document.getElementById('period');
            periodElement.textContent = periodText;
            periodElement.style.backgroundColor = periodBg;
            periodElement.style.color = periodFg;
        }

        function updateScrollIndicators(listEl, indicatorEl) {
            const hasMoreToScroll = listEl.scrollHeight > listEl.clientHeight;
            const isAtBottom = listEl.scrollHeight - listEl.scrollTop <= listEl.clientHeight + 5;

            if (hasMoreToScroll && !isAtBottom) {
                indicatorEl.style.display = 'flex'; 
            } else {
                indicatorEl.style.display = 'none'; 
            }
        }

        function generateCalendarGrid(eventsByDay = {}) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const today = new Date();

            for (let i = -1; i < 30; i++) {
                const currentDay = new Date();
                currentDay.setDate(today.getDate() + i);
                
                const dayString = currentDay.toISOString().split('T')[0];
                const isYesterday = i === -1;
                const isToday = i === 0;
                
                let eventsHtml = '';
                let hasValidEvents = false;

                if (eventsByDay[dayString] && eventsByDay[dayString].length > 0) {
                    eventsByDay[dayString].forEach(ev => {
                        hasValidEvents = true;
                        let timeStr = 'Hele dagen';
                        try {
                            timeStr = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit', timeZone: 'Europe/Oslo'}) : 'Hele dagen';
                        } catch(e) {}
                        eventsHtml += `<li class="event-item"><span class="event-time">${timeStr}</span>${ev.summary}</li>`;
                    });
                }

                // RADIKAL DESIGN-OPPDATERING: 
                // Hvis det ikke er noen planer, og det er en fremtidig dag (ikke i går eller i dag), HOPPER VI OVER HELE DAGEN!
                if (!hasValidEvents && !isYesterday && !isToday) {
                    continue; 
                }

                if (!hasValidEvents) {
                    eventsHtml += '<li class="no-events">Ingen planer</li>';
                }

                const card = document.createElement('div');
                
                if (isYesterday) {
                    card.className = 'day-card yesterday-card';
                } else if (isToday) {
                    card.className = 'day-card today-card';
                } else {
                    card.className = 'day-card';
                }
                
                // Hvis i går eller i dag er tomme, gir vi dem en litt mer dempet stil for ryddighet
                if (!hasValidEvents && (isYesterday || isToday)) {
                    card.classList.add('empty-fixed');
                }
                
                let dayName = ukeDager[currentDay.getDay()];
                const dateNum = currentDay.getDate();
                const monthName = maaneder[currentDay.getMonth()];
                
                if (isYesterday) {
                    dayName = `I GÅR<br>${dateNum}. ${monthName}`;
                } else if (isToday) {
                    dayName = `I DAG<br>${dateNum}. ${monthName}`;
                } else {
                    dayName = `${dayName.toUpperCase()}<br>${dateNum}. ${monthName}`;
                }

                card.innerHTML = `
                    <div class="day-name">${dayName}</div>
                    <div class="event-list-wrapper">
                        <ul class="event-list" id="list-${dayString}">${eventsHtml}</ul>
                        <div class="scroll-indicator" id="arrow-${dayString}">↓</div>
                    </div>
                `;
                
                grid.appendChild(card);

                const listEl = card.querySelector('.event-list');
                const indicatorEl = card.querySelector('.scroll-indicator');

                listEl.addEventListener('scroll', () => {
                    updateScrollIndicators(listEl, indicatorEl);
                    resetReturnTimer();
                });
                listEl.addEventListener('touchstart', resetReturnTimer);
                listEl.addEventListener('touchmove', resetReturnTimer);

                setTimeout(() => updateScrollIndicators(listEl, indicatorEl), 100);
            }
        }

        function fetchCalendarEvents() {
            if (API_KEY === 'DIN_GOOGLE_API_KEY') { return; }

            gapi.client.init({
                'apiKey': API_KEY,
                'discoveryDocs': ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
            }).then(function() {
                const startPeriod = new Date();
                startPeriod.setDate(startPeriod.getDate() - 1);
                startPeriod.setHours(0,0,0,0);
                
                const endPeriod = new Date();
                endPeriod.setDate(endPeriod.getDate() + 31); 

                return gapi.client.calendar.events.list({
                    'calendarId': CALENDAR_ID,
                    'timeMin': startPeriod.toISOString(),
                    'timeMax': endPeriod.toISOString(),
                    'showDeleted': false,
                    'singleEvents': true,
                    'orderBy': 'startTime'
                });
            }).then(function(response) {
                const events = response.result.items;
                const eventsByDay = {};

                events.forEach(event => {
                    const start = event.start.dateTime || event.start.date;
                    const dateKey = start.split('T')[0];
                    if (!eventsByDay[dateKey]) { eventsByDay[dateKey] = []; }
                    eventsByDay[dateKey].push(event);
                });

                generateCalendarGrid(eventsByDay);
            }).catch(err => {
                console.log("Feil: ", err);
                generateCalendarGrid();
            });
        }

        setInterval(updateClockAndLayout, 5000);
    </script>
</body>
</html>
