<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Digital og Analog Seniorkalender</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff" id="theme-meta">
    
    <link rel="shortcut icon" href="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/calendar_today/default/48px.svg">
    <link rel="manifest" href='data:application/json,{"name":"Seniorkalender","short_name":"Kalender","start_url":".","display":"standalone","orientation":"landscape","background_color":"#ffffff","theme_color":"#ffffff"}'>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            font-family: 'Lato', sans-serif;
            overflow: hidden;
            user-select: none;
            
            /* SIKKERHETSSONE FOR DET FYSISKE DEKSELET (LANDSKAP) */
            padding: 79px 60px 74px 60px; 
            transition: background 1.5s ease, color 1.5s ease;
        }

        /* --- TEMAER --- */
        body.day-mode { 
            background: #ffffff; 
            color: #1e293b; 
        }
        body.night-mode { 
            background: #0f172a; 
            color: #f8fafc; 
        }

        /* --- RESPONSIVT LAYOUT MED GRID --- */
        .main-layout {
            display: grid;
            grid-template-columns: 50% 1fr;
            gap: 40px;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* --- VENSTRE HALVDEL: KLOKKER OG DATO --- */
        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            border-right: 1px solid rgba(0,0,0,0.08);
            padding-right: 20px;
        }
        .night-mode .left-panel {
            border-right: 1px solid rgba(255,255,255,0.08);
        }

        /* Analog Klokke (Landskap) */
        .analog-clock-svg {
            width: 390px;
            height: 390px;
            max-width: 98%;
        }
        
        .clock-face { fill: none; }
        .tick-minute { stroke: #334155; stroke-width: 0.6; }
        .tick-hour { stroke: #1e293b; stroke-width: 2.8; stroke-linecap: round; }
        .clock-number { 
            font-family: 'Poppins', sans-serif; 
            font-weight: 700; 
            font-size: 8.5px; 
            fill: #1e293b; 
            text-anchor: middle; 
            dominant-baseline: middle; 
        }

        .hand { stroke-linecap: round; }
        .hand-hour { stroke: #1e293b; stroke-width: 5.5; }
        .hand-minute { stroke: #1e293b; stroke-width: 4; }
        .hand-second { stroke: #ef4444; stroke-width: 1.3; }
        .center-dot { fill: #ef4444; }

        .night-mode .tick-minute { stroke: #94a3b8; }
        .night-mode .tick-hour, .night-mode .clock-number, .night-mode .hand-hour, .night-mode .hand-minute { fill: #f8fafc; stroke: #f8fafc; }

        /* Digital ur (Landskap) */
        .digital-time {
            font-family: 'Poppins', sans-serif;
            font-size: 9.5vw;
            font-weight: 700;
            line-height: 0.9;
            margin: 5px 0;
            letter-spacing: -4px;
            text-align: center;
        }

        .date-display {
            text-align: center;
            width: 100%;
        }

        .date-text {
            font-family: 'Poppins', sans-serif;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        /* DØGNPERIODE */
        .period-text {
            font-family: 'Poppins', sans-serif; 
            font-size: 32px; 
            font-weight: 700;
            background: #e2e8f0; 
            padding: 10px 40px; 
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: color 1s ease, background 1s ease;
        }
        
        .period-morgen { color: #e11d48; background: #ffe4e6; }       
        .period-formiddag { color: #ea580c; background: #ffedd5; }    
        .period-ettermiddag { color: #991b1b; background: #f1f5f9; }  
        .period-kveld { color: #be123c; background: #ffe4e6; }        
        
        .night-mode .period-text { 
            background: #1e293b; 
            color: #94a3b8; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .night-mode .period-text.period-natt {
            color: #38bdf8; 
            background: #1e293b;
        }

        /* --- HØYRE PANEL: AVTALER --- */
        .right-panel {
            height: 100%;
            overflow-y: auto;
            scrollbar-width: none;
            padding-bottom: 100px; 
            pointer-events: auto !important;
            scroll-snap-type: y mandatory;
        }
        .right-panel::-webkit-scrollbar { 
            display: none; 
        }

        /* JON: Strammet opp marger og padding for å fjerne det store rød-markerte tomrommet */
        .day-section {
            width: 100%;
            margin-bottom: 4px; /* Minimal margin i bunn av selve boksen */
            padding: 0px 20px 20px 20px; /* Fjernet topp-padding så vanlige dager rykker opp */
            border-radius: 12px;
            border: 1px solid transparent; 
            background-color: transparent;
            transition: background 0.5s ease, border 0.5s ease;
            scroll-snap-align: start;
            scroll-margin-top: 20px; 
        }

        /* For i dag beholder vi paddingen rundt hele for at den grå boksen skal se bra ut */
        .day-section.today-highlight {
            padding: 20px; 
            background-color: #f1f5f9; 
            border: 1px solid #cbd5e1;
            margin-bottom: 24px; /* Gir nøyaktig samme avstand nedover som den grønne sonen din */
        }
        
        .night-mode .day-section.today-highlight {
            background-color: #1e293b; 
            border: 1px solid #334155;
        }

        .day-title {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px; 
            text-transform: capitalize;
            display: flex;
            align-items: center;
        }

        .today-badge {
            font-size: 16px;
            background: #ef4444;
            color: white;
            padding: 2px 12px;
            border-radius: 6px;
            margin-left: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .holiday-text {
            font-size: 18px;
            color: #ef4444;
            font-weight: 700;
            font-style: italic;
            margin-top: -6px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .event-list {
            list-style: none;
            padding-left: 25px;
        }

        .event-item {
            font-size: 22px;
            margin-bottom: 10px; 
            line-height: 1.3;
            position: relative;
            font-weight: 400;
        }

        .event-item::before {
            content: "•";
            position: absolute;
            left: -25px;
            font-size: 28px;
            line-height: 1;
            color: #64748b;
        }

        .event-time {
            color: #ef4444; 
            font-weight: 700;
            margin-right: 10px;
        }
        .night-mode .event-time { color: #f87171; }

        /* --- GUL SKROLLEKNAPP --- */
        .scroll-hint-btn {
            position: absolute;
            bottom: 45px; 
            right: 45px;  
            width: 85px;
            height: 85px;
            background: #ffde00; 
            border: 4px solid #ffffff; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
            z-index: 9999;
            cursor: pointer;
            pointer-events: auto !important; 
            transition: opacity 0.4s ease, transform 0.4s ease;
            animation: miniPulseBounce 2.5s infinite;
        }
        
        .night-mode .scroll-hint-btn {
            background: #eab308; 
            border-color: #0f172a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .scroll-arrow-svg {
            width: 50px;
            height: 50px;
        }

        .scroll-arrow-path {
            fill: none;
            stroke: #d00000; 
            stroke-width: 5.5; 
            stroke-linecap: round; 
            stroke-linejoin: round; 
        }

        @keyframes miniPulseBounce {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.06) translateY(6px); }
        }

        /* --- AUTOMATISK PORTRETTMODUS --- */
        @media (max-width: 900px) or (orientation: portrait) {
            body {
                padding: 50px 45px 40px 45px;
                overflow-y: auto; 
            }
            
            .main-layout {
                grid-template-columns: 1fr; 
                grid-template-rows: auto 1fr;
                gap: 45px;
                height: auto;
                overflow: visible;
            }

            .left-panel {
                border-right: none;
                border-bottom: 1px solid rgba(0,0,0,0.08);
                padding-right: 0;
                padding-bottom: 25px;
                height: auto;
            }

            .analog-clock-svg {
                width: 340px;
                height: 340px;
            }

            .digital-time { 
                font-size: 14vw; 
                letter-spacing: -4px;
                margin: 5px 0;
            }
            
            .date-text { 
                font-size: 26px;
                margin-bottom: 20px; 
            }
            .period-text { font-size: 28px; }

            .right-panel {
                scroll-snap-type: none; 
                height: auto;
                overflow: visible;
                padding-bottom: 120px; 
            }

            .scroll-hint-btn {
                position: fixed;
                bottom: 50px; 
                right: 50px;  
            }
        }

        /* START-OVERLAY FOR KIOSK-OPPSTART */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            display: flex; justify-content: center; align-items: center;
            z-index: 99999;
            pointer-events: auto !important;
        }
        .start-btn {
            padding: 25px 50px;
            font-size: 28px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto !important;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            animation: pulseBtn 2s infinite;
        }
        
        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 15px 40px rgba(59, 130, 246, 0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
        }
    </style>
</head>
<body class="day-mode">

    <div id="start-overlay">
        <button class="start-btn" onclick="startApp()">Vis klokke & kalender</button>
    </div>

    <div class="main-layout" id="layout-box">
        
        <div class="left-panel">
            <svg class="analog-clock-svg" viewBox="0 0 100 100" id="analog-clock">
                <circle cx="50" cy="50" r="48" class="clock-face" />
                <g id="ticks"></g>
                <g id="numbers"></g>
                <line id="hour-hand" class="hand hand-hour" x1="50" y1="50" x2="50" y2="30" />
                <line id="minute-hand" class="hand hand-minute" x1="50" y1="50" x2="50" y2="18" />
                <line id="second-hand" class="hand hand-second" x1="50" y1="50" x2="50" y2="12" />
                <circle cx="50" cy="50" r="2.5" class="center-dot" />
            </svg>

            <div class="date-display">
                <div class="digital-time" id="digital-clock">00:00</div>
                <div class="date-text" id="date-text">Ukedag 1. januar</div>
                <div class="period-text" id="period-text">Det er...</div>
            </div>
        </div>

        <div class="right-panel" id="event-container">
            </div>

        <div class="scroll-hint-btn" id="scroll-hint-element" onclick="scrollCalendarDown()">
            <svg class="scroll-arrow-svg" viewBox="0 0 24 24">
                <path class="scroll-arrow-path" d="M 12 4 L 12 18 M 6 12 L 12 18 L 18 12"/>
            </svg>
        </div>

    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        // --- GOOGLE API-KONFIGURASJON ---
        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com'; 
        const HOLIDAY_CALENDAR_ID = 'no.norwegian#holiday@group.v.calendar.google.com'; 

        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];
        
        let globalEventsCache = {}; 
        let globalHolidaysCache = {}; 
        let wakeLock = null;
        let inactivityTimeout = null;

        function buildClockUI() {
            const ticksG = document.getElementById('ticks');
            const numsG = document.getElementById('numbers');
            ticksG.innerHTML = '';
            numsG.innerHTML = '';
            
            for (let i = 0; i < 60; i++) {
                const isHour = i % 5 === 0;
                const angle = (i * 6) * (Math.PI / 180);
                const r1 = isHour ? 41 : 44;
                const r2 = 48;
                const x1 = 50 + r1 * Math.sin(angle);
                const y1 = 50 - r1 * Math.cos(angle);
                const x2 = 50 + r2 * Math.sin(angle);
                const y2 = 50 - r2 * Math.cos(angle);
                
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1); line.setAttribute("y1", y1);
                line.setAttribute("x2", x2); line.setAttribute("y2", y2);
                line.classList.add(isHour ? "tick-hour" : "tick-minute");
                ticksG.appendChild(line);
            }

            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30) * (Math.PI / 180);
                const r = 33; 
                const x = 50 + r * Math.sin(angle);
                const y = 50 - r * Math.cos(angle) + 0.5; 
                
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", x); txt.setAttribute("y", y);
                txt.classList.add("clock-number");
                txt.textContent = i;
                numsG.appendChild(txt);
            }
        }

        function updateClockAndLayout() {
            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            const h = now.getHours();

            document.getElementById('second-hand').setAttribute('transform', `rotate(${s * 6} 50 50)`);
            document.getElementById('minute-hand').setAttribute('transform', `rotate(${m * 6 + s * 0.1} 50 50)`);
            document.getElementById('hour-hand').setAttribute('transform', `rotate(${(h % 12) * 30 + m * 0.5} 50 50)`);

            let hoursStr = String(h).padStart(2, '0');
            let minutesStr = String(m).padStart(2, '0');
            try {
                hoursStr = now.toLocaleTimeString('no-NO', { hour: '2-digit', hour12: false, timeZone: 'Europe/Oslo' });
                minutesStr = now.toLocaleTimeString('no-NO', { minute: '2-digit', timeZone: 'Europe/Oslo' }).padStart(2, '0');
            } catch(e) {}
            document.getElementById('digital-clock').textContent = `${hoursStr}:${minutesStr}`;

            const dayName = ukeDager[now.getDay()];
            const dayNum = now.getDate();
            const monthName = maaneder[now.getMonth()].toLowerCase();
            const yearNum = now.getFullYear();
            document.getElementById('date-text').textContent = `${dayName} ${dayNum}. ${monthName} ${yearNum}`;

            if (h === 0 && m === 0 && s === 0) {
                renderCalendarList(); 
            }

            const isNight = h >= 22 || h < 7;
            document.body.className = isNight ? "night-mode" : "day-mode";
            
            document.getElementById('theme-meta').setAttribute('content', isNight ? '#0f172a' : '#ffffff');
            
            let periodText = "Det er natt";
            let periodClass = "period-natt";
            
            if (h >= 7 && h < 10) { periodText = "Det er morgen"; periodClass = "period-morgen"; }
            else if (h >= 10 && h < 12) { periodText = "Det er formiddag"; periodClass = "period-formiddag"; }
            else if (h >= 12 && h < 18) { periodText = "Det er ettermiddag"; periodClass = "period-ettermiddag"; }
            else if (h >= 18 && h < 22) { periodText = "Det er kveld"; periodClass = "period-kveld"; }
            
            const periodEl = document.getElementById('period-text');
            periodEl.textContent = periodText;
            periodEl.className = "period-text " + periodClass;
        }

        function renderCalendarList() {
            const container = document.getElementById('event-container');
            container.innerHTML = '';
            
            const today = new Date();
            const todayKey = today.toISOString().split('T')[0];
            let totalDaysRendered = 0;

            for (let i = 0; i < 30; i++) {
                const currentDay = new Date();
                currentDay.setDate(today.getDate() + i);
                const dateKey = currentDay.toISOString().split('T')[0];

                const hasPersonalEvents = globalEventsCache[dateKey] && globalEventsCache[dateKey].length > 0;
                const hasHoliday = globalHolidaysCache[dateKey];

                if (!hasPersonalEvents && !hasHoliday) {
                    continue;
                }

                totalDaysRendered++;

                const daySection = document.createElement('div');
                daySection.className = 'day-section';
                
                if (dateKey === todayKey) {
                    daySection.className += ' today-highlight';
                }

                const dayName = ukeDager[currentDay.getDay()];
                const dateNum = currentDay.getDate();
                const monthName = maaneder[currentDay.getMonth()].toLowerCase();
                
                const title = document.createElement('div');
                title.className = 'day-title';
                title.textContent = `${dayName} ${dateNum}. ${monthName}:`;
                
                if (dateKey === todayKey) {
                    title.innerHTML += '<span class="today-badge">I dag</span>';
                }
                
                daySection.appendChild(title);

                if (hasHoliday) {
                    const holDiv = document.createElement('div');
                    holDiv.className = 'holiday-text';
                    holDiv.textContent = globalHolidaysCache[dateKey];
                    daySection.appendChild(holDiv);
                }

                if (hasPersonalEvents) {
                    const list = document.createElement('ul');
                    list.className = 'event-list';

                    globalEventsCache[dateKey].forEach(ev => {
                        const li = document.createElement('li');
                        li.className = 'event-item';

                        let timeStr = 'Hele dagen';
                        if (ev.start.dateTime) {
                            const d = new Date(ev.start.dateTime);
                            timeStr = d.toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit', timeZone: 'Europe/Oslo'}).replace(':', '.');
                        }

                        li.innerHTML = `<span class="event-time">${timeStr}:</span>${ev.summary || ''}`;
                        list.appendChild(li);
                    });
                    daySection.appendChild(list);
                }

                container.appendChild(daySection);
            }

            if (totalDaysRendered === 0) {
                const noEvContainer = document.createElement('div');
                noEvContainer.className = 'no-events-container';
                noEvContainer.innerHTML = '<div class="no-events-text">Ingen planer de neste 30 dagene</div>';
                container.appendChild(noEvContainer);
            }
        }

        function scrollCalendarDown() {
            resetInactivityTimer();
            const panel = document.getElementById('event-container');
            const isPortrait = window.matchMedia("(max-width: 900px) or (orientation: portrait)").matches;
            
            const firstDaySection = document.querySelector('.day-section');
            const stepHeight = firstDaySection ? firstDaySection.clientHeight + 25 : 250;

            if (isPortrait) {
                window.scrollBy({ top: stepHeight, behavior: 'smooth' });
            } else {
                panel.scrollBy({ top: stepHeight, behavior: 'smooth' });
            }
        }

        function handleScrollVisibility() {
            const panel = document.getElementById('event-container');
            const hint = document.getElementById('scroll-hint-element');
            const currentScroll = panel.scrollTop;

            if (currentScroll > 150) {
                hint.style.opacity = '0';
                hint.style.transform = 'scale(0.5) translateY(15px)';
                hint.style.pointerEvents = 'none';
            } else {
                hint.style.opacity = '1';
                hint.style.transform = 'scale(1) translateY(0)';
                hint.style.pointerEvents = 'auto';
            }
        }

        function fetchCalendarData() {
            if (API_KEY === 'DIN_GOOGLE_API_KEY') return;

            gapi.client.init({
                'apiKey': API_KEY,
                'discoveryDocs': ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
            }).then(function() {
                const start = new Date();
                start.setHours(0,0,0,0);
                const end = new Date();
                end.setDate(end.getDate() + 31);

                const personalRequest = gapi.client.calendar.events.list({
                    'calendarId': CALENDAR_ID,
                    'timeMin': start.toISOString(),
                    'timeMax': end.toISOString(),
                    'singleEvents': true,
                    'orderBy': 'startTime'
                });

                const holidayRequest = gapi.client.calendar.events.list({
                    'calendarId': HOLIDAY_CALENDAR_ID,
                    'timeMin': start.toISOString(),
                    'timeMax': end.toISOString(),
                    'singleEvents': true
                });

                return Promise.all([personalRequest, holidayRequest]);
            }).then(function(responses) {
                const personalEvents = responses[0].result.items;
                const holidayEvents = responses[1].result.items;

                const tempEvents = {};
                personalEvents.forEach(event => {
                    const s = event.start.dateTime || event.start.date;
                    const key = s.split('T')[0];
                    if (!tempEvents[key]) { tempEvents[key] = []; }
                    tempEvents[key].push(event);
                });
                globalEventsCache = tempEvents;

                const tempHolidays = {};
                holidayEvents.forEach(h => {
                    const s = h.start.date || h.start.dateTime;
                    const key = s.split('T')[0];
                    tempHolidays[key] = h.summary;
                });
                globalHolidaysCache = tempHolidays;

                renderCalendarList();
            }).catch(err => {
                console.log("Feil under henting av kalenderdata:", err);
                renderCalendarList();
            });
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(function() {
                const panel = document.getElementById('event-container');
                const isPortrait = window.matchMedia("(max-width: 900px) or (orientation: portrait)").matches;
                if (isPortrait) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (panel) {
                    panel.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }, 180000); 
        }

        function setupInactivityListeners() {
            const panel = document.getElementById('event-container');
            panel.addEventListener('scroll', () => {
                resetInactivityTimer();
                handleScrollVisibility();
            });
            window.addEventListener('scroll', () => {
                resetInactivityTimer();
                handleScrollVisibility();
            });
            window.addEventListener('touchstart', resetInactivityTimer, true);
            window.addEventListener('touchmove', resetInactivityTimer, true);
            window.addEventListener('mousedown', resetInactivityTimer, true);
            resetInactivityTimer();
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            
            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) { docElm.requestFullscreen(); }
                else if (docElm.webkitRequestFullscreen) { docElm.webkitRequestFullscreen(); }
            } catch (e) {}

            requestWakeLock();
            buildClockUI();
            updateClockAndLayout();
            renderCalendarList();
            setupInactivityListeners();
            
            setInterval(updateClockAndLayout, 1000);

            try {
                gapi.load('client', () => {
                    fetchCalendarData();
                    setInterval(fetchCalendarData, 300000); 
                });
            } catch (gErr) {}
        }
    </script>
</body>
</html>
