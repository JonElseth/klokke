<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex, nofollow">
    <title>Eksklusiv Seniorkalender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-color: #f1f5f9; --text-main: #1e293b; --text-muted: #64748b; --clock-accent: #ef4444; --shadow: rgba(0, 0, 0, 0.05); --box-bg: #ffffff; --box-border: #cbd5e1; --highlight-text: #0066cc; --time-of-day-color: #0f172a; }
        body.night-mode { --bg-color: #0f172a; --text-main: #f8fafc; --text-muted: #94a3b8; --shadow: rgba(0, 0, 0, 0.3); --box-bg: #1e293b; --box-border: #334155; --highlight-text: #38bdf8; --time-of-day-color: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; width: 100vw; background-color: var(--bg-color); color: var(--text-main); font-family: 'Poppins', sans-serif; padding: 79px 60px 74px 60px; overflow-y: auto; scrollbar-width: none; transition: background 1s ease, color 1s ease; }
        body::-webkit-scrollbar { display: none; }
        header { height: 110px; display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .digital-clock-big { font-size: 142px; font-weight: 500; letter-spacing: -5px; line-height: 0.72; }
        .time-of-day-wrapper { display: flex; flex-direction: column; align-items: flex-end; }
        .time-of-day-label { font-size: 3.5rem; font-weight: 700; color: var(--time-of-day-color); }
        .header-date-right { font-size: 2.0rem; font-weight: 500; color: var(--text-muted); margin-top: 15px; }
        
        /* Justering for at boksen stikker ut, men tekst flukter */
        .status-box-container { width: calc(100% + 40px); margin: 0 -20px 40px -20px; padding: 30px 50px; background-color: var(--box-bg); border: 1px solid var(--box-border); border-radius: 16px; font-size: 2.2rem; box-shadow: var(--shadow); }
        .status-box-highlight { color: var(--highlight-text); font-weight: 700; }
        
        main { display: flex; }
        .left-column { width: 350px; padding-right: 60px; margin-right: 60px; border-right: 1px dashed var(--text-muted); }
        .right-column { flex: 1; }
        .info-title, .calendar-title { font-size: 2.4rem; font-weight: 500; margin-bottom: 5px; }
        .info-content { font-family: 'Lato', sans-serif; font-size: 1.55rem; padding-left: 40px; }
        
        /* Stiplet linje horisontalt og vertikalt */
        .day-section { width: 100%; margin-bottom: 35px; padding-bottom: 30px; border-bottom: 1px dashed var(--box-border); }
        .day-title { font-family: 'Poppins', sans-serif; font-size: 2.0rem; font-weight: 600; margin-bottom: 14px; padding-left: 40px; }
        .holiday-text { font-size: 1.25rem; color: var(--clock-accent); margin-bottom: 14px; padding-left: 40px; text-transform: uppercase; }
        .event-list { display: flex; flex-direction: column; gap: 28px; padding-left: 40px; }
        .event-item { font-size: 1.55rem; display: flex; align-items: flex-start; }
        .event-time { color: var(--clock-accent); font-weight: 700; margin-right: 6px; }
        .badge-navn { padding: 2px 10px; border-radius: 6px; color: white; font-weight: 700; font-size: 18px; margin-right: 6px; }
        .badge-mamma { background-color: #16a34a; } .badge-pappa { background-color: #d97706; } .badge-begge { background-color: #0891b2; }
    </style>
</head>
<body>
    <header>
        <div class="digital-clock-big" id="digital-clock">00:00</div>
        <div class="time-of-day-wrapper">
            <div class="time-of-day-label" id="time-of-day-label">Laster...</div>
            <div class="header-date-right" id="complete-date-string">Laster dato...</div>
        </div>
    </header>
    <div class="status-box-container" id="live-status-bar">Laster neste avtale...</div>
    <main>
        <div class="left-column">
            <div class="info-title">Rutiner:</div>
            <div class="day-title" id="info-day-heading" style="font-size: 1.75rem; padding-left: 40px;">--</div>
            <div class="info-content" id="info-text">Laster faste rutiner...</div>
        </div>
        <div class="right-column">
            <div class="calendar-title">Avtaler:</div>
            <div id="calendar-list">Laster inn...</div>
        </div>
    </main>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        // =========================================================
        // HER KAN DU ENDRE DINE FASTE RUTINER
        // =========================================================
        const fasteRutinerHverdag = [{ tid: "07.30", tekst: "Frokost" }, { tid: "08.00", tekst: "Ta medisiner" }, { tid: "09.00", tekst: "Tur med hunden" }, { tid: "11.30", tekst: "Lunsj" }, { tid: "14.00", tekst: "Sjekke meldinger" }, { tid: "15.30", tekst: "Middag" }, { tid: "19.30", tekst: "Gå tur med hunden" }, { tid: "20.30", tekst: "Kveldsmat" }];
        const fasteRutinerLoerdag = [{ tid: "07.30", tekst: "Frokost" }, { tid: "08.00", tekst: "Ta medisiner" }, { tid: "09.00", tekst: "Tur med hunden" }, { tid: "12.00", tekst: "Gjerne varm lunsj" }, { tid: "14.00", tekst: "Sjekke meldinger" }, { tid: "15.30", tekst: "Middag" }, { tid: "19.30", tekst: "Gå tur med hunden" }, { tid: "20.30", tekst: "Kveldsmat" }];
        const fasteRutinerSoendag = [{ tid: "07.30", tekst: "Frokost" }, { tid: "08.00", tekst: "Ta medisiner" }, { tid: "09.00", tekst: "Tur med hunden" }, { tid: "13.00", tekst: "Middag" }, { tid: "14.00", tekst: "Sjekke meldinger" }, { tid: "19.30", tekst: "Gå tur med hunden" }, { tid: "20.30", tekst: "Kveldsmat" }];
        // =========================================================

        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com'; 
        const HOLIDAY_CALENDAR_ID = 'no.norwegian#holiday@group.v.calendar.google.com'; 
        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];
        let globalEventsCache = {}; let globalHolidaysCache = {}; let inactivityTimeout = null;

        function resetInactivityTimer() { clearTimeout(inactivityTimeout); inactivityTimeout = setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 180000); }
        function setupInactivityListeners() { ['scroll', 'touchstart', 'touchmove', 'mousedown'].forEach(evt => window.addEventListener(evt, resetInactivityTimer, true)); }
        function genererRutineHTML(rutineListe) { return rutineListe.map(i => `<div class='info-item'><span class='info-bullet'>•</span><span class='info-time'>${i.tid}:</span> ${i.tekst}</div>`).join(''); }

        function oppdaterLiveStatusBoks() {
            const statusEl = document.getElementById('live-status-bar');
            if (!statusEl) return;
            const nå = new Date();
            const dagensNøkkel = nå.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
            const iMorgen = new Date(); iMorgen.setDate(nå.getDate() + 1);
            const morgendagensNøkkel = iMorgen.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
            const sorterteHendelser = [...(globalEventsCache[dagensNøkkel] || []), ...(globalEventsCache[morgendagensNøkkel] || [])]
                .filter(ev => ev.computedStart && new Date(ev.computedStart) > nå)
                .sort((a, b) => new Date(a.computedStart) - new Date(b.computedStart));
            const nesteAvtale = sorterteHendelser[0];
            if (nesteAvtale) {
                const startTid = new Date(nesteAvtale.computedStart);
                const nesteTid = startTid.toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit', timeZone: 'Europe/Oslo'});
                let summary = nesteAvtale.summary || "";
                let hvem = "Neste avtale er";
                if (/^(Mamma\s*&\s*Pappa:|Mamma\s+og\s+Pappa:)/i.test(summary)) { hvem = "Neste avtale er til mamma og pappa:"; summary = summary.replace(/^(Mamma\s*&\s*Pappa:|Mamma\s+og\s+Pappa:)\s*/i, ''); }
                else if (/^Mamma:/i.test(summary)) { hvem = "Neste avtale er til mamma:"; summary = summary.replace(/^Mamma:\s*/i, ''); }
                else if (/^Pappa:/i.test(summary)) { hvem = "Neste avtale er til pappa:"; summary = summary.replace(/^Pappa:\s*/i, ''); }
                statusEl.innerHTML = `${hvem} <span class="status-box-highlight">${summary}</span> ${startTid.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'}) === dagensNøkkel ? "klokken" : "i morgen klokken"} <span class="status-box-highlight">${nesteTid}</span>.`;
            } else { statusEl.innerHTML = `Ingen flere planlagte avtaler de nærmeste timene.`; }
        }

        function formatEventSummary(summary) {
            if (!summary) return '';
            return summary.replace(/^(Mamma\s*&\s*[pP]appa:|Mamma\s+og\s+[pP]appa:)\s*/g, '<span class="badge-navn badge-begge">Mamma & pappa</span> ')
                          .replace(/^[mM]amma:\s*/g, '<span class="badge-navn badge-mamma">Mamma</span> ')
                          .replace(/^[pP]appa:\s*/g, '<span class="badge-navn badge-pappa">Pappa</span> ');
        }

        function renderCalendarList() {
            const container = document.getElementById('calendar-list');
            container.innerHTML = '';
            const today = new Date();
            const todayKey = today.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
            const morgenKey = new Date(today.getTime() + 86400000).toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
            for (let i = 0; i < 60; i++) {
                const d = new Date(today.getTime() + (i * 86400000));
                const dateKey = d.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                if (!globalEventsCache[dateKey] && !globalHolidaysCache[dateKey]) continue;
                const daySection = document.createElement('div'); daySection.className = 'day-section';
                let prefix = dateKey === todayKey ? "I dag, " : dateKey === morgenKey ? "I morgen, " : "";
                daySection.innerHTML = `<div class="day-title">${prefix}${ukeDager[d.getDay()].toLowerCase()} ${d.getDate()}. ${maaneder[d.getMonth()].toLowerCase()}</div>`;
                if (globalHolidaysCache[dateKey]) daySection.innerHTML += `<div class="holiday-text">${globalHolidaysCache[dateKey]}</div>`;
                if (globalEventsCache[dateKey]) {
                    const list = document.createElement('div'); list.className = 'event-list';
                    globalEventsCache[dateKey].forEach(ev => {
                        const timeStr = ev.isAllDay ? "" : new Date(ev.computedStart).toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit', timeZone: 'Europe/Oslo'});
                        list.innerHTML += `<div class="event-item"><span class="event-bullet">•</span><div class="event-text-container">${timeStr ? `<span class="event-time">${timeStr}:</span>` : ""} ${formatEventSummary(ev.summary)}</div></div>`;
                    });
                    daySection.appendChild(list);
                }
                container.appendChild(daySection);
            }
        }

        function updateClockAndLayout() {
            const now = new Date();
            document.getElementById('digital-clock').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.body.classList.toggle('night-mode', now.getHours() < 7 || now.getHours() >= 22);
            document.getElementById('time-of-day-label').innerText = ["natt", "morgen", "formiddag", "ettermiddag", "kveld"][now.getHours() < 6 ? 0 : now.getHours() < 9 ? 1 : now.getHours() < 12 ? 2 : now.getHours() < 18 ? 3 : 4];
            document.getElementById('complete-date-string').textContent = `${ukeDager[now.getDay()].toLowerCase()} ${now.getDate()}. ${maaneder[now.getMonth()].toLowerCase()} ${now.getFullYear()}`;
            const dayOfWeek = now.getDay();
            document.getElementById('info-day-heading').innerText = dayOfWeek === 6 ? "lørdag" : dayOfWeek === 0 ? "søndag" : "mandag - fredag";
            document.getElementById('info-text').innerHTML = genererRutineHTML(dayOfWeek === 6 ? fasteRutinerLoerdag : dayOfWeek === 0 ? fasteRutinerSoendag : fasteRutinerHverdag);
            oppdaterLiveStatusBoks();
        }

        function fetchCalendarData() {
            if (typeof gapi === 'undefined' || !gapi.client) return;
            const start = new Date(); start.setHours(0,0,0,0); const end = new Date(); end.setDate(end.getDate() + 185);
            Promise.all([
                gapi.client.calendar.events.list({ 'calendarId': CALENDAR_ID, 'timeMin': start.toISOString(), 'timeMax': end.toISOString(), 'singleEvents': true, 'orderBy': 'startTime' }),
                gapi.client.calendar.events.list({ 'calendarId': HOLIDAY_CALENDAR_ID, 'timeMin': start.toISOString(), 'timeMax': end.toISOString(), 'singleEvents': true })
            ]).then(res => {
                globalEventsCache = {}; 
                res[0].result.items.forEach(ev => {
                    const k = new Date(ev.start.dateTime || ev.start.date).toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                    if (!globalEventsCache[k]) globalEventsCache[k] = [];
                    ev.computedStart = (ev.start.dateTime || ev.start.date);
                    globalEventsCache[k].push(ev);
                });
                globalHolidaysCache = {}; res[1].result.items.forEach(h => globalHolidaysCache[(h.start.date || h.start.dateTime.split('T')[0])] = h.summary);
                renderCalendarList();
            });
        }
        window.addEventListener('DOMContentLoaded', () => { 
            setupInactivityListeners(); setInterval(updateClockAndLayout, 1000); updateClockAndLayout(); 
            gapi.load('client', () => gapi.client.init({ 'apiKey': API_KEY, 'discoveryDocs': ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"] }).then(() => { fetchCalendarData(); setInterval(fetchCalendarData, 300000); })); 
        });
    </script>
</body>
</html>
