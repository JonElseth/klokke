<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="robots" content="noindex, nofollow">
    <title>Eksklusiv Seniorkalender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f1f5f9; --text-main: #1e293b; --text-muted: #64748b; --clock-accent: #ef4444; --box-bg: #ffffff; --box-border: #cbd5e1; --highlight-text: #0066cc; }
        body.night-mode { --bg-color: #0f172a; --text-main: #f8fafc; --text-muted: #94a3b8; --box-bg: #1e293b; --box-border: #334155; --highlight-text: #38bdf8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; width: 100vw; background-color: var(--bg-color); color: var(--text-main); font-family: 'Poppins', sans-serif; user-select: none; display: flex; flex-direction: column; overflow-y: auto; padding: 79px 60px 74px 60px; transition: background 1s ease, color 1s ease; }
        header { height: 110px; display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .digital-clock-big { font-size: 142px; font-weight: 500; letter-spacing: -5px; line-height: 0.72; }
        .header-date-right { text-align: right; font-size: 1.6rem; font-weight: 500; }
        .status-box-container { width: 100%; margin-bottom: 40px; padding: 24px; background-color: var(--box-bg); border: 1px solid var(--box-border); border-radius: 16px; box-shadow: rgba(0,0,0,0.05) 0 4px 6px; font-size: 1.6rem; line-height: 1.5; }
        .status-box-highlight { color: var(--highlight-text); font-weight: 500; }
        main { flex: 1; display: flex; }
        .left-column { width: max-content; padding-right: 60px; margin-right: 60px; border-right: 1px dashed var(--text-muted); }
        .right-column { flex: 1; }
        .info-title, .calendar-title { font-size: 2.4rem; font-weight: 500; margin-bottom: 14px; }
        .info-content { display: flex; flex-direction: column; gap: 6px; font-family: 'Lato', sans-serif; font-size: 1.55rem; padding-left: 80px; }
        .info-item { display: flex; align-items: flex-start; }
        .info-time { color: var(--clock-accent); font-weight: 700; margin-right: 5px; }
        .day-section { width: 100%; margin-bottom: 65px; }
        .day-title { display: flex; align-items: center; gap: 15px; font-size: 1.75rem; margin-bottom: 14px; padding-left: 40px; }
        .today-badge { font-size: 15px; background: var(--clock-accent); color: white; padding: 3px 14px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }
        .event-list { display: flex; flex-direction: column; gap: 28px; padding-left: 80px; }
        .event-item { font-family: 'Lato', sans-serif; font-size: 1.55rem; display: flex; align-items: flex-start; }
        .event-time { color: var(--clock-accent); font-weight: 700; margin-right: 6px; }
        .badge-navn { padding: 2px 10px; border-radius: 6px; font-weight: 700; color: #fff !important; margin-right: 6px; font-size: 18px; }
        .badge-mamma { background-color: #16a34a; } .badge-pappa { background-color: #d97706; } .badge-begge { background-color: #0891b2; }
    </style>
</head>
<body>
    <header>
        <div class="header-clocks-left"><div class="digital-clock-big" id="digital-clock">00:00</div></div>
        <div class="header-date-right" id="complete-date-string">Laster dato...</div>
    </header>
    <div class="status-box-container" id="live-status-bar">Laster tidsstatus...</div>
    <main>
        <div class="column left-column">
            <div class="info-title">Rutiner:</div>
            <div class="info-day-title" id="info-day-heading">--</div>
            <div class="info-content" id="info-text"></div>
        </div>
        <div class="column right-column">
            <div class="calendar-title">Dette skjer:</div>
            <div id="calendar-list">Laster...</div>
        </div>
    </main>
    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com'; 
        const HOLIDAY_ID = 'no.norwegian#holiday@group.v.calendar.google.com';
        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];
        let globalEventsCache = {}, globalHolidaysCache = {};

        function hentTid(ev) {
            let t = ev.summary.match(/([0-2]?[0-9])[\.:]([0-5][0-9])/);
            if (t) return { timer: parseInt(t[1],10), minutter: parseInt(t[2],10), erHeldags: false };
            if (ev.isAllDay) return { timer: 99, minutter: 0, erHeldags: true };
            let d = new Date(ev.computedStart);
            return { timer: d.getHours(), minutter: d.getMinutes(), erHeldags: false };
        }

        function renderCalendarList() {
            const container = document.getElementById('calendar-list');
            container.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                let d = new Date(); d.setDate(d.getDate() + i);
                let key = d.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                if ((!globalEventsCache[key] || globalEventsCache[key].length === 0) && !globalHolidaysCache[key]) continue;
                
                let section = document.createElement('div');
                section.className = 'day-section';
                section.innerHTML = `<div class='day-title'><span>${ukeDager[d.getDay()].toLowerCase()} ${d.getDate()}. ${maaneder[d.getMonth()].toLowerCase()} ${d.getFullYear()}</span>${key === new Date().toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'}) ? '<span class="today-badge">I dag</span>' : ''}</div>` + (globalHolidaysCache[key] ? `<div class='holiday-text'>${globalHolidaysCache[key]}</div>` : '');
                
                if (globalEventsCache[key]) {
                    let list = document.createElement('div'); list.className = 'event-list';
                    [...globalEventsCache[key]].sort((a,b) => {
                        let aT = hentTid(a), bT = hentTid(b);
                        return (aT.timer - bT.timer) || (aT.minutter - bT.minutter);
                    }).forEach(ev => {
                        let t = hentTid(ev);
                        let tStr = t.erHeldags ? 'Hele dagen' : `${String(t.timer).padStart(2,'0')}.${String(t.minutter).padStart(2,'0')}`;
                        let text = ev.summary.replace(/^(Mamma\s*&\s*[pP]appa:|Mamma\s+og\s+[pP]appa:)\s*/g, '<span class="badge-navn badge-begge">Mamma & pappa</span> ').replace(/^[mM]amma:\s*/g, '<span class="badge-navn badge-mamma">Mamma</span> ').replace(/^[pP]appa:\s*/g, '<span class="badge-navn badge-pappa">Pappa</span> ');
                        list.innerHTML += `<div class='event-item'><span class='event-bullet'>•</span><div class='event-text-container'><span class='event-time'>${tStr}:</span> ${text}</div></div>`;
                    });
                    section.appendChild(list);
                }
                container.appendChild(section);
            }
        }

        function fetchCalendarData() {
            Promise.all([
                gapi.client.calendar.events.list({'calendarId': CALENDAR_ID, 'timeMin': new Date().toISOString(), 'timeMax': new Date(Date.now() + 60*86400000).toISOString(), 'singleEvents': true}),
                gapi.client.calendar.events.list({'calendarId': HOLIDAY_ID, 'timeMin': new Date().toISOString(), 'timeMax': new Date(Date.now() + 60*86400000).toISOString(), 'singleEvents': true})
            ]).then(res => {
                globalEventsCache = {};
                res[0].result.items.forEach(ev => {
                    let start = new Date(ev.start.date || ev.start.dateTime), end = new Date(ev.end.date || ev.end.dateTime);
                    for (let d = new Date(start); d < end; d.setDate(d.getDate() + 1)) {
                        let key = d.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                        if (!globalEventsCache[key]) globalEventsCache[key] = [];
                        let cp = JSON.parse(JSON.stringify(ev));
                        cp.computedStart = d.toISOString();
                        cp.isAllDay = !ev.start.dateTime;
                        globalEventsCache[key].push(cp);
                    }
                });
                globalHolidaysCache = {};
                res[1].result.items.forEach(h => globalHolidaysCache[new Date(h.start.date).toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'})] = h.summary);
                renderCalendarList();
            });
        }

        function updateClock() {
            const n = new Date();
            document.getElementById('digital-clock').textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
            document.body.classList.toggle('night-mode', n.getHours() < 7 || n.getHours() >= 22);
            let p = n.getHours() < 6 ? "natt" : n.getHours() < 9 ? "morgen" : n.getHours() < 12 ? "formiddag" : n.getHours() < 18 ? "ettermiddag" : "kveld";
            document.getElementById('complete-date-string').textContent = `Det er ${p}, ${ukeDager[n.getDay()].toLowerCase()} ${n.getDate()}. ${maaneder[n.getMonth()].toLowerCase()} ${n.getFullYear()}`;
            
            const rutiner = n.getDay() === 6 ? [{tid: "07.30", tekst: "Frokost"}, {tid: "08.00", tekst: "Ta medisiner"}, {tid: "09.00", tekst: "Tur med hunden"}, {tid: "12.00", tekst: "Gjerne varm lunsj"}, {tid: "14.00", tekst: "Sjekke meldinger"}, {tid: "15.30", tekst: "Middag"}, {tid: "19.30", tekst: "Gå tur med hunden"}, {tid: "20.30", tekst: "Kveldsmat"}] : n.getDay() === 0 ? [{tid: "07.30", tekst: "Frokost"}, {tid: "08.00", tekst: "Ta medisiner"}, {tid: "09.00", tekst: "Tur med hunden"}, {tid: "13.00", tekst: "Middag"}, {tid: "14.00", tekst: "Sjekke meldinger"}, {tid: "19.30", tekst: "Gå tur med hunden"}, {tid: "20.30", tekst: "Kveldsmat"}] : [{tid: "07.30", tekst: "Frokost"}, {tid: "08.00", tekst: "Ta medisiner"}, {tid: "09.00", tekst: "Tur med hunden"}, {tid: "11.30", tekst: "Lunsj"}, {tid: "14.00", tekst: "Sjekke meldinger"}, {tid: "15.30", tekst: "Middag"}, {tid: "19.30", tekst: "Gå tur med hunden"}, {tid: "20.30", tekst: "Kveldsmat"}];
            document.getElementById('info-day-heading').innerText = n.getDay() === 6 ? "lørdag" : n.getDay() === 0 ? "søndag" : "mandag - fredag";
            document.getElementById('info-text').innerHTML = rutiner.map(i => `<div class='info-item'><span class='info-bullet'>•</span><span class='info-time'>${i.tid}:</span> ${i.tekst}</div>`).join('');
        }

        window.addEventListener('DOMContentLoaded', () => {
            gapi.load('client', () => gapi.client.init({apiKey: API_KEY}).then(fetchCalendarData));
            setInterval(updateClock, 1000); updateClock(); setInterval(fetchCalendarData, 300000);
        });
    </script>
</body>
</html>
