<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex, nofollow">
    <title>Eksklusiv Seniorkalender</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f1f5f9; --text-main: #1e293b; --text-muted: #64748b; --clock-accent: #ef4444; --box-bg: #ffffff; --box-border: #cbd5e1; --highlight-text: #0066cc; }
        body.night-mode { --bg-color: #0f172a; --text-main: #f8fafc; --text-muted: #94a3b8; --box-bg: #1e293b; --box-border: #334155; --highlight-text: #38bdf8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; width: 100vw; background-color: var(--bg-color); color: var(--text-main); font-family: 'Poppins', sans-serif; overflow-y: auto; padding: 79px 60px 74px 60px; transition: background 1s ease, color 1s ease; }
        header { height: 110px; display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .digital-clock-big { font-size: 142px; font-weight: 500; letter-spacing: -5px; line-height: 0.72; }
        .status-box-container { width: 100%; margin-bottom: 40px; padding: 24px; background-color: var(--box-bg); border: 1px solid var(--box-border); border-radius: 16px; font-size: 1.6rem; }
        .status-box-highlight { color: var(--highlight-text); font-weight: 500; }
        main { display: flex; }
        .left-column { width: max-content; padding-right: 60px; margin-right: 60px; border-right: 1px dashed var(--text-muted); }
        .right-column { flex: 1; }
        .info-title, .calendar-title { font-size: 2.4rem; font-weight: 500; margin-bottom: 14px; }
        .info-content { display: flex; flex-direction: column; gap: 6px; font-size: 1.55rem; padding-left: 80px; }
        .day-section { margin-bottom: 40px; }
        .day-title { font-size: 1.75rem; padding-left: 40px; margin-bottom: 10px; }
        .event-list { display: flex; flex-direction: column; gap: 15px; padding-left: 80px; font-size: 1.55rem; }
        .event-time { color: var(--clock-accent); font-weight: 700; }
        .badge-navn { padding: 2px 10px; border-radius: 6px; font-weight: 700; color: #ffffff !important; }
        .badge-mamma { background-color: #16a34a; } .badge-pappa { background-color: #d97706; } .badge-begge { background-color: #0891b2; }
    </style>
</head>
<body>
    <header>
        <div class="digital-clock-big" id="digital-clock">00:00</div>
        <div class="header-date-right" id="complete-date-string">Laster...</div>
    </header>
    <div class="status-box-container" id="live-status-bar">Laster status...</div>
    <main>
        <div class="left-column">
            <div class="info-title">Rutiner:</div>
            <div class="info-content" id="info-text"></div>
        </div>
        <div class="right-column">
            <div class="calendar-title">Dette skjer:</div>
            <div id="calendar-list">Laster Google Kalender...</div>
        </div>
    </main>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com';
        let globalEventsCache = {}; 
        let inactivityTimeout = null;

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, 180000);
        }

        function renderCalendarList() {
            const container = document.getElementById('calendar-list');
            container.innerHTML = '';
            Object.keys(globalEventsCache).sort().forEach(dateKey => {
                const daySection = document.createElement('div');
                daySection.className = 'day-section';
                daySection.innerHTML = `<div class="day-title">${dateKey}</div>`;
                const list = document.createElement('div');
                list.className = 'event-list';
                // KRONOLOGISK SORTERING:
                globalEventsCache[dateKey].sort((a, b) => new Date(a.computedStart) - new Date(b.computedStart)).forEach(ev => {
                    const time = ev.isAllDay ? 'Hele dagen' : new Date(ev.computedStart).toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit'});
                    const li = document.createElement('div');
                    li.innerHTML = `<span class="event-time">${time}:</span> ${ev.summary.replace(/Mamma:/, '<span class="badge-navn badge-mamma">Mamma</span>').replace(/Pappa:/, '<span class="badge-navn badge-pappa">Pappa</span>')}`;
                    list.appendChild(li);
                });
                daySection.appendChild(list);
                container.appendChild(daySection);
            });
        }

        function fetchCalendarData() {
            gapi.client.calendar.events.list({
                calendarId: CALENDAR_ID, timeMin: new Date().toISOString(), singleEvents: true, orderBy: 'startTime'
            }).then(response => {
                globalEventsCache = {};
                (response.result.items || []).forEach(ev => {
                    let start = ev.start.dateTime || ev.start.date;
                    let key = start.split('T')[0];
                    if (!globalEventsCache[key]) globalEventsCache[key] = [];
                    globalEventsCache[key].push({...ev, computedStart: start, isAllDay: !!ev.start.date});
                });
                renderCalendarList();
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            ['scroll', 'touchstart', 'mousedown', 'keydown'].forEach(e => window.addEventListener(e, resetInactivityTimer, {passive: true}));
            gapi.load('client', () => {
                gapi.client.init({apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"]})
                    .then(fetchCalendarData);
            });
        });
    </script>
</body>
</html>
