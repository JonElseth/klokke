<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex, nofollow">

    <title>Eksklusiv Seniorkalender</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #0066cc;
            --clock-accent: #ef4444;
            --shadow: rgba(0, 0, 0, 0.05);
            --box-bg: #ffffff;
            --box-border: #cbd5e1;
            --time-of-day-color: #0f172a;
        }

        body.night-mode {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --clock-accent: #ef4444;
            --clock-ticks: #94a3b8;
            --shadow: rgba(0, 0, 0, 0.3);
            --box-bg: #1e293b;
            --box-border: #334155;
            --time-of-day-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            user-select: none;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            padding: 56px 60px 74px 60px;
            transition: background 1s ease, color 1s ease;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        header {
            height: 110px;
            display: flex;
            justify-content: space-between;
            background-color: var(--bg-color);
            transition: background 1s ease;
            margin-bottom: 40px;
            position: relative;
            flex-shrink: 0;
        }

        .header-clocks-left {
            display: flex;
            align-items: flex-end;
            flex-shrink: 0;
            height: 110px;
        }

        .digital-clock-big {
            font-size: 142px;
            font-weight: 500;
            letter-spacing: -5px;
            line-height: 0.72;
            display: inline-block;
            margin-bottom: -5px;
        }

        .time-of-day-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
        }

        .time-of-day-label {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--time-of-day-color);
            text-transform: none;
            line-height: 1.0;
        }

        .header-date-right {
            font-size: 2.0rem;
            font-weight: 500;
            color: var(--text-muted);
            line-height: 1.0;
            margin-top: 15px;
        }

        .status-box-container {
            width: 100%;
            margin-bottom: 20px;
            padding: 53px 30px;
            background-color: var(--box-bg);
            border: 3px solid var(--accent-color);
            border-radius: 16px;
            box-shadow: 0 10px 20px var(--shadow);
            font-family: 'Poppins', sans-serif;
            font-size: 3.0rem;
            font-weight: 500;
            line-height: 1.4;
            transition: background 1s ease, border 1s ease, box-shadow 1s ease;
        }

        main {
            flex: 1;
            display: flex;
        }

        .column {
            padding-top: 10px;
        }

        .left-column {
            width: max-content;
            background-color: var(--bg-color);
            padding-right: 60px;
            margin-right: 60px;
            border-right: 1px dashed var(--text-muted);
        }

        .right-column {
            flex: 1;
            background-color: var(--bg-color);
        }

        .info-title,
        .calendar-title {
            font-size: 2.4rem;
            font-weight: 700;
            /* Endret fra 500 til 700 */
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .info-day-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 4px;
            padding-left: 40px;
            text-transform: lowercase;
        }

        .info-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-family: 'Lato', sans-serif;
            font-size: 1.55rem;
            color: var(--text-main);
            padding-left: 80px;
        }

        .info-item {
            white-space: nowrap;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
        }

        .info-bullet {
            flex-shrink: 0;
            margin-right: 10px;
            line-height: 1.4;
        }

        .info-time {
            color: var(--clock-accent);
            font-weight: 700;
            margin-right: 5px;
        }

        .day-section {
            width: 100%;
            margin-bottom: 35px;
            padding-bottom: 30px;
            border-bottom: 2px dashed var(--box-border);
        }

        .day-section.future-day {
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .day-section.tomorrow-day {
            opacity: 0.5;
            /* Dimmer morgendagens avtaler */
            transition: opacity 0.3s ease;
        }

        .day-title {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 4px;
            padding-left: 40px;
        }

        .holiday-text {
            font-size: 1.25rem;
            color: var(--clock-accent);
            font-weight: 400;
            margin-top: -8px;
            margin-bottom: 14px;
            text-transform: uppercase;
            padding-left: 40px;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 80px;
        }

        .event-item {
            font-family: 'Lato', sans-serif;
            font-size: 1.55rem;
            line-height: 1.4;
            color: var(--text-main);
            display: flex;
            align-items: flex-start;
        }

        .event-bullet {
            flex-shrink: 0;
            margin-right: 10px;
            line-height: 1.4;
        }

        .event-text-container {
            flex: 1;
        }

        .event-time {
            color: var(--clock-accent);
            font-weight: 700;
            margin-right: 6px;
        }

        .badge-navn {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 6px;
            font-weight: 700;
            color: #ffffff !important;
            margin-right: 10px;
            line-height: 1.2;
            font-size: 0.95em;
            vertical-align: middle;
        }

        .badge-mamma {
            background-color: #16a34a;
        }

        .badge-pappa {
            background-color: #d97706;
        }

        .badge-begge {
            background-color: #0891b2;
        }

        body.night-mode .badge-mamma {
            background-color: #166534;
        }

        body.night-mode .badge-pappa {
            background-color: #9a3412;
        }

        body.night-mode .badge-begge {
            background-color: #155e75;
        }

        .active-time {
            font-weight: 800 !important;
            color: var(--clock-accent) !important;
            border-bottom: 2px solid var(--clock-accent);
        }

        .today-highlight {
            font-weight: 800 !important;
            color: inherit !important;
            border-bottom: none !important;
        }

        @media (max-width: 900px) or (orientation: portrait) {
            body {
                padding: 7px 20px 40px 20px;
            }

            header {
                flex-direction: column;
                height: auto;
                gap: 15px;
                text-align: center;
                margin-bottom: 20px;
                align-items: center;
            }

            .header-clocks-left {
                justify-content: center;
                align-items: center;
                width: 100%;
                height: auto;
            }

            .digital-clock-big {
                font-size: 5rem;
                line-height: 1.0;
                height: auto;
                letter-spacing: -2px;
                margin-bottom: 0;
            }

            .time-of-day-label {
                font-size: 2.5rem;
            }

            .header-date-right {
                font-size: 1.6rem;
            }

            .status-box-container {
                font-size: 1.4rem;
                padding: 20px;
                margin-bottom: 25px;
            }

            main {
                flex-direction: column;
                gap: 40px;
            }

            .left-column {
                width: 100%;
                padding-right: 0;
                margin-right: 0;
                border-right: none;
            }

            .info-day-title,
            .day-title,
            .holiday-text,
            .no-events-text {
                padding-left: 20px;
            }

            .info-content,
            .event-list {
                padding-left: 40px;
            }


        }
    </style>
</head>

<body>
    <header>
        <div class="header-clocks-left">
            <div class="digital-clock-big" id="digital-clock">00:00</div>
        </div>
        <div class="time-of-day-wrapper">
            <div class="time-of-day-label" id="time-of-day-label">Laster...</div>
            <div class="header-date-right" id="complete-date-string">Laster dato...</div>
        </div>
    </header>

    <div class="status-box-container" id="live-status-bar">Laster neste avtale...</div>

    <main>
        <div class="column left-column">
            <div class="info-title">Rutiner:</div>
            <div class="info-day-title" id="info-day-heading">--</div>
            <div class="info-content" id="info-text">Laster faste rutiner...</div>
        </div>
        <div class="column right-column">
            <div class="calendar-title">Avtaler:</div>
            <div id="calendar-list">Google Kalender...</div>
        </div>
    </main>

    <script src="https://apis.google.com/js/api.js"></script>

    <script>
        /* KONFIGURASJON: HER KAN DU ENDRE RUTINER 
           For å legge til: legg til { tid: "TT.MM", tekst: "Navn" },
           Pass på at det er komma mellom hver linje.
        */
        const RUTINER = {
            hverdag: [
                { tid: "07.30", tekst: "Frokost" },
                { tid: "08.00", tekst: "Ta medisiner" },
                { tid: "09.00", tekst: "Tur med hunden" },
                { tid: "11.30", tekst: "Lunsj" },
                { tid: "14.00", tekst: "Sjekke meldinger" },
                { tid: "15.30", tekst: "Middag" },
                { tid: "19.30", tekst: "Gå tur med hunden" },
                { tid: "20.30", tekst: "Kveldsmat" }
            ],
            loerdag: [
                { tid: "07.30", tekst: "Frokost" },
                { tid: "08.00", tekst: "Ta medisiner" },
                { tid: "09.00", tekst: "Tur med hunden" },
                { tid: "12.00", tekst: "Gjerne varm lunsj" },
                { tid: "14.00", tekst: "Sjekke meldinger" },
                { tid: "15.30", tekst: "Middag" },
                { tid: "19.30", tekst: "Gå tur med hunden" },
                { tid: "20.30", tekst: "Kveldsmat" }
            ],
            soendag: [
                { tid: "07.30", tekst: "Frokost" },
                { tid: "08.00", tekst: "Ta medisiner" },
                { tid: "09.00", tekst: "Tur med hunden" },
                { tid: "13.00", tekst: "Middag" },
                { tid: "14.00", tekst: "Sjekke meldinger" },
                { tid: "19.30", tekst: "Gå tur med hunden" },
                { tid: "20.30", tekst: "Kveldsmat" }
            ]
        };

        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com';
        const HOLIDAY_CALENDAR_ID = 'no.norwegian#holiday@group.v.calendar.google.com';

        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];

        let globalEventsCache = {};
        let globalHolidaysCache = {};
        let wakeLock = null;
        let inactivityTimeout = null;

        // Funksjon: Tilbakestiller timer for inaktivitet for å automatisk rulle siden til toppen
        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(function () { window.scrollTo({ top: 0, behavior: 'smooth' }); }, 180000);
        }

        // Funksjon: Legger til lytttere for ulike brukerhendelser for å oppdage aktivitet
        function setupInactivityListeners() {
            window.addEventListener('scroll', resetInactivityTimer);
            window.addEventListener('touchstart', resetInactivityTimer, true);
            window.addEventListener('touchmove', resetInactivityTimer, true);
            window.addEventListener('mousedown', resetInactivityTimer, true);
            resetInactivityTimer();
        }

        // Funksjon: Genererer HTML-struktur for de definerte rutinene basert på dag
        function genererRutineHTML(rutineListe) {
            let html = "";
            const nå = new Date();
            const nåTidMinutter = nå.getHours() * 60 + nå.getMinutes();

            let aktivIndex = -1;
            for (let i = 0; i < rutineListe.length; i++) {
                const deler = rutineListe[i].tid.split('.');
                const timer = parseInt(deler[0]);
                const minutter = parseInt(deler[1]);
                const rutineTidMinutter = timer * 60 + minutter;
                if (nåTidMinutter >= rutineTidMinutter) { aktivIndex = i; }
            }

            rutineListe.forEach((item, index) => {
                const erAktiv = (index === aktivIndex) ? "active-time" : "";
                html += `<div class='info-item'><span class='info-bullet'>•</span><span class='info-time ${erAktiv}'>${item.tid}:</span> ${item.tekst}</div>`;
            });
            return html;
        }

        // Funksjon: Beregner og oppdaterer tekstboksen som viser neste planlagte avtale
        function oppdaterLiveStatusBoks() {
            const statusEl = document.getElementById('live-status-bar');
            if (!statusEl) return;
            try {
                const nå = new Date();
                const tiMinutterSiden = new Date(nå.getTime() - 600000);
                const dagensNøkkel = nå.toLocaleDateString('sv-SE', { timeZone: 'Europe/Oslo' });
                const iMorgen = new Date(); iMorgen.setDate(nå.getDate() + 1);
                const morgendagensNøkkel = iMorgen.toLocaleDateString('sv-SE', { timeZone: 'Europe/Oslo' });
                const alleAktuelleHendelser = [...(globalEventsCache[dagensNøkkel] || []), ...(globalEventsCache[morgendagensNøkkel] || [])];
                const sorterteHendelser = alleAktuelleHendelser.filter(ev => new Date(ev.computedStart) > tiMinutterSiden).sort((a, b) => new Date(a.computedStart).getTime() - new Date(b.computedStart).getTime());
                const nesteAvtale = sorterteHendelser[0];
                if (nesteAvtale) {
                    const startTid = new Date(nesteAvtale.computedStart);
                    const nesteTid = startTid.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Oslo' });
                    const erIIdag = startTid.toLocaleDateString('sv-SE', { timeZone: 'Europe/Oslo' }) === dagensNøkkel;
                    const tidPrefix = erIIdag ? "kl." : "i morgen kl.";
                    let summary = nesteAvtale.summary || "", hvem = "", renSummary = summary;
                    if (/^(Mamma\s*&\s*Pappa:|Mamma\s+og\s+Pappa:)/i.test(summary)) { hvem = "<span class='badge-navn badge-begge'>Mamma & pappa</span> - "; renSummary = summary.replace(/^(Mamma\s*&\s*Pappa:|Mamma\s+og\s+Pappa:)\s*/i, ''); }
                    else if (/^Mamma:/i.test(summary)) { hvem = "<span class='badge-navn badge-mamma'>Mamma</span> - "; renSummary = summary.replace(/^Mamma:\s*/i, ''); }
                    else if (/^Pappa:/i.test(summary)) { hvem = "<span class='badge-navn badge-pappa'>Pappa</span> - "; renSummary = summary.replace(/^Pappa:\s*/i, ''); }
                    else { hvem = "Neste avtale:"; }
                    statusEl.innerHTML = `${hvem} <span style="font-weight: 700;">${renSummary} ${tidPrefix} ${nesteTid}.</span>`;
                } else { statusEl.innerHTML = `Ingen flere avtaler registrert i dag eller i morgen.`; }
            } catch (feil) { statusEl.innerHTML = `Avventer kalenderdata...`; }
        }

        // Funksjon: Hjelpefunksjon som formaterer avtalebeskrivelser med visuelle merkelapper
        function formatEventSummary(summary) {
            if (!summary) return '';
            let html = summary;
            html = html.replace(/^(Mamma\s*&\s*[pP]appa:|Mamma\s+og\s*[pP]appa:)\s*/g, '<span class="badge-navn badge-begge">Mamma & pappa</span> ');
            html = html.replace(/^[mM]amma:\s*/g, '<span class="badge-navn badge-mamma">Mamma</span> ');
            html = html.replace(/^[pP]appa:\s*/g, '<span class="badge-navn badge-pappa">Pappa</span> ');
            return html;
        }

        // Funksjon: Henter hendelser fra cachen og rendrer hele kalenderlisten
        function renderCalendarList() {
            try {
                const container = document.getElementById('calendar-list');
                if (!container) return;
                container.innerHTML = '';
                const today = new Date();
                const tiMinutterSiden = new Date(today.getTime() - 600000);
                const todayKey = today.toLocaleDateString('sv-SE', { timeZone: 'Europe/Oslo' });
                const iMorgen = new Date(); iMorgen.setDate(today.getDate() + 1);
                const morgenKey = iMorgen.toLocaleDateString('sv-SE', { timeZone: 'Europe/Oslo' });

                for (let i = 0; i < 185; i++) {
                    const currentDay = new Date(); currentDay.setDate(today.getDate() + i);
                    const dateKey = currentDay.toLocaleDateString('sv-SE', { timeZone: 'Europe/Oslo' });
                    const råHendelser = (globalEventsCache[dateKey] || []).filter(ev => new Date(ev.computedStart) > tiMinutterSiden);
                    const hasHoliday = globalHolidaysCache[dateKey];
                    if (råHendelser.length === 0 && !hasHoliday) continue;

                    const daySection = document.createElement('div');
                    daySection.className = 'day-section';

                    // Logikk for dimming av fremtid, og utheving av I dag
                    if (dateKey === morgenKey) {
                        daySection.classList.add('tomorrow-day');
                    } else if (i >= 2) {
                        daySection.classList.add('future-day');
                    }

                    let prefix = (dateKey === todayKey) ? "I dag, " : (dateKey === morgenKey) ? "I morgen, " : "";
                    let dagNavn = prefix === "" ? ukeDager[currentDay.getDay()].charAt(0).toUpperCase() + ukeDager[currentDay.getDay()].slice(1).toLowerCase() : ukeDager[currentDay.getDay()].toLowerCase();

                    // Sjekk om det er i dag for å legge til uthevingsklassen
                    let titleClass = (dateKey === todayKey) ? "day-title today-title" : "day-title";
                    // Endret linje som setter HTML for tittelen
                    // Legg merke til at kommaet nå står helt inntil span-taggen
                    // Denne tvinger kommaet til å være en del av den uthevede teksten uten mellomrom
                    let dagensTekst = (dateKey === todayKey) ? `<span class="today-highlight">I dag,</span> ${dagNavn} ${currentDay.getDate()}.` : `${prefix}${dagNavn} ${currentDay.getDate()}.`;
                    daySection.innerHTML = `<div class="day-title">${dagensTekst} ${maaneder[currentDay.getMonth()].toLowerCase()}</div>`;
                    if (hasHoliday) {
                        const holDiv = document.createElement('div'); holDiv.className = 'holiday-text';
                        holDiv.textContent = hasHoliday; daySection.appendChild(holDiv);
                    }
                    const list = document.createElement('div'); list.className = 'event-list';
                    råHendelser.sort((a, b) => new Date(a.computedStart) - new Date(b.computedStart)).forEach(ev => {
                        const li = document.createElement('div'); li.className = 'event-item';
                        let timeStr = ev.isAllDay ? 'Hele dagen' : new Date(ev.computedStart).toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
                        li.innerHTML = `<span class="event-bullet">•</span><div class="event-text-container">${timeStr ? `<span class="event-time">${timeStr}:</span>` : ""} ${formatEventSummary(ev.summary)}</div>`;
                        list.appendChild(li);
                    });
                    daySection.appendChild(list);
                    container.appendChild(daySection);
                }
            } catch (e) { console.error(e); }
        }        // Funksjon: Oppdaterer klokken, dagens periode-tekst, datoen og daglige rutiner
        function updateClockAndLayout() {
            const now = new Date();
            if (now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) fetchCalendarData();
            if (now.getHours() === 3 && now.getMinutes() === 0 && now.getSeconds() === 0) window.location.reload();
            if (now.getSeconds() === 0) renderCalendarList();
            document.getElementById('digital-clock').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            if (now.getHours() >= 7 && now.getHours() < 22) document.body.classList.remove('night-mode'); else document.body.classList.add('night-mode');
            const periods = ["Det er natt", "Det er morgen", "Det er formiddag", "Det er ettermiddag", "Det er kveld"];
            document.getElementById('time-of-day-label').innerText = periods[now.getHours() < 6 ? 0 : now.getHours() < 9 ? 1 : now.getHours() < 12 ? 2 : now.getHours() < 18 ? 3 : 4];
            document.getElementById('complete-date-string').textContent = `${ukeDager[now.getDay()].toLowerCase()} ${now.getDate()}. ${maaneder[now.getMonth()].toLowerCase()} ${now.getFullYear()}`;
            const dayOfWeek = now.getDay();
            let dagensRutine;
            if (dayOfWeek === 6) dagensRutine = RUTINER.loerdag;
            else if (dayOfWeek === 0) dagensRutine = RUTINER.soendag;
            else dagensRutine = RUTINER.hverdag;
            document.getElementById('info-day-heading').innerText = dayOfWeek === 6 ? "lørdag" : dayOfWeek === 0 ? "søndag" : "mandag - fredag";
            document.getElementById('info-text').innerHTML = genererRutineHTML(dagensRutine);
            oppdaterLiveStatusBoks();
        }

        // Funksjon: Forsøker å låse skjermen på (Wake Lock) slik at den ikke går i dvale
        async function requestWakeLock() { try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch (e) { } }

        // Funksjon: Henter data fra Google Calendar API og lagrer dem i globale cacher
        function fetchCalendarData() {
            if (typeof gapi === 'undefined' || !gapi.client) return;
            const start = new Date(); start.setHours(0, 0, 0, 0); const end = new Date(); end.setDate(end.getDate() + 185);
            Promise.all([
                gapi.client.calendar.events.list({ 'calendarId': CALENDAR_ID, 'timeMin': start.toISOString(), 'timeMax': end.toISOString(), 'singleEvents': true, 'orderBy': 'startTime' }),
                gapi.client.calendar.events.list({ 'calendarId': HOLIDAY_CALENDAR_ID, 'timeMin': start.toISOString(), 'timeMax': end.toISOString(), 'singleEvents': true })
            ]).then(res => {
                globalEventsCache = {};
                res[0].result.items.forEach(ev => {
                    const k = new Date(ev.start.dateTime || ev.start.date).toLocaleDateString('sv-SE', { timeZone: 'Europe/Oslo' });
                    if (!globalEventsCache[k]) globalEventsCache[k] = [];
                    ev.computedStart = (ev.start.dateTime || ev.start.date);
                    globalEventsCache[k].push(ev);
                });
                globalHolidaysCache = {}; res[1].result.items.forEach(h => globalHolidaysCache[(h.start.date || h.start.dateTime.split('T')[0])] = h.summary);
                renderCalendarList();
            });
        }

        // Lytter: Initialiserer alt når siden er ferdig lastet
        window.addEventListener('DOMContentLoaded', () => {
            setupInactivityListeners(); requestWakeLock(); setInterval(updateClockAndLayout, 1000); updateClockAndLayout();
            gapi.load('client', () => gapi.client.init({ 'apiKey': API_KEY, 'discoveryDocs': ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"] }).then(() => { fetchCalendarData(); setInterval(fetchCalendarData, 300000); }));
        });
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWakeLock(); });
    </script>
</body>

</html>
