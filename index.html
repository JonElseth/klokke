<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Eksklusiv Seniorkalender</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGNVARIABLER FOR TEMASKIFTE --- */
        :root {
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #0066cc;
            --clock-accent: #ef4444;
            --shadow: rgba(0, 0, 0, 0.05);
            --box-bg: #ffffff;
            --box-border: #cbd5e1;
            --highlight-text: #0066cc; 
        }

        body.night-mode {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --clock-accent: #ef4444;
            --clock-ticks: #94a3b8;
            --shadow: rgba(0, 0, 0, 0.3);
            --box-bg: #1e293b;
            --box-border: #334155;
            --highlight-text: #38bdf8; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            user-select: none;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none; 
            padding: 79px 60px 74px 60px; 
            transition: background 1s ease, color 1s ease;
        }

        body::-webkit-scrollbar {
            display: none; 
        }

        header {
            height: 110px; 
            display: flex;
            justify-content: space-between; 
            background-color: var(--bg-color);
            transition: background 1s ease;
            margin-bottom: 40px; 
            position: relative; 
            flex-shrink: 0;
        }

        .header-clocks-left {
            display: flex;
            align-items: flex-end; 
            flex-shrink: 0;
            height: 110px;
        }

        .digital-clock-big {
            font-size: 142px; 
            font-weight: 500;  
            letter-spacing: -5px;
            line-height: 0.72; 
            display: inline-block;
            margin-bottom: -5px; 
        }

        .header-date-right {
            position: absolute;
            top: 0;
            right: 0;
            text-align: right;
            font-size: 1.6rem; 
            font-weight: 500;  
            color: var(--text-main);
            line-height: 1.0; 
        }

        .status-box-container {
            width: 100%;
            margin-bottom: 40px;
            padding: 24px;
            background-color: var(--box-bg);
            border: 1px solid var(--box-border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            font-weight: 400;
            line-height: 1.5;
            transition: background 1s ease, border 1s ease, box-shadow 1s ease;
        }

        .status-box-highlight {
            color: var(--highlight-text);
            font-weight: 500;
            transition: color 1s ease;
        }

        main {
            flex: 1;
            display: flex;
        }

        .column {
            padding-top: 10px;
        }

        .left-column {
            width: max-content; 
            background-color: var(--bg-color);
            padding-right: 60px; 
            margin-right: 60px; 
            border-right: 1px dashed var(--text-muted); 
        }

        .right-column {
            flex: 1; 
            background-color: var(--bg-color);
        }

        .info-title, .calendar-title {
            font-size: 2.4rem; 
            font-weight: 500;
            margin-bottom: 14px; 
            color: var(--text-main);
        }

        .info-day-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem; 
            font-weight: 400;
            margin-bottom: 14px;
            padding-left: 40px; 
            text-transform: lowercase;
        }

        .info-content {
            display: flex;
            flex-direction: column;
            gap: 6px; 
            font-family: 'Lato', sans-serif;
            font-size: 1.55rem; 
            color: var(--text-main);
            padding-left: 80px; 
        }

        .info-item {
            white-space: nowrap;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
        }

        .info-bullet {
            flex-shrink: 0;
            margin-right: 10px;
            line-height: 1.4;
        }

        .info-time {
            color: var(--clock-accent);
            font-weight: 700;
            margin-right: 5px;
        }

        .day-section {
            width: 100%;
            margin-bottom: 65px; 
            background-color: transparent;
        }

        .day-title {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem; 
            font-weight: 400;
            margin-bottom: 14px; 
            padding-left: 40px; 
        }

        .today-badge {
            font-size: 15px; 
            background: var(--clock-accent);
            color: white;
            padding: 3px 14px; 
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .holiday-text {
            font-size: 1.25rem; 
            color: var(--clock-accent);
            font-weight: 400;
            font-style: normal;
            margin-top: -8px;
            margin-bottom: 14px;
            text-transform: uppercase;
            padding-left: 40px;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 28px; 
            padding-left: 80px; 
        }

        .event-item {
            font-family: 'Lato', sans-serif;
            font-size: 1.55rem; 
            line-height: 1.4;
            color: var(--text-main);
            display: flex;
            align-items: flex-start;
        }

        .event-bullet {
            flex-shrink: 0;
            margin-right: 10px; 
            line-height: 1.4;
        }

        .event-text-container {
            flex: 1;
        }

        .event-time {
            color: var(--clock-accent); 
            font-weight: 700;
            margin-right: 6px;
        }

        .badge-navn {
            display: inline-block;
            padding: 2px 10px 4px 10px; 
            border-radius: 6px;
            font-weight: 700;
            color: #ffffff !important; 
            margin-right: 6px;
            line-height: 1.2; 
            font-size: 18px; 
            vertical-align: middle;
        }

        .badge-mamma { background-color: #16a34a; }        
        .badge-pappa { background-color: #d97706; }        
        .badge-begge { background-color: #0891b2; }        

        body.night-mode .badge-mamma { background-color: #166534; }
        body.night-mode .badge-pappa { background-color: #9a3412; }
        body.night-mode .badge-begge { background-color: #155e75; }

        .no-events-text {
            font-family: 'Lato', sans-serif;
            font-size: 1.55rem;
            color: var(--text-muted);
            padding-left: 40px;
        }

        @media (max-width: 900px) or (orientation: portrait) {
            body { padding: 30px 20px 40px 20px; }
            header { flex-direction: column; height: auto; gap: 15px; text-align: center; margin-bottom: 20px; align-items: center; }
            .header-clocks-left { justify-content: center; align-items: center; width: 100%; height: auto; }
            .digital-clock-big { font-size: 5rem; line-height: 1.0; height: auto; letter-spacing: -2px; margin-bottom: 0; }
            .header-date-right { position: static; text-align: center; width: 100%; font-size: 1.6rem; }
            .status-box-container { font-size: 1.2rem; padding: 16px; margin-bottom: 25px; }
            main { flex-direction: column; gap: 40px; }
            .left-column { width: 100%; padding-right: 0; margin-right: 0; border-right: none; }
            .info-day-title, .day-title, .holiday-text, .no-events-text { padding-left: 20px; }
            .info-content, .event-list { padding-left: 40px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-clocks-left">
            <div class="digital-clock-big" id="digital-clock">00:00</div>
        </div>
        <div class="header-date-right" id="complete-date-string">Laster dato...</div>
    </header>

    <div class="status-box-container" id="live-status-bar">Laster tidsstatus...</div>

    <main>
        <div class="column left-column">
            <div class="info-title">Rutiner:</div>
            <div class="info-day-title" id="info-day-heading">--</div>
            <div class="info-content" id="info-text">Laster faste rutiner...</div>
        </div>
        <div class="column right-column">
            <div class="calendar-title">Dette skjer:</div>
            <div id="calendar-list">Google Kalender...</div>
        </div>
    </main>

    <script src="https://apis.google.com/js/api.js"></script>
<script>
    // Konfigurasjon separert for bedre oversikt
    const CONFIG = {
        API_KEY: 'DIN_API_KEY_HER', // HUSK: Begrens denne i Google Cloud Console!
        CALENDAR_ID: '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com',
        HOLIDAY_ID: 'no.norwegian#holiday@group.v.calendar.google.com'
    };

    // Faste rutiner (kan flyttes til egen JSON-fil senere hvis ønskelig)
    const RUTINER = {
        hverdag: [
            { tid: "07.30", tekst: "Frokost" },
            { tid: "08.00", tekst: "Ta medisiner" },
            { tid: "09.00", tekst: "Tur med hunden" },
            { tid: "11.30", tekst: "Lunsj" },
            { tid: "14.00", tekst: "Sjekke meldinger" },
            { tid: "15.30", tekst: "Middag" },
            { tid: "19.30", tekst: "Gå tur med hunden" },
            { tid: "20.30", tekst: "Kveldsmat" }
        ],
        // ... (Legg til lørdag/søndag her)
    };

    // Funksjon for å oppdatere siden uten full reload (mer stabilt)
    function oppdaterSide() {
        window.location.reload();
    }

    // Modernisert tidsstyrt reload (kl. 03:00)
    function sjekkForDagligOmstart() {
        const nå = new Date();
        if (nå.getHours() === 3 && nå.getMinutes() === 0) {
            oppdaterSide();
        }
    }

    // Forbedret kalender-rendring med feilhåndtering
    async function initGapiClient() {
        try {
            await gapi.client.init({
                apiKey: CONFIG.API_KEY,
                discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
            });
            fetchCalendarData();
            setInterval(fetchCalendarData, 300000); // Oppdater hver 5. min
        } catch (err) {
            console.error("Kunne ikke koble til kalender:", err);
            document.getElementById('calendar-list').innerText = "Kunne ikke hente kalender. Sjekk internett.";
        }
    }

    // ... (resten av dine funksjoner for fetching og rendering)

    window.addEventListener('DOMContentLoaded', () => {
        gapi.load('client', initGapiClient);
        setInterval(updateClockAndLayout, 1000);
        setInterval(sjekkForDagligOmstart, 60000); // Sjekk hvert minutt om det er tid for restart
    });
</script>
</body>
</html>
