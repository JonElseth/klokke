<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Digital og Analog Seniorkalender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            height: 100vh;
            width: 100vw;
            margin: 0;
            font-family: 'Lato', sans-serif;
            overflow: hidden;
            user-select: none;
            
            /* SIKKERHETSSONE FOR DET FYSISKE DEKSELET */
            padding: 79px 60px 74px 60px; 
            transition: background 1.5s ease, color 1.5s ease;
        }

        /* --- RESPONSIVT LAYOUT MED GRID --- */
        .main-layout {
            display: grid;
            grid-template-columns: 42% 1fr;
            gap: 60px;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* --- TEMAER --- */
        .day-mode { 
            background: #ffffff; 
            color: #1e293b; 
        }
        .night-mode { 
            background: #0f172a; 
            color: #f8fafc; 
        }

        /* --- VENSTRE HALVDEL: KLOKKER OG DATO --- */
        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            border-right: 1px solid rgba(0,0,0,0.08);
            padding-right: 40px;
        }
        .night-mode .left-panel {
            border-right: 1px solid rgba(255,255,255,0.08);
        }

        /* Analog Klokke */
        .analog-clock-svg {
            width: 280px;
            height: 280px;
            max-width: 80%;
        }
        
        .clock-face { fill: none; }
        .tick-minute { stroke: #334155; stroke-width: 0.6; }
        .tick-hour { stroke: #1e293b; stroke-width: 2.8; stroke-linecap: round; }
        .clock-number { 
            font-family: 'Poppins', sans-serif; 
            font-weight: 700; 
            font-size: 8.5px; 
            fill: #1e293b; 
            text-anchor: middle; 
            dominant-baseline: middle; 
        }

        .hand { stroke-linecap: round; }
        .hand-hour { stroke: #1e293b; stroke-width: 5; }
        .hand-minute { stroke: #1e293b; stroke-width: 3.5; }
        .hand-second { stroke: #ef4444; stroke-width: 1.2; }
        .center-dot { fill: #ef4444; }

        .night-mode .tick-minute { stroke: #94a3b8; }
        .night-mode .tick-hour, .night-mode .clock-number, .night-mode .hand-hour, .night-mode .hand-minute { fill: #f8fafc; stroke: #f8fafc; }

        /* Digital og Periode */
        .digital-time {
            font-family: 'Poppins', sans-serif;
            font-size: 8vw;
            font-weight: 700;
            line-height: 0.9;
            margin: 10px 0;
            letter-spacing: -4px;
            text-align: center;
        }

        .date-display {
            text-align: center;
            width: 100%;
        }

        .date-text {
            font-family: 'Poppins', sans-serif;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.1;
        }

        .period-text {
            font-size: 24px;
            font-weight: 700;
            background: #e2e8f0;
            padding: 8px 30px;
            border-radius: 50px;
            display: inline-block;
            color: #1e293b;
        }
        .night-mode .period-text { 
            background: #1e293b; 
            color: #f8fafc;
        }

        /* --- HØYRE PANEL: AVTALER (VERTIKAL LISTE) --- */
        .right-panel {
            height: 100%;
            overflow-y: auto;
            scrollbar-width: none;
            padding-bottom: 80px; /* Gir plass i bunnen så teksten ikke gjemmer seg bak knappen */
        }
        .right-panel::-webkit-scrollbar { 
            display: none; 
        }

        .day-section {
            width: 100%;
            margin-bottom: 25px;
            padding: 10px 0;
            border-radius: 12px;
            transition: background 0.5s ease, padding 0.5s ease;
        }

        /* STYLING FOR DAGENS DATO (FREMHEVET) */
        .day-section.today-highlight {
            background-color: #f1f5f9; 
            padding: 20px;
            border: 1px solid #cbd5e1;
        }
        .night-mode .day-section.today-highlight {
            background-color: #1e293b; 
            border: 1px solid #334155;
        }

        .day-section:not(:last-child)::after {
            content: "";
            display: block;
            width: 100%;
            border-bottom: 2px dashed #cbd5e1;
            margin-top: 25px;
        }
        .night-mode .day-section:not(:last-child)::after { 
            border-color: #334155; 
        }
        
        .day-section.today-highlight::after {
            display: none !important;
        }

        .day-title {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: capitalize;
            display: flex;
            align-items: center;
        }

        .today-badge {
            font-size: 16px;
            background: #ef4444;
            color: white;
            padding: 2px 12px;
            border-radius: 6px;
            margin-left: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .holiday-text {
            font-size: 18px;
            color: #ef4444;
            font-weight: 700;
            font-style: italic;
            margin-top: -10px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .event-list {
            list-style: none;
            padding-left: 25px;
        }

        .event-item {
            font-size: 22px;
            margin-bottom: 12px;
            line-height: 1.3;
            position: relative;
            font-weight: 400;
        }

        .event-item::before {
            content: "•";
            position: absolute;
            left: -25px;
            font-size: 28px;
            line-height: 1;
            color: #64748b;
        }

        .event-time {
            color: #ef4444; 
            font-weight: 700;
            margin-right: 10px;
        }
        .night-mode .event-time { color: #f87171; }

        /* --- FASTMONTERT SKROLLE-KNAPP / LEDETEXT NEDERST --- */
        .scroll-hint-btn {
            position: absolute;
            bottom: 10px;
            right: 0;
            width: calc(58% - 20px); /* Ligger nøyaktig sentrert under kalender-kolonnen */
            background: #1e293b;
            color: #ffffff;
            text-align: center;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: opacity 0.4s ease, transform 0.4s ease;
            animation: pulseBounce 2.5s infinite;
        }
        .night-mode .scroll-hint-btn {
            background: #334155;
            color: #f8fafc;
        }
        
        .scroll-arrow {
            font-size: 22px;
            font-weight: 900;
        }

        @keyframes pulseBounce {
            0%, 100% { transform: translateY(0); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
            50% { transform: translateY(4px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        }

        /* --- AUTOMATISK PORTRETTMODUS (STÅENDE SKJERM / MOBIL) --- */
        @media (max-width: 900px) or (orientation: portrait) {
            body {
                padding: 40px 30px;
                overflow-y: auto; /* Tillater skrolling på hele kroppen hvis skjermen er kort */
            }
            
            .main-layout {
                grid-template-columns: 1fr; /* Setter alt i én loddrett kolonne */
                grid-template-rows: auto 1fr;
                gap: 40px;
                height: auto;
                overflow: visible;
            }

            .left-panel {
                border-right: none;
                border-bottom: 1px solid rgba(0,0,0,0.08);
                padding-right: 0;
                padding-bottom: 30px;
                height: auto;
            }
            .night-mode .left-panel { border-bottom-color: rgba(255,255,255,0.08); }

            .analog-clock-svg {
                width: 220px;
                height: 220px;
            }

            .digital-time { font-size: 14vw; }
            .date-text { font-size: 28px; }

            .right-panel {
                height: auto;
                overflow: visible;
                padding-bottom: 100px;
            }

            /* Justerer knappen slik at den spenner over hele bredden i stående modus */
            .scroll-hint-btn {
                position: fixed;
                bottom: 20px;
                left: 30px;
                right: 30px;
                width: calc(100% - 60px);
            }
        }

        /* START-OVERLAY FOR KIOSK-OPPSTART */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            display: flex; justify-content: center; align-items: center;
            z-index: 99999;
        }
        .start-btn {
            padding: 25px 60px;
            font-size: 32px;
            font-family: 'Poppins', sans-serif;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="startApp()">Start systemet</button>
    </div>

    <div class="main-layout" id="layout-box">
        
        <div class="left-panel">
            <svg class="analog-clock-svg" viewBox="0 0 100 100" id="analog-clock">
                <circle cx="50" cy="50" r="48" class="clock-face" />
                <g id="ticks"></g>
                <g id="numbers"></g>
                <line id="hour-hand" class="hand hand-hour" x1="50" y1="50" x2="50" y2="30" />
                <line id="minute-hand" class="hand hand-minute" x1="50" y1="50" x2="50" y2="18" />
                <line id="second-hand" class="hand hand-second" x1="50" y1="50" x2="50" y2="12" />
                <circle cx="50" cy="50" r="2.5" class="center-dot" />
            </svg>

            <div class="date-display">
                <div class="digital-time" id="digital-clock">00:00</div>
                <div class="date-text" id="date-text">Ukedag 1. januar</div>
                <div class="period-text" id="period-text">Det er...</div>
            </div>
        </div>

        <div class="right-panel" id="event-container">
            </div>

        <div class="scroll-hint-btn" id="scroll-hint-element" onclick="scrollCalendarDown()">
            <span>Dra eller trykk for å se de neste 30 dagene</span>
            <span class="scroll-arrow">↓</span>
        </div>

    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        // --- GOOGLE API-KONFIGURASJON ---
        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com'; 
        const HOLIDAY_CALENDAR_ID = 'no.norwegian#holiday@group.v.calendar.google.com'; 

        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];
        
        let globalEventsCache = {}; 
        let globalHolidaysCache = {}; 
        let wakeLock = null;
        let inactivityTimeout = null;

        function buildClockUI() {
            const ticksG = document.getElementById('ticks');
            const numsG = document.getElementById('numbers');
            ticksG.innerHTML = '';
            numsG.innerHTML = '';
            
            for (let i = 0; i < 60; i++) {
                const isHour = i % 5 === 0;
                const angle = (i * 6) * (Math.PI / 180);
                const r1 = isHour ? 41 : 44;
                const r2 = 48;
                const x1 = 50 + r1 * Math.sin(angle);
                const y1 = 50 - r1 * Math.cos(angle);
                const x2 = 50 + r2 * Math.sin(angle);
                const y2 = 50 - r2 * Math.cos(angle);
                
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1); line.setAttribute("y1", y1);
                line.setAttribute("x2", x2); line.setAttribute("y2", y2);
                line.classList.add(isHour ? "tick-hour" : "tick-minute");
                ticksG.appendChild(line);
            }

            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30) * (Math.PI / 180);
                const r = 33; 
                const x = 50 + r * Math.sin(angle);
                const y = 50 - r * Math.cos(angle) + 0.5; 
                
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", x); txt.setAttribute("y", y);
                txt.classList.add("clock-number");
                txt.textContent = i;
                numsG.appendChild(txt);
            }
        }

        function updateClockAndLayout() {
            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            const h = now.getHours();

            document.getElementById('second-hand').setAttribute('transform', `rotate(${s * 6} 50 50)`);
            document.getElementById('minute-hand').setAttribute('transform', `rotate(${m * 6 + s * 0.1} 50 50)`);
            document.getElementById('hour-hand').setAttribute('transform', `rotate(${(h % 12) * 30 + m * 0.5} 50 50)`);

            // Bruker lokaltilpasset tidsvisning for storskjerm
            let hoursStr = String(h).padStart(2, '0');
            let minutesStr = String(m).padStart(2, '0');
            try {
                hoursStr = now.toLocaleTimeString('no-NO', { hour: '2-digit', hour12: false, timeZone: 'Europe/Oslo' });
                minutesStr = now.toLocaleTimeString('no-NO', { minute: '2-digit', timeZone: 'Europe/Oslo' }).padStart(2, '0');
            } catch(e) {}
            document.getElementById('digital-clock').textContent = `${hoursStr}:${minutesStr}`;

            const dayName = ukeDager[now.getDay()];
            const dayNum = now.getDate();
            const monthName = maaneder[now.getMonth()].toLowerCase();
            const yearNum = now.getFullYear();
            document.getElementById('date-text').textContent = `${dayName} ${dayNum}. ${monthName} ${yearNum}`;

            const isNight = h >= 22 || h < 7;
            document.getElementById('layout-box').className = `main-layout ${isNight ? 'night-mode' : 'day-mode'}`;
            
            let periodText = "Det er natt";
            if (h >= 7 && h < 10) periodText = "Det er morgen";
            else if (h >= 10 && h < 12) periodText = "Det er formiddag";
            else if (h >= 12 && h < 18) periodText = "Det er ettermiddag";
            else if (h >= 18 && h < 22) periodText = "Det er kveld";
            document.getElementById('period-text').textContent = periodText;
        }

        function renderCalendarList() {
            const container = document.getElementById('event-container');
            container.innerHTML = '';
            
            const today = new Date();
            const todayKey = today.toISOString().split('T')[0];
            let totalDaysRendered = 0;

            for (let i = 0; i < 30; i++) {
                const currentDay = new Date();
                currentDay.setDate(today.getDate() + i);
                const dateKey = currentDay.toISOString().split('T')[0];

                const hasPersonalEvents = globalEventsCache[dateKey] && globalEventsCache[dateKey].length > 0;
                const hasHoliday = globalHolidaysCache[dateKey];

                if (!hasPersonalEvents && !hasHoliday) {
                    continue;
                }

                totalDaysRendered++;

                const daySection = document.createElement('div');
                daySection.className = 'day-section';
                
                if (dateKey === todayKey) {
                    daySection.className += ' today-highlight';
                }

                const dayName = ukeDager[currentDay.getDay()];
                const dateNum = currentDay.getDate();
                const monthName = maaneder[currentDay.getMonth()].toLowerCase();
                
                const title = document.createElement('div');
                title.className = 'day-title';
                title.textContent = `${dayName} ${dateNum}. ${monthName}:`;
                
                if (dateKey === todayKey) {
                    title.innerHTML += '<span class="today-badge">I dag</span>';
                }
                
                daySection.appendChild(title);

                if (hasHoliday) {
                    const holDiv = document.createElement('div');
                    holDiv.className = 'holiday-text';
                    holDiv.textContent = globalHolidaysCache[dateKey];
                    daySection.appendChild(holDiv);
                }

                if (hasPersonalEvents) {
                    const list = document.createElement('ul');
                    list.className = 'event-list';

                    globalEventsCache[dateKey].forEach(ev => {
                        const li = document.createElement('li');
                        li.className = 'event-item';

                        let timeStr = 'Hele dagen';
                        if (ev.start.dateTime) {
                            const d = new Date(ev.start.dateTime);
                            timeStr = d.toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit', timeZone: 'Europe/Oslo'}).replace(':', '.');
                        }

                        li.innerHTML = `<span class="event-time">${timeStr}:</span>${ev.summary || ''}`;
                        list.appendChild(li);
                    });
                    daySection.appendChild(list);
                }

                container.appendChild(daySection);
            }

            if (totalDaysRendered === 0) {
                const noEvContainer = document.createElement('div');
                noEvContainer.className = 'no-events-container';
                noEvContainer.innerHTML = '<div class="no-events-text">Ingen planer de neste 30 dagene</div>';
                container.appendChild(noEvContainer);
            }
        }

        // Knapp-skrolling
        function scrollCalendarDown() {
            resetInactivityTimer();
            const panel = document.getElementById('event-container');
            panel.scrollBy({ top: 250, behavior: 'smooth' });
        }

        // Skjuler knappen hvis man skroller nedover i listen
        function handleScrollVisibility() {
            const panel = document.getElementById('event-container');
            const hint = document.getElementById('scroll-hint-element');
            if (panel.scrollTop > 60) {
                hint.style.opacity = '0';
                hint.style.transform = 'translateY(10px)';
                hint.style.pointerEvents = 'none';
            } else {
                hint.style.opacity = '1';
                hint.style.transform = 'translateY(0)';
                hint.style.pointerEvents = 'auto';
            }
        }

        function fetchCalendarData() {
            if (API_KEY === 'DIN_GOOGLE_API_KEY') return;

            gapi.client.init({
                'apiKey': API_KEY,
                'discoveryDocs': ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
            }).then(function() {
                const start = new Date();
                start.setHours(0,0,0,0);
                const end = new Date();
                end.setDate(end.getDate() + 31);

                const personalRequest = gapi.client.calendar.events.list({
                    'calendarId': CALENDAR_ID,
                    'timeMin': start.toISOString(),
                    'timeMax': end.toISOString(),
                    'singleEvents': true,
                    'orderBy': 'startTime'
                });

                const holidayRequest = gapi.client.calendar.events.list({
                    'calendarId': HOLIDAY_CALENDAR_ID,
                    'timeMin': start.toISOString(),
                    'timeMax': end.toISOString(),
                    'singleEvents': true
                });

                return Promise.all([personalRequest, holidayRequest]);
            }).then(function(responses) {
                const personalEvents = responses[0].result.items;
                const holidayEvents = responses[1].result.items;

                const tempEvents = {};
                personalEvents.forEach(event => {
                    const s = event.start.dateTime || event.start.date;
                    const key = s.split('T')[0];
                    if (!tempEvents[key]) { tempEvents[key] = []; }
                    tempEvents[key].push(event);
                });
                globalEventsCache = tempEvents;

                const tempHolidays = {};
                holidayEvents.forEach(h => {
                    const s = h.start.date || h.start.dateTime;
                    const key = s.split('T')[0];
                    tempHolidays[key] = h.summary;
                });
                globalHolidaysCache = tempHolidays;

                renderCalendarList();
            }).catch(err => {
                console.log("Feil under henting av kalenderdata:", err);
                renderCalendarList();
            });
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(function() {
                const container = document.getElementById('event-container');
                if (container) {
                    container.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }, 180000); 
        }

        function setupInactivityListeners() {
            const panel = document.getElementById('event-container');
            panel.addEventListener('scroll', () => {
                resetInactivityTimer();
                handleScrollVisibility();
            });
            
            window.addEventListener('touchstart', resetInactivityTimer, true);
            window.addEventListener('touchmove', resetInactivityTimer, true);
            window.addEventListener('mousedown', resetInactivityTimer, true);
            resetInactivityTimer();
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            
            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) { docElm.requestFullscreen(); }
            } catch (e) {}

            requestWakeLock();
            buildClockUI();
            updateClockAndLayout();
            renderCalendarList();
            setupInactivityListeners();
            
            setInterval(updateClockAndLayout, 1000);

            try {
                gapi.load('client', () => {
                    fetchCalendarData();
                    setInterval(fetchCalendarData, 300000); 
                });
            } catch (gErr) {}
        }
    </script>
</body>
</html>
