<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Seniorkalender</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f1f5f9; color: #1e293b; }
        .event-item { font-size: 1.5rem; margin-bottom: 15px; padding: 15px; background: white; border-radius: 8px; border-left: 5px solid #06b6d4; }
    </style>
</head>
<body>
    <div id="calendar-list">Laster avtaler...</div>
    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com';

        function hentKlokkeslettFraTekst(summary) {
            const matches = summary.match(/([0-9]{1,2})[:.]([0-9]{2})/g);
            if (matches) {
                const sisteTid = matches[matches.length - 1];
                const [h, m] = sisteTid.split(/[:.]/);
                return parseInt(h) * 60 + parseInt(m);
            }
            return 9999;
        }

        function fetchEvents() {
            gapi.client.calendar.events.list({
                calendarId: CALENDAR_ID,
                timeMin: new Date().toISOString(),
                singleEvents: true
            }).then(res => {
                const list = document.getElementById('calendar-list');
                list.innerHTML = '';
                let items = (res.result.items || []).sort((a, b) => hentKlokkeslettFraTekst(a.summary) - hentKlokkeslettFraTekst(b.summary));

                items.forEach(ev => {
                    let tid = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'}) : "Hele dagen";
                    list.innerHTML += `<div class='event-item'><b>${tid}</b>: ${ev.summary}</div>`;
                });
            });
        }

        gapi.load('client', () => {
            gapi.client.init({apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"]})
            .then(fetchEvents);
        });
    </script>
</body>
</html>
