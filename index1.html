<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="robots" content="noindex, nofollow">
    
    <title>Digital og Analog Kalenderskjerm</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            font-family: 'Lato', sans-serif;
            overflow: hidden;
            user-select: none;
            padding: 20px; 
            transition: background 1.5s ease, color 1.5s ease;
        }

        body.day-mode { background: #f1f5f9; color: #1e293b; }
        body.night-mode { background: #0f172a; color: #f8fafc; }

        .main-layout {
            display: grid;
            grid-template-columns: 35% 1fr;
            gap: 30px;
            height: 100%;
            width: 100%;
            position: relative;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            height: 100%;
        }

        .analog-clock-svg {
            width: 100%;
            max-width: 340px;
            height: auto;
            aspect-ratio: 1 / 1;
        }
        
        .clock-face { fill: none; }
        .tick-minute { stroke: #334155; stroke-width: 0.6; }
        .tick-hour { stroke: #1e293b; stroke-width: 2.8; stroke-linecap: round; }
        .clock-number { 
            font-family: 'Poppins', sans-serif; 
            font-weight: 700; 
            font-size: 8.5px; 
            fill: #1e293b; 
            text-anchor: middle; 
            dominant-baseline: middle; 
        }

        .hand { stroke-linecap: round; }
        .hand-hour { stroke: #1e293b; stroke-width: 5.5; }
        .hand-minute { stroke: #1e293b; stroke-width: 4; }
        .hand-second { stroke: #ef4444; stroke-width: 1.3; }
        .center-dot { fill: #ef4444; }

        .night-mode .tick-minute { stroke: #94a3b8; }
        .night-mode .tick-hour, .night-mode .clock-number, .night-mode .hand-hour, .night-mode .hand-minute { fill: #f8fafc; stroke: #f8fafc; }

        .digital-time {
            font-family: 'Poppins', sans-serif;
            font-size: 6.5vw;
            font-weight: 700;
            line-height: 0.9;
            margin: 5px 0;
            letter-spacing: -2px;
            text-align: center;
        }

        .date-display { text-align: center; width: 100%; }
        .date-text { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 12px; line-height: 1.1; }

        .period-text {
            font-family: 'Poppins', sans-serif; 
            font-size: 26px; 
            font-weight: 700;
            background: #e2e8f0; 
            padding: 8px 30px; 
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: color 1s ease, background 1s ease;
        }
        
        .period-morgen { color: #e11d48; background: #ffe4e6; }       
        .period-formiddag { color: #ea580c; background: #ffedd5; }    
        .period-ettermiddag { color: #991b1b; background: #e2e8f0; }  
        .period-kveld { color: #be123c; background: #ffe4e6; }        
        
        .night-mode .period-text { background: #1e293b; color: #94a3b8; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .night-mode .period-text.period-natt { color: #38bdf8; background: #1e293b; }

        .right-panel {
            height: 100%;
            overflow-y: auto;
            scrollbar-width: none;
            padding-bottom: 20px; 
            pointer-events: auto !important;
        }
        .right-panel::-webkit-scrollbar { display: none; }

        .day-section {
            width: 100%;
            margin-bottom: 15px; 
            padding: 20px; 
            border-radius: 12px;
            border: 1px solid #cbd5e1; 
            background-color: transparent;
            position: relative; 
            overflow: hidden;
            transition: background 0.5s ease, border 0.5s ease;
        }
        .night-mode .day-section { border: 1px solid #334155; }

        .day-section.today-highlight {
            padding: 20px; 
            background-color: #ffffff; 
            border: 2px solid #ef4444; 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05); 
            margin-bottom: 20px; 
        }
        .night-mode .day-section.today-highlight { background-color: #1e293b; border: 2px solid #ef4444; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3); }

        .day-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px; 
            text-transform: capitalize;
            width: 100%;
        }

        .today-badge {
            font-size: 20px; 
            background: #ef4444;
            color: white;
            padding: 4px 18px; 
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.2;
            box-shadow: 0 4px 8px rgba(239, 68, 68, 0.2); 
            white-space: nowrap; 
        }

        .holiday-text { font-size: 16px; color: #ef4444; font-weight: 700; font-style: italic; margin-top: -6px; margin-bottom: 10px; text-transform: uppercase; }
        .event-list { list-style: none; padding-left: 20px; }
        .event-item { font-size: 20px; margin-bottom: 10px; line-height: 1.4; position: relative; font-weight: 400; }
        .event-item::before { content: "•"; position: absolute; left: -20px; font-size: 24px; line-height: 1; color: #64748b; }

        .event-time { color: #ef4444; font-weight: 700; margin-right: 8px; }
        .night-mode .event-time { color: #f87171; }

        .no-events-container { padding: 30px; text-align: center; }
        .no-events-text { font-size: 22px; color: #64748b; font-weight: 700; }

        @media (max-width: 900px) or (orientation: portrait) {
            body { padding: 12px; overflow-y: auto; }
            .main-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; gap: 24px; height: auto; overflow: visible; }
            .left-panel { padding-right: 0; padding-bottom: 12px; height: auto; gap: 15px; }
            .analog-clock-svg { width: 260px; max-width: 80%; }
            .digital-time { font-size: 12vw; letter-spacing: -1px; margin: 3px 0; }
            .date-text { font-size: 24px; margin-bottom: 12px; }
            .period-text { font-size: 22px; }
            .right-panel { height: auto; overflow: visible; padding-bottom: 20px; }
        }
    </style>
</head>
<body class="day-mode">

    <div class="main-layout" id="layout-box">
        <div class="left-panel">
            <svg class="analog-clock-svg" viewBox="0 0 100 100" id="analog-clock">
                <circle cx="50" cy="50" r="48" class="clock-face" />
                <g id="ticks"></g>
                <g id="numbers"></g>
                <line id="hour-hand" class="hand hand-hour" x1="50" y1="50" x2="50" y2="30" />
                <line id="minute-hand" class="hand hand-minute" x1="50" y1="50" x2="50" y2="18" />
                <line id="second-hand" class="hand hand-second" x1="50" y1="50" x2="50" y2="12" />
                <circle cx="50" cy="50" r="2.5" class="center-dot" />
            </svg>

            <div class="date-display">
                <div class="digital-time" id="digital-clock">00:00</div>
                <div class="date-text" id="date-text">Ukedag 1. januar</div>
                <div class="period-text" id="period-text">Det er...</div>
            </div>
        </div>
        <div class="right-panel" id="event-container"></div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        const API_KEY = 'AIzaSyAMeiF7aD3eNmSy4YZUN97WT2LWZMYiBT0';
        const CALENDAR_ID = 'jonelseth@gmail.com'; 
        const HOLIDAY_CALENDAR_ID = 'no.norwegian#holiday@group.v.calendar.google.com'; 

        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];
        
        let globalEventsCache = {}; 
        let globalHolidaysCache = {}; 
        let wakeLock = null;
        let inactivityTimeout = null;

        function buildClockUI() {
            const ticksG = document.getElementById('ticks');
            const numsG = document.getElementById('numbers');
            if(!ticksG || !numsG) return;
            ticksG.innerHTML = '';
            numsG.innerHTML = '';
            
            for (let i = 0; i < 60; i++) {
                const isHour = i % 5 === 0;
                const angle = (i * 6) * (Math.PI / 180);
                const r1 = isHour ? 41 : 44;
                const r2 = 48;
                const x1 = 50 + r1 * Math.sin(angle);
                const y1 = 50 - r1 * Math.cos(angle);
                const x2 = 50 + r2 * Math.sin(angle);
                const y2 = 50 - r2 * Math.cos(angle);
                
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1); line.setAttribute("y1", y1);
                line.setAttribute("x2", x2); line.setAttribute("y2", y2);
                line.classList.add(isHour ? "tick-hour" : "tick-minute");
                ticksG.appendChild(line);
            }

            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30) * (Math.PI / 180);
                const r = 33; 
                const x = 50 + r * Math.sin(angle);
                const y = 50 - r * Math.cos(angle) + 0.5; 
                
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", x); txt.setAttribute("y", y);
                txt.classList.add("clock-number");
                txt.textContent = i;
                numsG.appendChild(txt);
            }
        }

        function updateClockAndLayout() {
            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            const h = now.getHours();

            const secHand = document.getElementById('second-hand');
            const minHand = document.getElementById('minute-hand');
            const hrHand = document.getElementById('hour-hand');
            
            if(secHand) secHand.setAttribute('transform', `rotate(${s * 6} 50 50)`);
            if(minHand) minHand.setAttribute('transform', `rotate(${m * 6 + s * 0.1} 50 50)`);
            if(hrHand) hrHand.setAttribute('transform', `rotate(${(h % 12) * 30 + m * 0.5} 50 50)`);

            let hoursStr = String(h).padStart(2, '0');
            let minutesStr = String(m).padStart(2, '0');
            try {
                hoursStr = now.toLocaleTimeString('no-NO', { hour: '2-digit', hour12: false, timeZone: 'Europe/Oslo' });
                minutesStr = now.toLocaleTimeString('no-NO', { minute: '2-digit', timeZone: 'Europe/Oslo' }).padStart(2, '0');
            } catch(e) {}
            
            const digClock = document.getElementById('digital-clock');
            if(digClock) digClock.textContent = `${hoursStr}:${minutesStr}`;

            const dayName = ukeDager[now.getDay()];
            const dayNum = now.getDate();
            const monthName = maaneder[now.getMonth()].toLowerCase();
            const yearNum = now.getFullYear();
            
            const dateTxt = document.getElementById('date-text');
            if(dateTxt) dateTxt.textContent = `${dayName} ${dayNum}. ${monthName} ${yearNum}`;

            if (h === 3 && m === 0 && s === 0) {
                window.location.reload(true);
                return;
            }

            if (h === 0 && m === 0 && s === 0) {
                renderCalendarList(); 
            }

            const isNightModeActive = h >= 22 || h < 7;
            document.body.className = isNightModeActive ? "night-mode" : "day-mode";
            
            let periodText = "Det er natt";
            let periodClass = "period-natt";
            
            if (h >= 6 && h < 9) { periodText = "Det er morgen"; periodClass = "period-morgen"; }
            else if (h >= 9 && h < 12) { periodText = "Det er formiddag"; periodClass = "period-formiddag"; }
            else if (h >= 12 && h < 18) { periodText = "Det er ettermiddag"; periodClass = "period-ettermiddag"; }
            else if (h >= 18 && h < 24) { periodText = "Det er kveld"; periodClass = "period-kveld"; }
            
            const periodEl = document.getElementById('period-text');
            if(periodEl) {
                periodEl.textContent = periodText;
                periodEl.className = "period-text " + periodClass;
            }
        }

        function renderCalendarList() {
            const container = document.getElementById('event-container');
            if(!container) return;
            container.innerHTML = '';
            
            const today = new Date();
            const todayKey = today.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
            let totalDaysRendered = 0;

            for (let i = 0; i < 185; i++) {
                const currentDay = new Date();
                currentDay.setDate(today.getDate() + i);
                const dateKey = currentDay.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});

                const hasPersonalEvents = globalEventsCache[dateKey] && globalEventsCache[dateKey].length > 0;
                const hasHoliday = globalHolidaysCache[dateKey];

                if (!hasPersonalEvents && !hasHoliday) continue;

                totalDaysRendered++;

                const daySection = document.createElement('div');
                daySection.className = 'day-section';
                if (dateKey === todayKey) daySection.className += ' today-highlight';

                const dayName = ukeDager[currentDay.getDay()];
                const dateNum = currentDay.getDate();
                const monthName = maaneder[currentDay.getMonth()].toLowerCase();
                
                const title = document.createElement('div');
                title.className = 'day-title';
                
                let titleHTML = `<span>${dayName} ${dateNum}. ${monthName}:</span>`;
                if (dateKey === todayKey) titleHTML += '<span class="today-badge">I dag</span>';
                title.innerHTML = titleHTML;
                daySection.appendChild(title);

                if (hasHoliday) {
                    const holDiv = document.createElement('div');
                    holDiv.className = 'holiday-text';
                    holDiv.textContent = globalHolidaysCache[dateKey];
                    daySection.appendChild(holDiv);
                }

                if (hasPersonalEvents) {
                    const list = document.createElement('ul');
                    list.className = 'event-list';

                    globalEventsCache[dateKey].forEach(ev => {
                        const li = document.createElement('li');
                        li.className = 'event-item';

                        let timeStr = 'Hele dagen';
                        if (ev.start.dateTime) {
                            const d = new Date(ev.start.dateTime);
                            timeStr = d.toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit', timeZone: 'Europe/Oslo'}).replace(':', '.');
                        }

                        li.textContent = ` ${ev.summary}`;
                        let timeSpan = document.createElement('span');
                        timeSpan.className = 'event-time';
                        timeSpan.textContent = `${timeStr}:`;
                        li.insertBefore(timeSpan, li.firstChild);

                        list.appendChild(li);
                    });
                    daySection.appendChild(list);
                }
                container.appendChild(daySection);
            }

            if (totalDaysRendered === 0) {
                const noEvContainer = document.createElement('div');
                noEvContainer.className = 'no-events-container';
                noEvContainer.innerHTML = '<div class="no-events-text">Ingen planer de neste 6 månedene</div>';
                container.appendChild(noEvContainer);
            }
        }

        function fetchCalendarData() {
            if (API_KEY === 'DIN_GOOGLE_API_KEY') return;

            try {
                gapi.client.init({
                    'apiKey': API_KEY,
                    'discoveryDocs': ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
                }).then(function() {
                    const start = new Date();
                    start.setHours(0,0,0,0);
                    const end = new Date();
                    end.setDate(end.getDate() + 185);

                    const personalRequest = gapi.client.calendar.events.list({
                        'calendarId': CALENDAR_ID,
                        'timeMin': start.toISOString(),
                        'timeMax': end.toISOString(),
                        'singleEvents': true,
                        'orderBy': 'startTime'
                    });

                    const holidayRequest = gapi.client.calendar.events.list({
                        'calendarId': HOLIDAY_CALENDAR_ID,
                        'timeMin': start.toISOString(),
                        'timeMax': end.toISOString(),
                        'singleEvents': true
                    });

                    return Promise.all([personalRequest, holidayRequest]);
                }).then(function(responses) {
                    const personalEvents = responses[0].result.items;
                    const holidayEvents = responses[1].result.items;

                    const tempEvents = {};
                    personalEvents.forEach(event => {
                        if (event.start.date) {
                            const startParts = event.start.date.split('-');
                            const endParts = event.end.date.split('-');
                            let current = new Date(startParts[0], startParts[1] - 1, startParts[2]);
                            const end = new Date(endParts[0], endParts[1] - 1, endParts[2]);
                            while (current < end) {
                                const key = current.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                                if (!tempEvents[key]) tempEvents[key] = [];
                                tempEvents[key].push(event);
                                current.setDate(current.getDate() + 1);
                            }
                        } else if (event.start.dateTime) {
                            let current = new Date(event.start.dateTime);
                            let startKey = current.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                            let end = new Date(event.end.dateTime);
                            let endKey = end.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                            
                            if (startKey === endKey) {
                                if (!tempEvents[startKey]) tempEvents[startKey] = [];
                                tempEvents[startKey].push(event);
                            } else {
                                let iter = new Date(current.getFullYear(), current.getMonth(), current.getDate());
                                let stop = new Date(end.getFullYear(), end.getMonth(), end.getDate());
                                while (iter <= stop) {
                                    const key = iter.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                                    if (!tempEvents[key]) tempEvents[key] = [];
                                    tempEvents[key].push(event);
                                    iter.setDate(iter.getDate() + 1);
                                }
                            }
                        }
                    });
                    globalEventsCache = tempEvents;

                    const tempHolidays = {};
                    holidayEvents.forEach(h => {
                        let dateStr = h.start.date || h.start.dateTime.split('T')[0];
                        let parts = dateStr.split('-');
                        let d = new Date(parts[0], parts[1] - 1, parts[2]);
                        let key = d.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                        tempHolidays[key] = h.summary;
                    });
                    globalHolidaysCache = tempHolidays;

                    renderCalendarList();
                }).catch(err => {
                    console.log("Feil under henting av kalenderdata:", err);
                    renderCalendarList();
                });
            } catch (e) {
                console.log("Klarte ikke initialisere GAPI client:", e);
                renderCalendarList();
            }
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(function() {
                const panel = document.getElementById('event-container');
                const isPortrait = window.matchMedia("(max-width: 900px) or (orientation: portrait)").matches;
                if (isPortrait) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (panel) {
                    panel.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }, 180000); 
        }

        function setupInactivityListeners() {
            const panel = document.getElementById('event-container');
            if(!panel) return;
            panel.addEventListener('scroll', resetInactivityTimer);
            window.addEventListener('scroll', resetInactivityTimer);
            window.addEventListener('touchstart', resetInactivityTimer, true);
            window.addEventListener('touchmove', resetInactivityTimer, true);
            window.addEventListener('mousedown', resetInactivityTimer, true);
            resetInactivityTimer();
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }

        window.addEventListener('DOMContentLoaded', () => {
            buildClockUI();
            updateClockAndLayout();
            renderCalendarList();
            setupInactivityListeners();
            requestWakeLock();
            
            setInterval(updateClockAndLayout, 1000);

            try {
                gapi.load('client', () => {
                    fetchCalendarData();
                    setInterval(fetchCalendarData, 300000); 
                });
            } catch(e){
                console.log("Gapi load feilet:", e);
            }
        });
    </script>
</body>
</html>
