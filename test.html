<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex, nofollow">

    <title>Eksklusiv Seniorkalender</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">

    <style>
        /* :root definerer fargevariabler som brukes i hele stilen for enkel endring */
        :root {
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #0066cc;
            --clock-accent: #ef4444;
            --shadow: rgba(0, 0, 0, 0.05);
            --box-bg: #ffffff;
            --box-border: #cbd5e1;
            --highlight-text: #0066cc;
            --time-of-day-color: #0f172a;
        }

        /* body.night-mode brukes for å invertere farger automatisk når det er sent */
        body.night-mode {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --clock-accent: #ef4444;
            --clock-ticks: #94a3b8;
            --shadow: rgba(0, 0, 0, 0.3);
            --box-bg: #1e293b;
            --box-border: #334155;
            --highlight-text: #38bdf8;
            --time-of-day-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* body: Hovedbeholderen, setter grunnfont og layout */
        body {
            min-height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            user-select: none;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            padding: 50px 60px 74px 60px;
            transition: background 1s ease, color 1s ease;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        /* header: Holder klokken og datoen på toppen */
        header {
            height: 110px;
            display: flex;
            justify-content: space-between;
            background-color: var(--bg-color);
            transition: background 1s ease;
            margin-bottom: 40px;
            position: relative;
            flex-shrink: 0;
        }

        .header-clocks-left {
            display: flex;
            align-items: flex-end;
            flex-shrink: 0;
            height: 110px;
        }

        .digital-clock-big {
            font-size: 142px;
            font-weight: 500;
            letter-spacing: -5px;
            line-height: 0.72;
            display: inline-block;
            margin-bottom: -5px;
        }

        .time-of-day-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
        }

        .time-of-day-label {
            font-size: 3.0rem;
            font-weight: 700;
            color: var(--time-of-day-color);
            text-transform: none;
            line-height: 1.0;
        }

        .header-date-right {
            font-size: 2.0rem;
            color: var(--text-main);
            font-weight: 700;
            line-height: 1.0;
            margin-top: 15px;
        }

        .natt-dimming {
            opacity: 0.3;
            filter: grayscale(80%);
            transition: opacity 1s ease;
        }

        /* status-box-container: Rammen rundt neste avtale-feltet */
        .status-box-container {
            width: 100%;
            margin-bottom: 20px;
            background-color: var(--box-bg);
            border: 3px solid var(--accent-color);
            border-radius: 16px;
            box-shadow: 0 10px 20px var(--shadow);
            font-family: 'Poppins', sans-serif;
            font-size: 2.0rem;
            font-weight: 900;
            padding: 25px;
            line-height: 1.3;
            letter-spacing: -0.5px;
            transition: background 1s ease, border 1s ease, box-shadow 1s ease;
        }

        /* status-fete-typer: Klassestil for å sikre at teksten i statusboksen er stor og fet */
        .status-fete-typer {
            font-weight: 900 !important;
            font-size: 2.4rem !important;
            color: var(--text-main);
        }

        main {
            flex: 1;
            display: flex;
        }

        .column {
            padding-top: 10px;
        }

        .left-column {
            width: max-content;
            background-color: var(--bg-color);
            padding-right: 60px;
            margin-right: 60px;
            border-right: 1px dashed var(--text-muted);
        }

        .right-column {
            flex: 1;
            background-color: var(--bg-color);
        }

        .info-day-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2.0rem;
            font-weight: 900;
            margin-bottom: 15px;
            padding-left: 0px;
        }

        .day-header {
            padding-left: 0px !important;
            font-size: 2.2rem;
            font-weight: 900 !important;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
            color: var(--text-main);
            opacity: 1 !important;
        }

        /* info-content: Styling for rutinelistene */
        .info-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-family: 'Lato', sans-serif;
            font-size: 1.55rem;
            color: var(--text-main);
            padding-left: 40px;
        }

        .info-item {
            white-space: nowrap;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
        }

        .info-bullet {
            flex-shrink: 0;
            margin-right: 10px;
            line-height: 1.4;
        }

        .info-time {
            color: var(--text-main);
            font-weight: 700;
            margin-right: 5px;
        }

        .fet-rutine {
            font-weight: 900 !important;
            font-size: 1.55rem !important;
        }

        .day-section {
            width: 100%;
            margin-bottom: 35px;
            padding-bottom: 30px;
            border-bottom: 2px dashed var(--box-border);
        }

        .dimmed {
            opacity: 0.0;
            transition: opacity 0.5s ease-in-out;
        }

        .no-dimming .dimmed {
            opacity: 1 !important;
        }

        /* event-item: Individuelle avtaler fra Google Kalender */
        .event-item {
            font-family: 'Lato', sans-serif;
            font-size: 1.55rem;
            line-height: 1.4;
            color: var(--text-main);
            display: flex;
            align-items: flex-start;
        }

        .event-bullet {
            flex-shrink: 0;
            margin-right: 10px;
            line-height: 1.4;
        }

        .event-text-container {
            flex: 1;
        }

        .event-time {
            color: var(--text-main);
            font-weight: 700;
            margin-right: 6px;
        }

        .day-date {
            padding-left: 40px !important;
            font-size: 1.75rem;
            font-family: 'Poppins', sans-serif;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 40px !important;
            margin-top: 10px;
        }

        /* Badges for å fargekode avtaler */
        .badge-navn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 10px 2px 10px;
            height: 1.8em;
            border-radius: 6px;
            font-weight: 700;
            color: #ffffff !important;
            margin-right: 10px;
            font-size: 1em;
            margin-bottom: 2px;
        }

        .badge-mamma {
            background-color: #16a34a;
        }

        .badge-pappa {
            background-color: #d97706;
        }

        .badge-begge {
            background-color: #0891b2;
        }

        /* aktiv-boks: Fremhever en pågående rutine */
        .aktiv-boks {
            background-color: var(--box-bg);
            border: 3px solid var(--accent-color);
            border-radius: 16px;
            padding: 8px 15px;
            margin-left: -15px;
            margin-right: 10px;
            box-shadow: 0 4px 8px var(--shadow);
            font-weight: 900;
        }



        /* Ny natt-stil som dimmer alt innhold */
        .night-dim {
            opacity: 0.3 !important;
            transition: opacity 1s ease;
        }







        /* Media-spørring: Justerer design for mobil (maks 900px bredde) */
        @media (max-width: 900px) or (orientation: portrait) {
            body {
                padding: 17px 20px 40px 20px;
            }

            main {
                flex-direction: column;
                /* Tvinger kolonnene under hverandre */
            }

            .right-column {
                width: 100%;
                /* Sørger for at kalenderen tar full bredde */
                margin-top: 20px;
            }

            header {
                flex-direction: column;
                height: auto;
                gap: 15px;
                text-align: center;
                align-items: center;
                margin-bottom: 20px;
            }

            .header-clocks-left {
                justify-content: center;
                align-items: center;
                width: 100%;
                height: auto;
            }

            .digital-clock-big {
                font-size: 5rem;
                line-height: 1.0;
                height: auto;
                letter-spacing: -2px;
                margin-bottom: 0;
            }

            .time-of-day-wrapper {
                align-items: center;
                text-align: center;
                margin-top: 10px;
            }

            .status-fete-typer {
                font-size: 1.4rem !important;
                line-height: 1.2 !important;
            }

            .left-column {
                width: 100%;
                padding-right: 0;
                margin-right: 0;
                border-right: none;
            }

            .info-content,
            .event-item {
                font-size: 1.25rem !important;
                padding-left: 0px !important;
            }

            .info-day-title,
            .day-header {
                font-size: 1.6rem !important;
                margin-bottom: 8px !important;
                padding-left: 0px !important;
            }

            .day-date,
            .event-list,
            .holiday-text,
            .no-events-text {
                padding-left: 0px !important;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-clocks-left">
            <div class="digital-clock-big" id="digital-clock">00:00</div>
        </div>
        <div class="time-of-day-wrapper">
            <div class="time-of-day-label" id="time-of-day-label">Laster...</div>
            <div class="header-date-right" id="complete-date-string">Laster dato...</div>

    <div class="status-box-container" id="live-status-bar" style="display: none;"></div>

    <main>
        <div class="column left-column">

            <div class="info-content" id="info-text">Laster faste rutiner...</div>

        <div class="column right-column">
            <div id="beroligende-bilde-container" style="margin-bottom: 20px; display: none;">
                <img id="dagens-bilde" src="" alt="Dagens bilde"

    <script src="https://apis.google.com/js/api.js"></script>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>/* --- RUTINE-KONFIGURASJON --- */
        const fasteRutinerHverdag = [{ tid: "07:30", tekst: "Frokost" }, { tid: "08:00", tekst: "Ta medisiner" }, { tid: "09:00", tekst: "Tur med Borghild" }, { tid: "11:30", tekst: "Lunsj" }, { tid: "14:00", tekst: "Sjekke meldinger" }, { tid: "15:30", tekst: "Middag" }, { tid: "19:30", tekst: "Tur med Borghild" }, { tid: "20:30", tekst: "Kveldsmat" }];
        const fasteRutinerLoerdag = [{ tid: "07:30", tekst: "Frokost" }, { tid: "08:00", tekst: "Ta medisiner" }, { tid: "09:00", tekst: "Tur med Borghild" }, { tid: "12:00", tekst: "Ofte varm lunsj" }, { tid: "14:00", tekst: "Sjekke meldinger" }, { tid: "15:30", tekst: "Middag" }, { tid: "19:30", tekst: "Tur med Borghild" }, { tid: "20:30", tekst: "Kveldsmat" }];
        const fasteRutinerSoendag = [{ tid: "07:30", tekst: "Frokost" }, { tid: "08:00", tekst: "Ta medisiner" }, { tid: "09:00", tekst: "Tur med Borghild" }, { tid: "13:00", tekst: "Søndagsmiddag" }, { tid: "14:00", tekst: "Sjekke meldinger" }, { tid: "19:30", tekst: "Tur med Borghild" }, { tid: "20:30", tekst: "Kveldsmat" }];

        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com';
        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];

        let globalEventsCache = {};
        let nesteAvtaleID = null;

        function formatTimeManual(d) { return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`; }

        function setupInactivityListeners() {
            let t; const reset = () => { clearTimeout(t); t = setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 180000); };
            window.addEventListener('scroll', reset); window.addEventListener('touchstart', reset, true); window.addEventListener('touchmove', reset, true); window.addEventListener('mousedown', reset, true); reset();
        }

        async function requestWakeLock() { try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch (e) { } }

        function updateClockAndLayout() {
            const now = new Date();
            const isNight = (now.getHours() < 7 || now.getHours() >= 22);

            document.getElementById('digital-clock').textContent = formatTimeManual(now);
            document.body.classList.toggle('night-mode', isNight);
            document.getElementById('complete-date-string').textContent = `${ukeDager[now.getDay()]} ${now.getDate()}. ${maaneder[now.getMonth()]}`;

            const rutiner = (now.getDay() === 6) ? fasteRutinerLoerdag : (now.getDay() === 0 ? fasteRutinerSoendag : fasteRutinerHverdag);
            const kommende = rutiner.filter(r => {
                const [t, m] = r.tid.split(':').map(Number);
                return (t * 60 + m) >= (now.getHours() * 60 + now.getMinutes());
            });

            const rutineCol = document.querySelector('.left-column');
            rutineCol.classList.toggle('night-dim', isNight && kommende.length === 0);
            document.getElementById('info-text').innerHTML = genererRutineHTML(rutiner);

            oppdaterLiveStatusBoks(isNight);
        }

        function oppdaterLiveStatusBoks(isNight) {
            const statusEl = document.getElementById('live-status-bar');
            const sorterte = Object.values(globalEventsCache).flat().filter(ev => new Date(ev.computedStart) > new Date()).sort((a, b) => new Date(a.computedStart) - new Date(b.computedStart));

            if (sorterte.length > 0) {
                nesteAvtaleID = sorterte[0].id; // Lagrer ID-en for å kunne fjerne den fra listen
                statusEl.style.display = 'block';
                statusEl.classList.remove('night-dim');
                statusEl.innerHTML = `Neste: ${sorterte[0].summary} kl. ${formatTimeManual(new Date(sorterte[0].computedStart))}`;
            } else {
                nesteAvtaleID = null;
                statusEl.style.display = isNight ? 'block' : 'none';
                if (isNight) statusEl.classList.add('night-dim');
            }
            renderCalendarList();
        }

        function renderCalendarList() {
            const container = document.getElementById('calendar-list');
            const bildeContainer = document.getElementById('beroligende-bilde-container');
            const imgElement = document.getElementById('dagens-bilde');
            if (!container) return; container.innerHTML = '';

            const todayStr = new Date().toLocaleDateString('sv-SE', { timeZone: 'Europe/Oslo' });
            let iDagAvtaler = (globalEventsCache[todayStr] || []).filter(ev => new Date(ev.computedStart) > new Date() - 600000);
            iDagAvtaler.sort((a, b) => new Date(a.computedStart) - new Date(b.computedStart));

            // FJERNER DUPLIKAT: Hvis avtalen er i statusboksen, fjern fra listen
            if (nesteAvtaleID && iDagAvtaler.length > 0 && iDagAvtaler[0].id === nesteAvtaleID) {
                iDagAvtaler.shift();
            }

            // BILDE-LOGIKK: Vis bilde hvis listen er tom (etter fjerning av duplikat)
            if (iDagAvtaler.length === 0) {
                imgElement.src = new Date().getDay() + ".jpg"; // 0.jpg til 6.jpg
                bildeContainer.style.display = 'block';
            } else {
                bildeContainer.style.display = 'none';
            }

            iDagAvtaler.forEach(ev => {
                container.innerHTML += `<div class="event-item">• ${formatTimeManual(new Date(ev.computedStart))}: ${formatEventSummary(ev.summary)}</div>`;
            });
        }

        function genererRutineHTML(rutineListe) {
            let html = ""; const nå = new Date(); const nåTidMin = nå.getHours() * 60 + nå.getMinutes();
            rutineListe.forEach(item => {
                const [t, m] = item.tid.split(':').map(Number);
                if ((t * 60 + m) + 29 >= nåTidMin) {
                    const erAktiv = ((t * 60 + m) - nåTidMin <= 30 && (t * 60 + m) + 29 >= nåTidMin);
                    html += `<div class='${erAktiv ? 'event-item aktiv-boks fet-rutine' : 'info-item'}'><span class='info-bullet'>•</span><div><span class='info-time'>kl. ${item.tid}:</span> ${item.tekst}</div></div>`;
                }
            });
            return html;
        }

        function fetchCalendarData() {
            if (typeof gapi === 'undefined' || !gapi.client) return;
            gapi.client.calendar.events.list({ 'calendarId': CALENDAR_ID, 'timeMin': new Date().toISOString(), 'singleEvents': true, 'orderBy': 'startTime' }).then(res => {
                globalEventsCache = {};
                res.result.items.forEach(ev => {
                    const k = new Date(ev.start.dateTime || ev.start.date).toLocaleDateString('sv-SE', { timeZone: 'Europe/Oslo' });
                    if (!globalEventsCache[k]) globalEventsCache[k] = [];
                    ev.computedStart = (ev.start.dateTime || ev.start.date);
                    globalEventsCache[k].push(ev);
                });
                renderCalendarList();
            });
        }

        function formatEventSummary(summary) {
            if (!summary) return '';
            return summary.replace(/^(Mamma\s*&\s*[pP]appa:|Mamma\s+og\s+[pP]appa:)\s*/g, '<span class="badge-navn badge-begge">Mamma & pappa</span> ')
                .replace(/^[mM]amma:\s*/g, '<span class="badge-navn badge-mamma">Mamma</span> ')
                .replace(/^[pP]appa:\s*/g, '<span class="badge-navn badge-pappa">Pappa</span> ');
        }

        window.addEventListener('DOMContentLoaded', () => {
            setupInactivityListeners();
            requestWakeLock();
            setInterval(updateClockAndLayout, 1000);
            updateClockAndLayout();
            gapi.load('client', () => gapi.client.init({ 'apiKey': API_KEY, 'discoveryDocs': ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"] }).then(() => { fetchCalendarData(); setInterval(fetchCalendarData, 300000); }));
        });</script>
