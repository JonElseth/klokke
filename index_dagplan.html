<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Dagsplan - Korrigert Nattmodus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Farger for dagmodus */
            --bg-color: #e4e7eb;  
            --card-bg: #ffffff;   
            --panel-bg: #f8faff;  
            --inner-shadow: rgba(0, 0, 0, 0.08); 
            
            --text-left: #1a1a1a;
            --text-right: #2c3e50;
            --grid-line: #bfd0db;
            
            --btn-default: #3a4252; 
            --btn-border: transparent;
            
            --chk-future: rgba(255, 255, 255, 0.15); 
            --chk-active: #ff9f43;  
            --chk-done: #2ed573;    
        }

        /* Farger for nattmodus (22:00 - 07:00) */
        body.night-mode {
            --bg-color: #101214;
            --card-bg: #1e222b;   
            --panel-bg: #171a20;  
            --inner-shadow: rgba(0, 0, 0, 0.4); 

            --text-left: #8892b0;
            --text-right: #707b93;
            --grid-line: #2c313d;
            
            --btn-default: #2a303c; 
            --btn-border: #3d4656;  
            
            --chk-future: rgba(255, 255, 255, 0.08); 
            --chk-active: #b36b19;  
            --chk-done: #1e7e43;    
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
        }

        .tablet-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: var(--card-bg);
            padding: 4vw; 
            gap: 4vw; 
            transition: background 1s;
        }

        .sunken-panel {
            background-color: var(--panel-bg);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 12px 30px -5px var(--inner-shadow), 
                        inset 0 4px 12px -1px var(--inner-shadow);
            transition: background 1s;
        }

        .left-panel {
            flex: 1;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            color: var(--text-left);
        }

        .right-panel {
            flex: 1.8;
            padding: 40px 40px 40px 40px; 
        }

        #day-period { font-size: 3.5rem; font-weight: 300; line-height: 1.2; margin-bottom: 20px; }
        #clock { font-size: 9rem; font-weight: 400; line-height: 1; margin-bottom: 30px; letter-spacing: -2px; }
        #date { font-size: 3.2rem; font-weight: 400; line-height: 1.3; }

        .todo-list-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 10%; 
            border-bottom: 1px solid var(--grid-line); 
            font-size: 2.2rem;
            color: var(--text-right);
        }

        .todo-text {
            display: flex;
            align-items: center;
            gap: 30px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .todo-time { min-width: 110px; display: inline-block; font-weight: 500; }
        .todo-desc { font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .action-container {
            display: flex;
            align-items: center;
        }

        @keyframes pulseCheck {
            0% {
                transform: translate(-50%, -50%) scale(1);
                text-shadow: 0 0 4px rgba(255, 159, 67, 0.4);
                opacity: 0.8;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.25); 
                text-shadow: 0 0 15px rgba(255, 159, 67, 0.9); 
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                text-shadow: 0 0 4px rgba(255, 159, 67, 0.4);
                opacity: 0.8;
            }
        }

        .status-btn {
            width: 60px;
            height: 50px;
            border: 1px solid var(--btn-border);
            border-radius: 6px;
            background-color: var(--btn-default); 
            cursor: pointer;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 1px 2px rgba(255,255,255,0.1);
            position: relative;
            transition: transform 0.1s;
            flex-shrink: 0; 
            margin-right: 15px;
        }

        .status-btn:active { transform: scale(0.95); }

        .status-btn::after {
            content: '✓';
            font-family: sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--chk-future); 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .status-btn.active::after {
            color: var(--chk-active);
            animation: pulseCheck 1.4s infinite ease-in-out;
        }

        .status-btn.done::after {
            color: var(--chk-done);
            text-shadow: 0 0 8px rgba(46, 213, 115, 0.6);
            animation: none; 
        }

        /* SKALERING FOR NETTBRETT */
        @media (max-width: 1100px) {
            .tablet-container { padding: 25px; gap: 25px; }
            .right-panel { padding: 25px 30px 25px 30px; }
            #day-period { font-size: 2.3rem; }
            #clock { font-size: 6rem; margin-bottom: 20px; }
            #date { font-size: 2.2rem; }
            .todo-item { font-size: 1.6rem; }
            .todo-time { min-width: 75px; }
            .todo-text { gap: 15px; }
            .status-btn { width: 50px; height: 42px; margin-right: 5px; }
            .status-btn::after { font-size: 1.4rem; }
        }

        /* SKALERING FOR MOBIL */
        @media (max-width: 650px) {
            .tablet-container {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
                padding: 15px;
                gap: 15px;
            }
            .sunken-panel { flex: none; width: 100%; }
            .left-panel { padding: 30px 20px; }
            .right-panel { padding: 20px; height: 600px; }
            #clock { font-size: 5rem; margin-bottom: 10px; }
            #day-period { font-size: 2rem; margin-bottom: 10px; }
            #date { font-size: 1.8rem; }
            .todo-item { font-size: 1.4rem; }
            .todo-time { min-width: 65px; }
            .status-btn { width: 46px; height: 38px; }
        }
    </style>
</head>
<body>

    <div class="tablet-container">
        <div class="left-panel sunken-panel">
            <div id="day-period">--</div>
            <div id="clock">00:00</div>
            <div id="date">--</div>
        </div>

        <div class="right-panel sunken-panel">
            <div class="todo-list-container" id="todo-list">
                </div>
        </div>
    </div>

    <script>
        const tasksConfig = [
            { tid: "07:30", tekst: "Frokost" },
            { tid: "08:00", tekst: "Medisiner" },
            { tid: "08:15", tekst: "Dusj og pusse tenner" },
            { tid: "09:00", tekst: "Gi mat til Borghild" },
            { tid: "09:30", tekst: "Gå tur med Borghild" },
            { tid: "11:30", tekst: "Lunsj" },
            { tid: "15:00", tekst: "Sjekk e-post" },
            { tid: "15:30", tekst: "Middag" },
            { tid: "19:00", tekst: "Gå tur med Borghild" },
            { tid: "20:30", tekst: "Kveldsmat" },
            { tid: "21:45", tekst: "Pusse tenner" },
            { tid: "22:00", tekst: "Leggetid" }
        ];

        let doneTasks = JSON.parse(localStorage.getItem('kiosk_done_tasks')) || {};
        let lastCheckedDate = localStorage.getItem('kiosk_done_date') || "";

        function updateKiosk() {
            const now = new Date();
            const currentDateString = now.toDateString();

            if (lastCheckedDate !== currentDateString) {
                doneTasks = {};
                localStorage.setItem('kiosk_done_tasks', JSON.stringify(doneTasks));
                localStorage.setItem('kiosk_done_date', currentDateString);
                lastCheckedDate = currentDateString;
            }

            const hour = now.getHours();
            
            // Mørk bakgrunn (night-mode) mellom 22:00 og 07:00
            if (hour >= 22 || hour < 7) {
                document.body.classList.add('night-mode');
            } else {
                document.body.classList.remove('night-mode');
            }

            const hoursStr = String(now.getHours()).padStart(2, '0');
            const minutesStr = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hoursStr}:${minutesStr}`;

            const dager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
            
            // Tekstlige tidsperioder basert på offisielle definisjoner:
            // Morgen: 06:00 - 09:00
            // Formiddag: 09:00 - 12:00
            // Ettermiddag: 12:00 - 18:00
            // Kveld: 18:00 - 24:00 (00:00)
            // Natt: 24:00 - 06:00
            let periode = "Natt";
            if (hour >= 6 && hour < 9) periode = "Morgen";
            else if (hour >= 9 && hour < 12) periode = "Formiddag"; 
            else if (hour >= 12 && hour < 18) periode = "Ettermiddag";
            else if (hour >= 18 && hour < 24) periode = "Kveld";
            
            const måneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];
            
            document.getElementById('day-period').innerHTML = `${dager[now.getDay()]}<br>${periode}`;
            document.getElementById('date').innerHTML = `${måneder[now.getMonth()]}<br>${now.getDate()}.<br>${now.getFullYear()}`;

            const currentMinutes = (now.getHours() * 60) + now.getMinutes();
            const listContainer = document.getElementById('todo-list');
            listContainer.innerHTML = '';

            tasksConfig.forEach((task, index) => {
                const [tH, tM] = task.tid.split(':').map(Number);
                const taskMinutes = (tH * 60) + tM;

                let statusClass = '';
                
                if (doneTasks[index]) {
                    statusClass = 'done'; 
                } else if (currentMinutes >= taskMinutes) {
                    statusClass = 'active'; 
                }

                const item = document.createElement('div');
                item.className = 'todo-item';
                item.innerHTML = `
                    <div class="todo-text">
                        <span class="todo-time">${task.tid}</span>
                        <span class="todo-desc">${task.tekst}</span>
                    </div>
                    <div class="action-container">
                        <button class="status-btn ${statusClass}" onclick="toggleTask(${index})"></button>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        function toggleTask(index) {
            if (doneTasks[index]) {
                delete doneTasks[index];
            } else {
                doneTasks[index] = true;
            }
            localStorage.setItem('kiosk_done_tasks', JSON.stringify(doneTasks));
            updateKiosk();
        }

        updateKiosk();
        setInterval(updateKiosk, 5000);
    </script>
</body>
</html>
