<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Eksklusiv Seniorkalender</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGNVARIABLER FOR TEMASKIFTE --- */
        :root {
            /* Dagmodus (07:00 - 22:00) */
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #0066cc;
            --clock-accent: #ef4444;
            --clock-ticks: #334155;
            --clock-face: #1e293b;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        body.night-mode {
            /* Nattmodus (22:00 - 07:00) */
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --clock-accent: #ef4444;
            --clock-ticks: #94a3b8;
            --clock-face: #f8fafc;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            user-select: none;
            display: flex;
            flex-direction: column;
            
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none; 
            
            /* SIKKERHETSSONE FOR DET FYSISKE DEKSELET */
            padding: 79px 60px 74px 60px; 
            transition: background 1s ease, color 1s ease;
        }

        body::-webkit-scrollbar {
            display: none; 
        }

        /* --- HEADER / TOPPLINJE --- */
        header {
            height: 120px; 
            display: flex;
            justify-content: space-between; 
            background-color: var(--bg-color);
            transition: background 1s ease;
            margin-bottom: 40px; 
            position: relative; 
            flex-shrink: 0;
        }

        .header-clocks-left {
            display: flex;
            align-items: flex-end; 
            gap: 25px;
            flex-shrink: 0;
            height: 120px;
        }

        .analog-clock-svg {
            width: 120px;
            height: 120px;
            display: block;
        }
        
        .clock-face { fill: none; }
        .tick-minute { stroke: var(--clock-ticks); stroke-width: 0.6; }
        .tick-hour { stroke: var(--clock-face); stroke-width: 2.8; stroke-linecap: round; }
        .clock-number { 
            font-family: 'Poppins', sans-serif; 
            font-weight: 700; 
            font-size: 8.5px; 
            fill: var(--clock-face); 
            text-anchor: middle; 
            dominant-baseline: middle; 
        }

        .hand { stroke-linecap: round; }
        .hand-hour { stroke: var(--clock-face); stroke-width: 5.5; }
        .hand-minute { stroke: var(--clock-face); stroke-width: 4; }
        .center-dot { fill: var(--clock-accent); }

        .digital-clock-big {
            font-size: 162px; 
            font-weight: 400;
            letter-spacing: -7px;
            line-height: 0.7; 
            display: inline-block;
            margin-bottom: -4px; 
        }

        .header-date-right {
            position: absolute;
            top: 0;
            right: 0;
            text-align: right;
            font-size: 2.2rem; 
            font-weight: 500;  
            color: var(--text-main);
            line-height: 1.0; 
        }

        /* --- HOVEDOMRÅDE --- */
        main {
            flex: 1;
            display: flex;
        }

        .column {
            padding-top: 10px;
        }

        .left-column {
            width: max-content; 
            background-color: var(--bg-color);
            padding-right: 60px; 
            margin-right: 60px; 
            border-right: 1px dashed var(--text-muted); 
        }

        .right-column {
            flex: 1; 
            background-color: var(--bg-color);
        }

        /* --- OVERKRIFTER --- */
        .info-title, .calendar-title {
            font-size: 2.2rem;
            font-weight: 500;
            margin-bottom: 10px; 
            color: var(--text-main);
        }

        /* --- VENSTRE SIDE: STRUKTUR FOR RUTINER --- */
        .info-day-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 12px;
            padding-left: 40px; 
            text-transform: lowercase;
        }

        .info-content {
            display: flex;
            flex-direction: column;
            gap: 4px; 
            font-family: 'Lato', sans-serif;
            font-size: 1.25rem;
            color: var(--text-main);
            padding-left: 80px; 
        }

        .info-item {
            white-space: nowrap;
            line-height: 1.4;
        }

        .info-time {
            color: var(--clock-accent);
            font-weight: 400;
        }

        /* --- HØYRE SIDE: KALENDERVISNING --- */
        .day-section {
            width: 100%;
            margin-bottom: 35px; 
            background-color: transparent;
        }

        .day-title {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 12px; 
            padding-left: 40px; 
        }

        .today-badge {
            font-size: 14px; 
            background: var(--clock-accent);
            color: white;
            padding: 2px 12px; 
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .holiday-text {
            font-size: 1.1rem;
            color: var(--clock-accent);
            font-weight: 400;
            font-style: normal;
            margin-top: -8px;
            margin-bottom: 12px;
            text-transform: uppercase;
            padding-left: 40px;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-left: 80px; 
        }

        .event-item {
            font-family: 'Lato', sans-serif;
            font-size: 1.25rem;
            line-height: 1.4;
            color: var(--text-main);
            display: flex;
            align-items: flex-start;
        }

        /* Rettet: Egen klasse for kulepunktet for å tvinge eksakt lik avstand som venstre side */
        .event-bullet {
            flex-shrink: 0;
            margin-right: 9px; /* Fast avstand som sikrer perfekt visuell harmoni */
            line-height: 1.4;
        }

        .event-text-container {
            flex: 1;
        }

        .event-time {
            color: var(--clock-accent); 
            font-weight: 400;
            margin-right: 5px;
        }

        /* --- NAVNEMERKER (BADGES) --- */
        .badge-navn {
            display: inline-block;
            padding: 2px 8px 4px 8px; 
            border-radius: 6px;
            font-weight: 700;
            color: #ffffff !important; 
            margin-right: 6px;
            line-height: 1.2; 
            font-size: 16px; 
            vertical-align: middle;
        }

        .badge-mamma { background-color: #16a34a; }        
        .badge-pappa { background-color: #d97706; }        
        .badge-begge { background-color: #0891b2; }        

        body.night-mode .badge-mamma { background-color: #166534; }
        body.night-mode .badge-pappa { background-color: #9a3412; }
        body.night-mode .badge-begge { background-color: #155e75; }

        .no-events-text {
            font-family: 'Lato', sans-serif;
            font-size: 1.25rem;
            color: var(--text-muted);
            padding-left: 40px;
        }

        /* Responsiv mobil-layout */
        @media (max-width: 900px) or (orientation: portrait) {
            body {
                padding: 30px 20px 40px 20px; 
            }

            header {
                flex-direction: column; 
                height: auto;
                gap: 15px;
                text-align: center;
                margin-bottom: 20px;
                align-items: center;
            }

            .header-clocks-left {
                justify-content: center;
                align-items: center;
                width: 100%;
                height: auto;
                gap: 15px;
            }

            .digital-clock-big {
                font-size: 4.5rem;
                line-height: 1.0;
                height: auto;
                letter-spacing: -2px;
                margin-bottom: 0;
            }

            .header-date-right {
                position: static;
                text-align: center;
                width: 100%;
                font-size: 1.6rem;
            }

            main {
                flex-direction: column; 
                gap: 40px;
            }

            .left-column {
                width: 100%; 
                padding-right: 0;
                margin-right: 0;
                border-right: none; 
            }

            .info-day-title, .day-title, .holiday-text, .no-events-text {
                padding-left: 20px; 
            }

            .info-content, .event-list {
                padding-left: 40px; 
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-clocks-left">
            <svg class="analog-clock-svg" viewBox="0 0 100 100" id="analog-clock">
                <circle cx="50" cy="50" r="48" class="clock-face" />
                <g id="ticks"></g>
                <g id="numbers"></g>
                <line id="hour-hand" class="hand hand-hour" x1="50" y1="50" x2="50" y2="30" />
                <line id="minute-hand" class="hand hand-minute" x1="50" y1="50" x2="50" y2="18" />
                <circle cx="50" cy="50" r="2.5" class="center-dot" />
            </svg>
            <div class="digital-clock-big" id="digital-clock">00:00</div>
        </div>
        
        <div class="header-date-right" id="complete-date-string">
            Laster dato...
        </div>
    </header>

    <main>
        <div class="column left-column">
            <div class="info-title">Rutiner:</div>
            <div class="info-day-title" id="info-day-heading">--</div>
            <div class="info-content" id="info-text">Laster faste rutiner...</div>
        </div>
        
        <div class="column right-column">
            <div class="calendar-title">Dette skjer:</div>
            <div id="calendar-list">Kobler til Google Kalender...</div>
        </div>
    </main>

    <script src="https://apis.google.com/js/api.js"></script>

    <script>
        /****************************************************************
         * 1. REDIGERBARE FASTE RUTINER (PERMANENTE ENDRINGER)
         ****************************************************************/
        const fasteRutinerHverdag = [
            { tid: "07.30", tekst: "Frokost" },
            { tid: "08.00", tekst: "Ta medisiner" },
            { tid: "09.00", tekst: "Tur med hunden" },
            { tid: "11.30", tekst: "Lunsj" },

        ];

        const fasteRutinerLoerdag = [
            { tid: "07.30", tekst: "Frokost" },
            { tid: "08.00", tekst: "Ta medisiner" },
            { tid: "09.00", tekst: "Tur med hunden" },
            { tid: "12.00", tekst: "Gjerne varm lunsj" },
            { tid: "14.00", tekst: "Sjekke meldinger" },
            { tid: "15.30", tekst: "Middag" },
            { tid: "19.30", tekst: "Gå tur med hunden" },
            { tid: "20.30", tekst: "Kveldsmat" }
        ];

        const fasteRutinerSoendag = [
            { tid: "07.30", tekst: "Frokost" },
            { tid: "08.00", tekst: "Ta medisiner" },
            { tid: "09.00", tekst: "Tur med hunden" },
            { tid: "13.00", tekst: "Middag" },
            { tid: "14.00", tekst: "Sjekke meldinger" },
            { tid: "19.30", tekst: "Gå tur med hunden" },
            { tid: "20.30", tekst: "Kveldsmat" }
        ];

        /****************************************************************
         * 2. GOOGLE API CONFIGURATION / AUTENTISERING
         ****************************************************************/
        const API_KEY = 'AIzaSyDabiLiH6tR1bonxhjgNqq9PoTSa9wogzE';
        const CALENDAR_ID = '6836a3463ada75841f11c52afbd588f7467b5c7014a9ac8118e24205f42d301c@group.calendar.google.com'; 
        const HOLIDAY_CALENDAR_ID = 'no.norwegian#holiday@group.v.calendar.google.com'; 

        const ukeDager = ["Søndag", "Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag"];
        const maaneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];

        let globalEventsCache = {}; 
        let globalHolidaysCache = {}; 
        let wakeLock = null;
        let inactivityTimeout = null;

        /****************************************************************
         * 3. APPLIKASJONSLOGIKK
         ****************************************************************/
        function genererRutineHTML(rutineListe) {
            let html = "";
            rutineListe.forEach(item => {
                html += `<div class='info-item'>•  <span class='info-time'>${item.tid}:</span> ${item.tekst}</div>`;
            });
            return html;
        }

        function buildClockUI() {
            const ticksG = document.getElementById('ticks');
            const numsG = document.getElementById('numbers');
            ticksG.innerHTML = '';
            numsG.innerHTML = '';
            
            for (let i = 0; i < 60; i++) {
                const isHour = i % 5 === 0;
                const angle = (i * 6) * (Math.PI / 180);
                const r1 = isHour ? 41 : 44;
                const r2 = 48;
                const x1 = 50 + r1 * Math.sin(angle);
                const y1 = 50 - r1 * Math.cos(angle);
                const x2 = 50 + r2 * Math.sin(angle);
                const y2 = 50 - r2 * Math.cos(angle);
                
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1); line.setAttribute("y1", y1);
                line.setAttribute("x2", x2); line.setAttribute("y2", y2);
                line.classList.add(isHour ? "tick-hour" : "tick-minute");
                ticksG.appendChild(line);
            }

            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30) * (Math.PI / 180);
                const r = 33; 
                const x = 50 + r * Math.sin(angle);
                const y = 50 - r * Math.cos(angle) + 0.5; 
                
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", x); txt.setAttribute("y", y);
                txt.classList.add("clock-number");
                txt.textContent = i;
                numsG.appendChild(txt);
            }
        }

        function updateClockAndLayout() {
            const now = new Date();
            const m = now.getMinutes();
            const h = now.getHours();

            document.getElementById('minute-hand').setAttribute('transform', `rotate(${m * 6} 50 50)`);
            document.getElementById('hour-hand').setAttribute('transform', `rotate(${(h % 12) * 30 + m * 0.5} 50 50)`);

            let hoursStr = String(h).padStart(2, '0');
            let minutesStr = String(m).padStart(2, '0');
            
            document.getElementById('digital-clock').textContent = `${hoursStr}:${minutesStr}`;

            if (h >= 7 && h < 22) {
                document.body.classList.remove('night-mode');
            } else {
                document.body.classList.add('night-mode');
            }

            let periodText = "natt";
            if (h >= 6 && h < 9) periodText = "morgen";
            else if (h >= 9 && h < 12) periodText = "formiddag";
            else if (h >= 12 && h < 18) periodText = "ettermiddag";
            else if (h >= 18 && h < 24) periodText = "kveld";
            
            const dayName = ukeDager[now.getDay()].toLowerCase();
            const dayNum = now.getDate();
            const monthName = maaneder[now.getMonth()].toLowerCase();
            const yearNum = now.getFullYear();

            document.getElementById('complete-date-string').textContent = `Det er ${periodText}, ${dayName} ${dayNum}. ${monthName} ${yearNum}`;

            if (h === 3 && m === 0 && now.getSeconds() === 0) {
                window.location.reload(true);
                return;
            }
            if (h === 0 && m === 0 && now.getSeconds() === 0) {
                renderCalendarList(); 
            }

            const dayOfWeek = now.getDay(); 
            if (dayOfWeek === 6) {
                document.getElementById('info-day-heading').innerText = "lørdag";
                document.getElementById('info-text').innerHTML = genererRutineHTML(fasteRutinerLoerdag);
            } else if (dayOfWeek === 0) {
                document.getElementById('info-day-heading').innerText = "søndag";
                document.getElementById('info-text').innerHTML = genererRutineHTML(fasteRutinerSoendag);
            } else {
                document.getElementById('info-day-heading').innerText = "mandag - fredag";
                document.getElementById('info-text').innerHTML = genererRutineHTML(fasteRutinerHverdag);
            }
        }

        function formatEventSummary(summary) {
            if (!summary) return '';
            let html = summary;
            html = html.replace(/Mamma\s*&\s*[pP]appa:/g, '<span class="badge-navn badge-begge">Mamma & pappa:</span>');
            html = html.replace(/Mamma\s+og\s+[pP]appa:/g, '<span class="badge-navn badge-begge">Mamma & pappa:</span>');
            html = html.replace(/Mamma:/g, '<span class="badge-navn badge-mamma">Mamma:</span>');
            html = html.replace(/Pappa:/g, '<span class="badge-navn badge-pappa">Pappa:</span>');
            return html;
        }

        function renderCalendarList() {
            const container = document.getElementById('calendar-list');
            container.innerHTML = '';
            
            const today = new Date();
            const todayKey = today.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
            let totalDaysRendered = 0;

            for (let i = 0; i < 185; i++) {
                const currentDay = new Date();
                currentDay.setDate(today.getDate() + i);
                const dateKey = currentDay.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});

                const hasPersonalEvents = globalEventsCache[dateKey] && globalEventsCache[dateKey].length > 0;
                const hasHoliday = globalHolidaysCache[dateKey];

                if (!hasPersonalEvents && !hasHoliday) {
                    continue;
                }

                totalDaysRendered++;

                const daySection = document.createElement('div');
                daySection.className = 'day-section';

                const dayName = ukeDager[currentDay.getDay()];
                const dateNum = currentDay.getDate();
                const monthName = maaneder[currentDay.getMonth()].toLowerCase();
                const yearNum = currentDay.getFullYear();
                
                const title = document.createElement('div');
                title.className = 'day-title';
                
                let titleHTML = `<span>${dayName.toLowerCase()} ${dateNum}. ${monthName} ${yearNum}</span>`;
                if (dateKey === todayKey) {
                    titleHTML += '<span class="today-badge">I dag</span>';
                }
                title.innerHTML = titleHTML;
                daySection.appendChild(title);

                if (hasHoliday) {
                    const holDiv = document.createElement('div');
                    holDiv.className = 'holiday-text';
                    holDiv.textContent = globalHolidaysCache[dateKey];
                    daySection.appendChild(holDiv);
                }

                if (hasPersonalEvents) {
                    const list = document.createElement('div');
                    list.className = 'event-list';

                    globalEventsCache[dateKey].forEach(ev => {
                        const li = document.createElement('div');
                        li.className = 'event-item';

                        let timeStr = 'Hele dagen';
                        if (ev.start.dateTime) {
                            const d = new Date(ev.start.dateTime);
                            timeStr = d.toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit', timeZone: 'Europe/Oslo'});
                        }

                        const formatedText = formatEventSummary(ev.summary);
                        
                        // Rettet: Kulepunktet ligger nå i en separat <span class="event-bullet"> uten manuelle tekst-mellomrom
                        li.innerHTML = `<span class="event-bullet">•</span><div class="event-text-container"><span class="event-time">${timeStr}:</span> ${formatedText}</div>`;
                        list.appendChild(li);
                    });
                    daySection.appendChild(list);
                }
                container.appendChild(daySection);
            }

            if (totalDaysRendered === 0) {
                container.innerHTML = '<div class="no-events-text">Ingen planer de neste 6 månedene</div>';
            }
        }

        function fetchCalendarData() {
            const start = new Date();
            start.setHours(0,0,0,0);
            const end = new Date();
            end.setDate(end.getDate() + 185);

            const personalRequest = gapi.client.calendar.events.list({
                'calendarId': CALENDAR_ID,
                'timeMin': start.toISOString(),
                'timeMax': end.toISOString(),
                'singleEvents': true,
                'orderBy': 'startTime'
            });

            const holidayRequest = gapi.client.calendar.events.list({
                'calendarId': HOLIDAY_CALENDAR_ID,
                'timeMin': start.toISOString(),
                'timeMax': end.toISOString(),
                'singleEvents': true
            });

            Promise.all([personalRequest, holidayRequest]).then(function(responses) {
                const personalEvents = responses[0].result.items;
                const holidayEvents = responses[1].result.items;

                const tempEvents = {};
                personalEvents.forEach(event => {
                    if (event.start.date) {
                        const startParts = event.start.date.split('-');
                        const endParts = event.end.date.split('-');
                        let current = new Date(startParts[0], startParts[1] - 1, startParts[2]);
                        const end = new Date(endParts[0], endParts[1] - 1, endParts[2]);
                        
                        while (current < end) {
                            const key = current.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                            if (!tempEvents[key]) { tempEvents[key] = []; }
                            tempEvents[key].push(event);
                            current.setDate(current.getDate() + 1);
                        }
                    } else if (event.start.dateTime) {
                        let current = new Date(event.start.dateTime);
                        let startKey = current.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                        let end = new Date(event.end.dateTime);
                        let endKey = end.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                        
                        if (startKey === endKey) {
                            if (!tempEvents[startKey]) { tempEvents[startKey] = []; }
                            tempEvents[startKey].push(event);
                        } else {
                            let iter = new Date(current.getFullYear(), current.getMonth(), current.getDate());
                            let stop = new Date(end.getFullYear(), end.getMonth(), end.getDate());
                            while (iter <= stop) {
                                const key = iter.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                                if (!tempEvents[key]) { tempEvents[key] = []; }
                                tempEvents[key].push(event);
                                iter.setDate(iter.getDate() + 1);
                            }
                        }
                    }
                });
                globalEventsCache = tempEvents;

                const tempHolidays = {};
                holidayEvents.forEach(h => {
                    let dateStr = h.start.date || h.start.dateTime.split('T')[0];
                    let parts = dateStr.split('-');
                    let d = new Date(parts[0], parts[1] - 1, parts[2]);
                    let key = d.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
                    tempHolidays[key] = h.summary;
                });
                globalHolidaysCache = tempHolidays;

                renderCalendarList();
            }).catch(err => {
                console.log("Feil ved henting av kalender:", err);
                document.getElementById('calendar-list').innerText = "Kunne ikke oppdatere hendelser.";
            });
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 180000); 
        }

        function setupInactivityListeners() {
            window.addEventListener('scroll', resetInactivityTimer);
            window.addEventListener('touchstart', resetInactivityTimer, true);
            window.addEventListener('touchmove', resetInactivityTimer, true);
            window.addEventListener('mousedown', resetInactivityTimer, true);
            resetInactivityTimer();
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }

        function initGapiClient() {
            gapi.client.init({
                'apiKey': API_KEY,
                'discoveryDocs': ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
            }).then(function() {
                fetchCalendarData();
                setInterval(fetchCalendarData, 300000); 
            }).catch(err => {
                document.getElementById('calendar-list').innerText = "Feil ved initialisering av API-klient.";
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            requestWakeLock();
            buildClockUI();
            updateClockAndLayout();
            setupInactivityListeners();
            
            setInterval(updateClockAndLayout, 1000);

            if (typeof gapi !== 'undefined') {
                gapi.load('client', initGapiClient);
            } else {
                document.getElementById('calendar-list').innerText = "Google API-skript ble ikke lastet.";
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
